version: "3.9"

services:
  api1:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: vg_api_1
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db
    networks: [vg]
    volumes:
      - ../../uploads:/app/uploads:rw

  api2:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: vg_api_2
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db
    networks: [vg]
    volumes:
      - ../../uploads:/app/uploads:rw

  lb:
    image: nginx:1.27-alpine
    container_name: vg_lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx/vytalguard.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api1
      - api2
    networks: [vg]

  db:
    image: postgres:16
    container_name: vg_postgres
    environment:
      POSTGRES_USER: vytal
      POSTGRES_PASSWORD: vytal
      POSTGRES_DB: vytalguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vytal -d vytalguard"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [vg]

  # OPTIONAL: PgBouncer connection pooling
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    container_name: vg_pgbouncer
    environment:
      - DB_USER=vytal
      - DB_PASSWORD=vytal
      - DB_HOST=db
      - DB_PORT=5432
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=50
      - RESERVE_POOL_SIZE=20
    depends_on: [db]
    ports:
      - "6432:6432"
    networks: [vg]

  # OPTIONAL: MinIO (S3-compatible) for object storage
  minio:
    image: minio/minio:RELEASE.2025-02-18T22-51-28Z
    container_name: vg_minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    networks: [vg]

  # OPTIONAL: Redis for future sessions/cache
  redis:
    image: redis:7-alpine
    container_name: vg_redis
    ports:
      - "6379:6379"
    networks: [vg]

volumes:
  pgdata:
  minio_data:

networks:
  vg:
    driver: bridge
