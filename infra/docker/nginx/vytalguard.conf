upstream vg_api {
  server api1:4000 max_fails=2 fail_timeout=5s;
  server api2:4000 max_fails=2 fail_timeout=5s;
  keepalive 64;
}

server {
  listen 80;
  server_name _;

  proxy_http_version 1.1;
  proxy_set_header Connection "";

  # Health/readiness
  location /api/ready  { proxy_pass http://vg_api; }
  location /api/health { proxy_pass http://vg_api; }

  # API + everything else
  location / {
    proxy_pass http://vg_api;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 2s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;
  }

  # Optional: serve shared uploads via any replica
  location /uploads/ {
    proxy_pass http://vg_api;
  }
}
