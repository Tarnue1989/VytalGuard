<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Organization Branding</title>

  <meta name="description" content="VytalGuard HMS - Organization Branding">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
</head>

<body>
<div class="page-wrapper">
<div class="app-container">

<div class="app-header d-flex align-items-center"></div>

<div class="app-hero-header d-flex align-items-center">
  <ol class="breadcrumb">
    <li class="breadcrumb-item">
      <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
    </li>
    <li class="breadcrumb-item">Settings</li>
    <li class="breadcrumb-item text-primary">Organization Branding</li>
  </ol>
</div>

<div class="app-body">
<div class="row gx-4">
<div class="col-sm-12">
<div class="card">

<div class="card-header d-flex justify-content-between align-items-center">
  <h5 class="card-title mb-0">Organization Branding</h5>
  <button id="backBtn" class="btn btn-outline-secondary btn-sm">
    <i class="ri-arrow-left-line"></i> Back
  </button>
</div>

<div class="card-body">

<form id="brandingForm" enctype="multipart/form-data">

<div class="row gx-4">

<!-- ================= Identity ================= -->
<div class="col-12">
  <h6 class="mt-3">Organization Identity</h6>
  <hr/>
</div>

<div class="col-lg-6">
  <label class="form-label">Company Name</label>
  <input type="text" id="company_name" class="form-control">
</div>

<div class="col-lg-6">
  <label class="form-label">Tagline</label>
  <input type="text" id="tagline" class="form-control">
</div>

<!-- ================= Brand Assets ================= -->
<div class="col-12">
  <h6 class="mt-3">Brand Assets</h6>
  <hr/>
</div>

<!-- LOGO -->
<div class="col-lg-4 col-sm-6">
  <label class="form-label">Logo</label>
  <input type="file" id="logo" name="logo" class="form-control" accept="image/*">

  <div id="logoPreview" class="mt-2"></div>

  <button type="button" id="removeLogoBtn"
    class="btn btn-sm btn-danger mt-1 hidden">
    Remove
  </button>

  <input type="hidden" id="remove_logo" name="remove_logo" value="false">
</div>

<!-- PRINT LOGO -->
<div class="col-lg-4 col-sm-6">
  <label class="form-label">Print Logo</label>
  <input type="file" id="logo_print" name="logo_print" class="form-control" accept="image/*">

  <div id="logoPrintPreview" class="mt-2"></div>

  <button type="button" id="removeLogoPrintBtn"
    class="btn btn-sm btn-danger mt-1 hidden">
    Remove
  </button>

  <input type="hidden" id="remove_logo_print" name="remove_logo_print" value="false">
</div>

<!-- FAVICON -->
<div class="col-lg-4 col-sm-6">
  <label class="form-label">Favicon</label>
  <input type="file" id="favicon" name="favicon" class="form-control" accept="image/*">

  <div id="faviconPreview" class="mt-2"></div>

  <button type="button" id="removeFaviconBtn"
    class="btn btn-sm btn-danger mt-1 hidden">
    Remove
  </button>

  <input type="hidden" id="remove_favicon" name="remove_favicon" value="false">
</div>

<!-- ================= Contact ================= -->
<div class="col-12">
  <h6 class="mt-3">Contact Information</h6>
  <hr/>
</div>

<div class="col-lg-4">
  <input type="text" id="contact_address" class="form-control" placeholder="Address">
</div>

<div class="col-lg-4">
  <input type="text" id="contact_phone" class="form-control" placeholder="Phone">
</div>

<div class="col-lg-4">
  <input type="email" id="contact_email" class="form-control" placeholder="Email">
</div>

<!-- ================= Theme ================= -->
<div class="col-12">
  <h6 class="mt-3">Theme</h6>
  <hr/>
</div>

<div class="col-lg-3">
  <input type="color" id="theme_primary" class="form-control form-control-color">
</div>

<div class="col-lg-3">
  <input type="color" id="theme_secondary" class="form-control form-control-color">
</div>

<div class="col-lg-3">
  <input type="color" id="theme_surface" class="form-control form-control-color">
</div>

<div class="col-lg-3">
  <input type="color" id="theme_text" class="form-control form-control-color">
</div>

<!-- ================= System ================= -->
<div class="col-lg-4">
  <input type="text" id="currency" class="form-control" value="USD">
</div>

<div class="col-lg-4">
  <input type="text" id="locale" class="form-control" value="en-US">
</div>

<div class="col-lg-4">
  <input type="text" id="timezone" class="form-control" value="UTC">
</div>

<!-- ================= Letterhead ================= -->
<div class="col-lg-6">
  <input type="text" id="letterhead_header" class="form-control" placeholder="Header">
</div>

<div class="col-lg-6">
  <input type="text" id="letterhead_footer" class="form-control" placeholder="Footer">
</div>

<!-- ================= Social ================= -->
<div class="col-lg-3">
  <input type="text" id="social_facebook" class="form-control" placeholder="Facebook">
</div>

<div class="col-lg-3">
  <input type="text" id="social_twitter" class="form-control" placeholder="Twitter">
</div>

<div class="col-lg-3">
  <input type="text" id="social_linkedin" class="form-control" placeholder="LinkedIn">
</div>

<div class="col-lg-3">
  <input type="text" id="social_instagram" class="form-control" placeholder="Instagram">
</div>

<!-- ================= Status ================= -->
<div class="col-sm-6 mt-3">
  <input type="radio" name="status" value="active" checked> Active
  <input type="radio" name="status" value="inactive"> Inactive
</div>

<!-- ================= Actions ================= -->
<div class="col-12 mt-4">
  <div class="d-flex justify-content-end gap-2">
    <button type="reset" class="btn btn-warning">Reset</button>
    <button type="submit" class="btn btn-primary">Save Branding</button>
  </div>
</div>

</div>
</form>

</div>
</div>
</div>
</div>
</div>

<div class="app-footer">
  <span>© VytalGuard HMS 2025</span>
</div>

</div>
</div>

<script type="module" src="js/modules/organization-branding/add-branding.js"></script>

 
  

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
