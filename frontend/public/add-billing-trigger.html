<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Billing Trigger</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add Billing Trigger">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
</head>

<body>
<div class="page-wrapper">
<div class="app-container">

  <!-- Header -->
  <div class="app-header d-flex align-items-center"></div>

  <!-- Breadcrumb -->
  <div class="app-hero-header d-flex align-items-center">
    <ol class="breadcrumb">
      <li class="breadcrumb-item">
        <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
      </li>
      <li class="breadcrumb-item">Billing</li>
      <li class="breadcrumb-item text-primary" aria-current="page">
        Add Billing Trigger
      </li>
    </ol>
  </div>

  <!-- Body -->
  <div class="app-body">
    <div class="row gx-4">
      <div class="col-sm-12">

        <div class="card">
          <div class="card-header">
            <h5 class="card-title">Add Billing Trigger</h5>
          </div>

          <div class="card-body">

            <div id="formContainer">
              <form id="billingTriggerForm" novalidate>
                <div class="row gx-4">

                  <!-- ================= Identity ================= -->
                  <div class="col-12">
                    <h6 class="mt-3">Trigger Definition</h6>
                    <hr />
                  </div>

                  <!-- 🔥 Feature Module (NEW - REQUIRED) -->
                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3 form-group">
                      <label class="form-label" for="feature_module_id">
                        Feature Module <span class="text-danger">*</span>
                      </label>
                      <select
                        class="form-control"
                        id="feature_module_id"
                        name="feature_module_id"
                        required
                      >
                        <option value="">-- Select Module --</option>
                      </select>
                    </div>
                  </div>

                  <!-- Module Key (AUTO FILLED) -->
                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3 form-group">
                      <label class="form-label" for="module_key">
                        Module Key
                      </label>
                      <input
                        type="text"
                        class="form-control"
                        id="module_key"
                        name="module_key"
                        readonly
                      />
                      <div class="form-text text-muted">
                        Auto-filled from selected module
                      </div>
                    </div>
                  </div>

                  <!-- Trigger Status -->
                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3 form-group">
                      <label class="form-label" for="trigger_status">
                        Trigger Status <span class="text-danger">*</span>
                      </label>
                      <input
                        type="text"
                        class="form-control"
                        id="trigger_status"
                        name="trigger_status"
                        placeholder="e.g. completed"
                        required
                      />
                    </div>
                  </div>

                  <!-- Status -->
                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label">Status</label>
                      <div class="m-0">
                        <div class="form-check form-check-inline">
                          <input
                            class="form-check-input"
                            type="radio"
                            name="is_active"
                            value="true"
                            checked
                          />
                          <label class="form-check-label">
                            Active
                          </label>
                        </div>
                        <div class="form-check form-check-inline">
                          <input
                            class="form-check-input"
                            type="radio"
                            name="is_active"
                            value="false"
                          />
                          <label class="form-check-label">
                            Inactive
                          </label>
                        </div>
                      </div>
                    </div>
                  </div>

                  <!-- ================= Scope ================= -->
                  <div class="col-12">
                    <h6 class="mt-3">Scope</h6>
                    <hr />
                  </div>

                  <!-- Organization -->
                  <div class="col-xxl-3 col-lg-4 col-sm-6" id="organizationFieldGroup">
                    <div class="mb-3 form-group">
                      <label class="form-label" for="organizationSelect">
                        Organization
                      </label>
                      <select
                        class="form-control"
                        id="organizationSelect"
                        name="organization_id"
                      >
                        <option value="">-- System Default --</option>
                      </select>
                    </div>
                  </div>

                  <!-- Facility -->
                  <div class="col-xxl-3 col-lg-4 col-sm-6" id="facilityFieldGroup">
                    <div class="mb-3 form-group">
                      <label class="form-label" for="facilitySelect">
                        Facility <span class="text-muted">(optional)</span>
                      </label>
                      <select
                        class="form-control"
                        id="facilitySelect"
                        name="facility_id"
                      >
                        <option value="">-- All Facilities --</option>
                      </select>
                    </div>
                  </div>

                  <!-- ================= Actions ================= -->
                  <div class="col-sm-12">
                    <div class="d-flex gap-2 justify-content-end">

                      <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                        <i class="ri-arrow-go-back-line me-1"></i>
                        Cancel
                      </button>

                      <button type="reset" class="btn btn-warning">
                        <i class="ri-refresh-line me-1"></i>
                        Clear
                      </button>

                      <button type="submit" class="btn btn-primary">
                        <i class="ri-save-3-line me-1"></i>
                        Save Trigger
                      </button>

                    </div>
                  </div>

                </div>
              </form>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="app-footer">
    <span>© VytalGuard HMS 2025</span>
  </div>

</div>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="hidden">
  <div class="spinner-box">
    <i class="fas fa-spinner fa-spin"></i> Loading...
  </div>
</div>

<!-- JS -->
<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/bootstrap.bundle.min.js"></script>
<script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
<script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
<script src="assets/js/custom.js"></script>

<!-- Module JS -->
<script type="module" src="js/modules/billing-trigger/add-billing-trigger.js"></script>

 
  

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
