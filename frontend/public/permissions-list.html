<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VytalGuard - Permissions List</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Permissions List" />
  <link rel="shortcut icon" href="assets/images/favicon.svg" />

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css" />
  <link rel="stylesheet" href="assets/css/main.min.css" />
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css" />
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css" />
  <link rel="stylesheet" href="assets/vendor/datatables/dataTables.bs5.css" />
  <link rel="stylesheet" href="assets/vendor/datatables/dataTables.bs5-custom.css" />
  <link rel="stylesheet" href="assets/vendor/datatables/buttons/dataTables.bs5-custom.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/filter-page.css" />
  <link rel="stylesheet" href="assets/css/print.css" media="print" />
  <link rel="stylesheet" href="assets/css/summary.css" />
  <link rel="stylesheet" href="assets/css/timeline.css" />
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Permissions</li>
          <li class="breadcrumb-item text-primary">Permissions List</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">

              <!-- Header -->
              <div class="card-header d-flex align-items-center justify-content-between">
                <h5 class="card-title mb-0">Permissions</h5>
                <a href="add-permission.html" class="btn btn-primary ms-auto">
                  <i class="ri-add-line me-1"></i> Add Permission
                </a>
              </div>

              <div class="card-body">

                <!-- ============================================================ -->
                <!-- 🔍 FILTER SECTION (ONLY FIELDS CHANGED) -->
                <!-- ============================================================ -->
                <div class="card panel-card mb-3">
                  <div class="card-header d-flex align-items-center justify-content-between">
                    <button id="toggleFilterBtn" class="btn btn-outline-secondary btn-sm">
                      <i class="fas fa-filter me-1"></i> Filters
                      <i id="filterChevron" class="fas fa-chevron-down toggle-icon ms-1"></i>
                    </button>

                    <div class="view-actions d-flex gap-2">
                      <button id="exportCSVBtn" class="btn btn-outline-success btn-sm">CSV</button>
                      <button id="exportExcelBtn" class="btn btn-outline-secondary btn-sm">Excel</button>
                      <button id="exportPDFBtn" class="btn btn-outline-danger btn-sm">PDF</button>
                    </div>
                  </div>

                  <div id="filterCollapse" class="card-body filter-body hidden">

                    <div class="row gx-3 gy-2 filter-grid compact">

                      <!-- Search -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="field-wrapper">
                          <label class="form-label">Search</label>
                          <input id="globalSearch" class="form-control" placeholder="Search key, name..." />
                        </div>
                      </div>
                      <!-- Global -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="field-wrapper">
                          <label class="form-label">Global</label>
                          <select id="filterIsGlobal" class="form-select">
                            <option value="">All</option>
                            <option value="true">Global</option>
                            <option value="false">Local</option>
                          </select>
                        </div>
                      </div>

                      <!-- Date Range -->
                      <div class="col-md-3">
                        <div class="field-wrapper">
                          <label class="form-label">Date Range</label>
                          <div class="input-group">
                            <span class="input-group-text bg-primary-lighten">
                              <i class="ri-calendar-2-line text-primary"></i>
                            </span>
                            <input type="text" id="dateRange" class="form-control custom-daterange" />
                          </div>
                        </div>
                      </div>

                      <div class="col-12 d-flex gap-2">
                        <button id="resetFilterBtn" class="btn btn-outline-secondary btn-sm">Clear</button>
                      </div>

                    </div>
                  </div>
                </div>

                <!-- VIEW CONTROLS -->
                <div class="d-flex mb-2 view-toggle compact align-items-center gap-2 flex-wrap">

                  <div class="dropdown">
                    <button class="btn btn-outline-primary btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                      Select Fields
                    </button>
                    <div class="dropdown-menu p-2" id="fieldSelectorDropdown"></div>
                  </div>

                  <div class="btn-group">
                    <button id="cardViewBtn" class="btn btn-outline-secondary btn-sm">Card View</button>
                    <button id="tableViewBtn" class="btn btn-outline-secondary btn-sm active">Table View</button>
                  </div>

                </div>

                <!-- RECORDS PER PAGE -->
                <div class="btn-group align-items-center ms-2">
                  <span class="btn btn-outline-secondary btn-sm px-2 pe-none">Show</span>
                  <select id="recordsPerPage" class="btn btn-outline-secondary btn-sm text-center" style="width:64px;">
                    <option value="10">10</option>
                    <option value="25" selected>25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                  </select>
                  <span class="btn btn-outline-secondary btn-sm px-2 pe-none">Rows</span>
                </div>

                <!-- SUMMARY -->
                <hr class="my-2" />
                <div class="text-muted fw-semibold small mb-1">Breakdown Summary</div>
                <div class="module-summary">
                  <div id="moduleSummary"></div>
                </div>
                <hr class="my-2" />

                <!-- TABLE -->
                <div class="table-responsive table-container active">
                  <table class="table m-0 align-middle data-table print-table">
                    <thead id="dynamicTableHead"></thead>
                    <tbody id="permissionTableBody"></tbody>
                  </table>
                </div>

                <!-- CARD -->
                <div id="permissionList" class="card-list"></div>

                <!-- PAGINATION -->
                <div id="paginationButtons" class="pagination-controls text-center mt-3"></div>

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- LOADING SPINNER (KEPT) -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <!-- VIEW MODAL (KEPT) -->
  <div id="viewModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Permission Details</h2>
        <button id="closeViewModal">&times;</button>
      </div>
      <div class="modal-body" id="viewModalBody"></div>
    </div>
  </div>

  <!-- JS (UNCHANGED) -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/vendor/datatables/dataTables.min.js"></script>
  <script src="assets/vendor/datatables/dataTables.bootstrap.min.js"></script>
  <script src="assets/vendor/datatables/custom/custom-datatables.js"></script>
  <script src="assets/js/custom.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script type="module" src="/js/logout.js"></script>
  <script type="module" src="/js/authSession.js"></script>
  <script type="module" src="/js/modules/permissions/permissions-filter-main.js"></script>
  <script type="module" src="/js/utils/navigation.js"></script>

</body>
</html>
