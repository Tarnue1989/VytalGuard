<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VytalGuard - Add Lab Request</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add Lab Request" />
  <link rel="shortcut icon" href="assets/images/favicon.svg" />

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css" />
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css" />
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css" />
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css" />
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">
      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="dashboard.html"><i class="ri-home-3-line"></i></a></li>
          <li class="breadcrumb-item">Lab Requests</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Lab Request</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Lab Request</h5>
              </div>
              <div class="card-body">
                <!-- 📦 Form Container -->
                <div id="formContainer">
                  <form id="labRequestForm">
                    <div class="row gx-4 gy-3">
                      
                      <!-- Organization -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6 form-group">
                        <label for="organizationSelect" class="form-label">Organization</label>
                        <select id="organizationSelect" name="organization_id" class="form-control"></select>
                      </div>

                      <!-- Facility -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6 form-group">
                        <label for="facilitySelect" class="form-label">Facility</label>
                        <select id="facilitySelect" name="facility_id" class="form-control"></select>
                      </div>

                      <!-- Department -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6 form-group">
                        <label for="departmentSelect" class="form-label">Department</label>
                        <select id="departmentSelect" name="department_id" class="form-control"></select>
                      </div>

                      <!-- Patient -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="field-wrapper">
                          <label for="patientSearch" class="form-label">Patient <span class="text-danger">*</span></label>
                          <input type="text" id="patientSearch" class="form-control suggestion-input" placeholder="Search Patient..." autocomplete="off" />
                          <input type="hidden" id="patientId" name="patient_id" />
                          <div id="patientSearchSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <!-- Doctor -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="field-wrapper">
                          <label for="doctorSearch" class="form-label">Doctor</label>
                          <input type="text" id="doctorSearch" class="form-control suggestion-input" placeholder="Search Doctor..." autocomplete="off" />
                          <input type="hidden" id="doctorId" name="doctor_id" />
                          <div id="doctorSearchSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                    <!-- Consultation -->
                    <div class="col-xxl-3 col-lg-4 col-sm-6">
                      <div class="field-wrapper">
                        <label for="consultationSearch" class="form-label">Consultation</label>
                        <input type="text" id="consultationSearch" class="form-control suggestion-input" placeholder="Search Consultation..." autocomplete="off" />
                        <div id="consultationSearchSuggestions" class="suggestions"></div>
                      </div>
                    </div>
                    <!-- Registration Log -->
                    <div class="col-xxl-3 col-lg-4 col-sm-6">
                      <div class="field-wrapper">
                        <label for="registrationLogSearch" class="form-label">Registration Log</label>
                        <input type="text" id="registrationLogSearch" class="form-control suggestion-input" placeholder="Search Registration Log..." autocomplete="off" />
                        <div id="registrationLogSearchSuggestions" class="suggestions"></div>
                      </div>
                    </div>


                    <!-- Lab Test -->
                    <div class="col-xxl-3 col-lg-4 col-sm-6 position-relative">
                      <label for="labTestSearch" class="form-label">Lab Test <span class="text-danger">*</span></label>
                      <input type="text" id="labTestSearch" class="form-control suggestion-input" placeholder="Search lab test..." autocomplete="off" />
                      <input type="hidden" id="labTestId" name="lab_test_id" />
                      <div id="labTestSearchSuggestions" class="suggestions"></div>
                    </div>

                      <!-- Test Notes -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <label for="itemNotes" class="form-label">Test Notes</label>
                        <input type="text" id="itemNotes" class="form-control" placeholder="Optional note for this test" />
                      </div>

                      <!-- ➕ Add Test -->
                      <div class="col-sm-12">
                        <div class="d-flex justify-content-start mb-3">
                          <button type="button" id="addItemBtn" class="btn btn-outline-primary">
                            <i class="ri-add-line me-1"></i> Add Test
                          </button>
                        </div>
                      </div>

                      <!-- Pills Container -->
                      <div class="col-sm-12">
                        <div id="requestPillsContainer" class="mb-3">
                          <p class="text-muted">No lab tests added yet.</p>
                        </div>
                      </div>

                      <!-- Request Date -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <label for="request_date" class="form-label">Request Date</label>
                        <input type="date" id="request_date" name="request_date" class="form-control" />
                      </div>

                      <!-- Emergency -->
                      <div class="col-md-3 form-check mt-4">
                        <input type="checkbox" id="is_emergency" name="is_emergency" class="form-check-input" />
                        <label class="form-check-label" for="is_emergency">Emergency?</label>
                      </div>

                      <!-- Notes -->
                      <div class="col-sm-12">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea id="notes" class="form-control" placeholder="Additional notes (optional)" rows="2"></textarea>
                      </div>

                      <!-- Buttons -->
                      <div class="col-sm-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                            <i class="ri-arrow-go-back-line me-1"></i> Cancel
                          </button>
                          <button type="reset" id="clearBtn" class="btn btn-warning">
                            <i class="ri-refresh-line me-1"></i> Clear
                          </button>
                          <button type="submit" class="btn btn-primary">
                            <i class="ri-save-3-line me-1"></i> Submit All
                          </button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>
                <!-- /formContainer -->
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/labrequest/add-lab-request.js"></script>
</body>
</html>
