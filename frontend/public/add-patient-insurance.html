<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Patient Insurance</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add Patient Insurance">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">

  <!-- 🔥 LOCK STYLE -->
  <style>
    .lockable:disabled {
      background-color: #e9ecef !important;
      cursor: not-allowed;
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Patient Insurance</li>
          <li class="breadcrumb-item text-primary">Add Patient Insurance</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Patient Insurance</h5>
              </div>

              <div class="card-body">
                <div id="formContainer">
                  <form id="patientInsuranceForm" novalidate>
                    <div class="row gx-4">

                      <!-- ================= Identity ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Identity</h6>
                        <hr />
                      </div>

                      <!-- Patient -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="field-wrapper">
                          <label class="form-label">Patient <span class="text-danger">*</span></label>
                          <input type="text" class="form-control suggestion-input" id="patientInput"
                            placeholder="Search patient..." autocomplete="off" />
                          <input type="hidden" id="patientId" name="patient_id" />
                          <div id="patientSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                        <!-- Provider -->
                        <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="field-wrapper">
                            <label class="form-label">Insurance Provider <span class="text-danger">*</span></label>
                            <select class="form-select" id="providerSelect" name="provider_id" required>
                            <option value="">-- Select Provider --</option>
                            </select>
                        </div>
                        </div>

                      <!-- Policy Number -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Policy Number <span class="text-danger">*</span></label>
                          <input type="text" class="form-control" id="policyNumber" name="policy_number" />
                        </div>
                      </div>

                      <!-- ================= Policy ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Policy Details</h6>
                        <hr />
                      </div>

                      <!-- Plan Name -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Plan Name</label>
                          <input type="text" class="form-control" id="planName" name="plan_name" />
                        </div>
                      </div>

                      <!-- Coverage Limit -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Coverage Limit</label>
                          <input type="number" step="0.01" class="form-control" id="coverageLimit" name="coverage_limit" />
                        </div>
                      </div>
                        <!-- Currency -->
                        <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                            <label class="form-label">
                            Currency <span class="text-danger">*</span>
                            </label>
                            <select class="form-control" id="currencySelect" name="currency" required>
                            <option value="">— Select Currency —</option>
                            <option value="USD" selected>USD</option>
                            <option value="LRD">LRD</option>
                            </select>
                        </div>
                        </div>
                      <!-- Is Primary -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="form-check mt-4">
                          <input class="form-check-input" type="checkbox" id="isPrimary" name="is_primary">
                          <label class="form-check-label">Primary Insurance</label>
                        </div>
                      </div>

                      <!-- ================= Validity ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Validity</h6>
                        <hr />
                      </div>

                      <!-- Valid From -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Valid From</label>
                          <input type="date" class="form-control" id="validFrom" name="valid_from" />
                        </div>
                      </div>

                      <!-- Valid To -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Valid To</label>
                          <input type="date" class="form-control" id="validTo" name="valid_to" />
                        </div>
                      </div>

                      <!-- Notes -->
                      <div class="col-12">
                        <div class="mb-3">
                          <label class="form-label">Notes</label>
                          <textarea class="form-control" id="notes" name="notes"></textarea>
                        </div>
                      </div>

                      <!-- ================= Scope ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Scope</h6>
                        <hr />
                      </div>

                      <!-- Organization -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label">Organization *</label>
                          <select class="form-control" id="organizationSelect"></select>
                        </div>
                      </div>

                      <!-- Facility -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label">Facility</label>
                          <select class="form-control" id="facilitySelect"></select>
                        </div>
                      </div>

                      <!-- ================= Actions ================= -->
                      <div class="col-sm-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                            Cancel
                          </button>
                          <button type="reset" id="clearBtn" class="btn btn-warning">
                            Clear
                          </button>
                          <button type="submit" class="btn btn-primary">
                            Save Insurance
                          </button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>

      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script type="module" src="js/modules/patient-insurance/add-patient-insurance.js"></script>
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
