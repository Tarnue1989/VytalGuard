<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Billable Item</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add Billable Item">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS (UNCHANGED) -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Billing</li>
          <li class="breadcrumb-item text-primary">Add Billable Item</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Billable Item</h5>
              </div>
              <div class="card-body">

                <div id="formContainer">
                  <form id="billableItemForm" novalidate>
                    <div class="row gx-4">

                      <!-- ================= Identity ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Identity</h6>
                        <hr />
                      </div>

                      <!-- Organization -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12 d-none" id="organizationFieldGroup">
                        <div class="mb-3">
                          <label class="form-label">Organization</label>
                          <select class="form-control" id="organizationSelect"></select>
                        </div>
                      </div>

                      <!-- Facility -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12 d-none" id="facilityFieldGroup">
                        <div class="mb-3">
                          <label class="form-label">Facility</label>
                          <select class="form-control" id="facilitySelect"></select>
                        </div>
                      </div>

                      <!-- Master Item (REPLACED Patient) -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="field-wrapper">
                          <label class="form-label">
                            Master Item <span class="text-danger">*</span>
                          </label>
                          <input type="text" id="masterItemSearch" class="form-control suggestion-input"
                            placeholder="Search master item..." autocomplete="off" />
                          <input type="hidden" id="master_item_id" />
                          <div id="masterItemSearchSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <!-- Name -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Name</label>
                          <input id="name" class="form-control" />
                        </div>
                      </div>

                      <!-- Code -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Code</label>
                          <input id="code" class="form-control" />
                        </div>
                      </div>

                      <!-- Department -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Department</label>
                          <select class="form-control" id="departmentSelect"></select>
                        </div>
                      </div>

                      <!-- Category -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Category</label>
                          <input id="category_name" class="form-control" readonly />
                          <input type="hidden" id="category_id" />
                        </div>
                      </div>

                      <!-- Description -->
                      <div class="col-xxl-6 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Description</label>
                          <textarea id="description" class="form-control"></textarea>
                        </div>
                      </div>

                      <!-- ================= Pricing (REPLACED MEDICATIONS) ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Pricing</h6>
                        <hr />
                      </div>

                      <!-- Payer Type -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Payer Type</label>
                          <select id="payer_type" class="form-control">
                            <option value="">-- Select --</option>
                            <option value="cash">Cash</option>
                            <option value="insurance">Insurance</option>
                          </select>
                        </div>
                      </div>

                      <!-- Currency -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Currency</label>
                          <select id="currency" class="form-control">
                            <option value="">-- Select --</option>
                            <option value="USD">USD</option>
                            <option value="LRD">LRD</option>
                          </select>
                        </div>
                      </div>

                      <!-- Price -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Price</label>
                          <input type="number" id="price" class="form-control" />
                        </div>
                      </div>

                      <!-- Default -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12 d-flex align-items-center">
                        <div class="form-check mt-4">
                          <input type="checkbox" id="is_default" class="form-check-input" />
                          <label class="form-check-label">Default Price</label>
                        </div>
                      </div>

                      <!-- Add -->
                      <div class="col-sm-12">
                        <button type="button" id="addItemBtn" class="btn btn-outline-primary">
                          Add Price
                        </button>
                      </div>

                      <!-- Pills -->
                      <div class="col-sm-12">
                        <div id="pricePillsContainer">
                          <p class="text-muted">No prices added yet.</p>
                        </div>
                      </div>

                      <!-- ================= Flags ================= -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12 d-flex align-items-center">
                        <div class="form-check mt-4">
                          <input type="checkbox" id="taxable" class="form-check-input" />
                          <label class="form-check-label">Taxable</label>
                        </div>
                      </div>

                      <div class="col-xxl-4 col-lg-6 col-sm-12 d-flex align-items-center">
                        <div class="form-check mt-4">
                          <input type="checkbox" id="discountable" class="form-check-input" />
                          <label class="form-check-label">Discountable</label>
                        </div>
                      </div>

                      <div class="col-xxl-4 col-lg-6 col-sm-12 d-flex align-items-center">
                        <div class="form-check mt-4">
                          <input type="checkbox" id="override_allowed" class="form-check-input" />
                          <label class="form-check-label">Override Allowed</label>
                        </div>
                      </div>

                      <!-- ================= Actions ================= -->
                      <div class="col-sm-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">Cancel</button>
                          <button type="reset" id="clearBtn" class="btn btn-warning">Clear</button>
                          <button type="submit" class="btn btn-primary">Save Item</button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>

    </div>
  </div>

  <!-- Loading -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <!-- JS (UNCHANGED) -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- MODULE -->
  <script type="module" src="js/modules/billable-item/add-billable-item.js"></script>

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
