<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Accounts</li>
          <li class="breadcrumb-item text-primary" aria-current="page">
            Accounts List
          </li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">

              <!-- Header -->
              <div class="card-header d-flex align-items-center justify-content-between">
                <h5 class="card-title mb-0">Accounts</h5>
                <a href="add-accounts.html" class="btn btn-primary ms-auto">
                  <i class="ri-add-line me-1"></i> Add Account
                </a>
              </div>

              <div class="card-body">

                <!-- ============================================================ -->
                <!-- 🔍 FILTERS (SIMPLIFIED) -->
                <!-- ============================================================ -->
                <div class="card panel-card mb-3">
                  <div class="card-header d-flex align-items-center justify-content-between">
                    <button id="toggleFilterBtn" class="btn btn-outline-secondary btn-sm">
                      <i class="fas fa-filter me-1"></i> Filters
                      <i id="filterChevron" class="fas fa-chevron-down ms-1"></i>
                    </button>

                    <!-- Export -->
                    <div class="view-actions d-flex gap-2">
                      <button id="exportCSVBtn" class="btn btn-outline-success btn-sm">CSV</button>
                      <button id="exportExcelBtn" class="btn btn-outline-secondary btn-sm">Excel</button>
                      <button id="exportPDFBtn" class="btn btn-outline-danger btn-sm">PDF</button>
                    </div>
                  </div>

                  <div id="filterCollapse" class="card-body filter-body hidden">
                    <div class="row gx-3 gy-2">

                      <!-- Search -->
                      <div class="col-md-3">
                        <label class="form-label">Search</label>
                        <input id="globalSearch" class="form-control" placeholder="Search..." />
                      </div>

                      <!-- Type -->
                      <div class="col-md-3">
                        <label class="form-label">Type</label>
                        <select id="filterType" class="form-select">
                          <option value="">All</option>
                          <option value="cash">Cash</option>
                          <option value="bank">Bank</option>
                          <option value="mobile_money">Mobile Money</option>
                          <option value="other">Other</option>
                        </select>
                      </div>

                      <!-- Status -->
                      <div class="col-md-3">
                        <label class="form-label">Status</label>
                        <select id="filterStatus" class="form-select">
                          <option value="">All</option>
                          <option value="true">Active</option>
                          <option value="false">Inactive</option>
                        </select>
                      </div>

                      <div class="col-12 mt-2">
                        <button id="resetFilterBtn" class="btn btn-outline-secondary btn-sm">
                          Clear
                        </button>
                      </div>

                    </div>
                  </div>
                </div>

                <!-- ============================================================ -->
                <!-- VIEW CONTROLS -->
                <!-- ============================================================ -->
                <div class="d-flex mb-2 align-items-center gap-2">

                  <div class="dropdown">
                    <button class="btn btn-outline-primary btn-sm dropdown-toggle"
                      data-bs-toggle="dropdown">
                      Select Fields
                    </button>
                    <div id="fieldSelectorDropdown" class="dropdown-menu p-2"></div>
                  </div>

                  <div class="btn-group">
                    <button id="cardViewBtn" class="btn btn-outline-secondary btn-sm">Card</button>
                    <button id="tableViewBtn" class="btn btn-outline-secondary btn-sm active">Table</button>
                  </div>

                </div>

                <!-- TABLE -->
                <div class="table-responsive table-container active">
                  <table class="table m-0 align-middle">
                    <thead id="dynamicTableHead"></thead>
                    <tbody id="accountTableBody"></tbody>
                  </table>
                </div>

                <!-- CARD -->
                <div id="accountList" class="card-list"></div>

                <!-- PAGINATION -->
                <div id="paginationButtons" class="text-center mt-3"></div>

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <!-- View Modal -->
  <div id="viewModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="viewModalTitle">Details</h2>
        <button id="closeViewModal" class="close-btn">&times;</button>
      </div>
      <div class="modal-body" id="viewModalBody"></div>
    </div>
  </div>

  <!-- JS (UNCHANGED EXCEPT MODULE) -->

  <script src="assets/js/custom.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- ONLY CHANGED -->

  <!-- KEEP OTHERS -->
  <script type="module" src="/js/logout.js"></script>

  <script type="module" src="/js/modules/shared/list-export.js"></script>
  <script type="module" src="/js/utils/navigation.js"></script>
    <script type="module" src="/js/utils/navigation.js"></script>

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>
