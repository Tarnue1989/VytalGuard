<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Delivery Record</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add a Delivery Record">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="dashboard.html"><i class="ri-home-3-line"></i></a></li>
          <li class="breadcrumb-item">Delivery Records</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Delivery Record</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Delivery Record</h5>
              </div>
              <div class="card-body">

              <!-- 📦 Form Container -->
              <div id="formContainer">
                <form id="deliveryRecordForm">
                  <div class="row gx-3 gy-3">

                    <!-- Patient (required) -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6 position-relative">
                      <label class="form-label" for="patientInput">
                        Patient <span class="text-danger">*</span>
                      </label>
                      <input type="text" class="form-control suggestion-input" id="patientInput"
                             placeholder="Search patient..." autocomplete="off" />
                      <input type="hidden" id="patientId" name="patient_id" />
                      <div id="patientSuggestions" class="suggestions"></div>
                    </div>

                    <!-- Doctor -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6 position-relative">
                      <label class="form-label" for="doctorInput">Doctor</label>
                      <input type="text" class="form-control suggestion-input" id="doctorInput"
                             placeholder="Search doctor..." autocomplete="off" />
                      <input type="hidden" id="doctorId" name="doctor_id" />
                      <div id="doctorSuggestions" class="suggestions"></div>
                    </div>

                    <!-- Midwife -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6 position-relative">
                      <label class="form-label" for="midwifeInput">Midwife</label>
                      <input type="text" class="form-control suggestion-input" id="midwifeInput"
                             placeholder="Search midwife..." autocomplete="off" />
                      <input type="hidden" id="midwifeId" name="midwife_id" />
                      <div id="midwifeSuggestions" class="suggestions"></div>
                    </div>

                    <!-- Delivery Date (required) -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="deliveryDate">
                        Delivery Date <span class="text-danger">*</span>
                      </label>
                      <input type="date" class="form-control" id="deliveryDate" name="delivery_date">
                    </div>

                    <!-- Delivery Type (required) -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="billableItemSelect">
                        Delivery Type <span class="text-danger">*</span>
                      </label>
                      <select class="form-control" id="billableItemSelect" name="billable_item_id"></select>
                      <input type="hidden" id="deliveryType" name="delivery_type" />
                    </div>

                    <!-- Delivery Mode -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="deliveryMode">Delivery Mode</label>
                      <select class="form-control" id="deliveryMode" name="delivery_mode">
                        <option value="">-- Select Mode --</option>
                        <option value="spontaneous">Spontaneous</option>
                        <option value="induced">Induced</option>
                      </select>
                    </div>

                    <!-- Baby Count -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="babyCount">Baby Count</label>
                      <input type="number" class="form-control" id="babyCount" name="baby_count" min="1">
                    </div>

                    <!-- Birth Weight -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="birthWeight">Birth Weight (kg)</label>
                      <input type="number" step="0.01" class="form-control" id="birthWeight" name="birth_weight">
                    </div>

                    <!-- Birth Length -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="birthLength">Birth Length (cm)</label>
                      <input type="number" step="0.1" class="form-control" id="birthLength" name="birth_length">
                    </div>

                    <!-- Newborn Weight -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="newbornWeight">Newborn Weight (kg)</label>
                      <input type="number" step="0.01" class="form-control" id="newbornWeight" name="newborn_weight">
                    </div>

                    <!-- Newborn Gender -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="newbornGender">Newborn Gender</label>
                      <select class="form-control" id="newbornGender" name="newborn_gender">
                        <option value="">-- Select Gender --</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                      </select>
                    </div>

                    <!-- Apgar Score -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="apgarScore">Apgar Score</label>
                      <input type="number" class="form-control" id="apgarScore" name="apgar_score" min="0" max="10">
                    </div>

                    <!-- Complications -->
                    <div class="col-md-6">
                      <label class="form-label" for="complications">Complications</label>
                      <textarea class="form-control" id="complications" name="complications" rows="2" placeholder="Describe complications"></textarea>
                    </div>

                    <!-- Notes -->
                    <div class="col-md-6">
                      <label class="form-label" for="notes">Notes</label>
                      <textarea class="form-control" id="notes" name="notes" rows="2" placeholder="Additional notes"></textarea>
                    </div>

                    <!-- Emergency -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6 form-check mt-4">
                      <input class="form-check-input" type="checkbox" id="isEmergency" name="is_emergency">
                      <label class="form-check-label" for="isEmergency">Emergency?</label>
                    </div>

                    <!-- Consultation -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="consultationSelect">Consultation</label>
                      <select class="form-control" id="consultationSelect" name="consultation_id"></select>
                    </div>

                    <!-- Department -->
                    <div class="col-md-4">
                      <div class="mb-3 form-group">
                        <label for="departmentSelect" class="form-label">Department</label>
                        <select id="departmentSelect" class="form-control" name="department_id"></select>
                      </div>
                    </div>

                    <!-- Organization (Superadmin only) -->
                    <div class="col-md-4">
                      <div class="mb-3 form-group">
                        <label for="organizationSelect" class="form-label">Organization</label>
                        <select id="organizationSelect" class="form-control"></select>
                      </div>
                    </div>

                    <!-- Facility -->
                    <div class="col-md-4">
                      <div class="mb-3 form-group">
                        <label for="facilitySelect" class="form-label">Facility</label>
                        <select id="facilitySelect" class="form-control"></select>
                      </div>
                    </div>

                    <!-- Buttons -->
                    <div class="col-sm-12">
                      <div class="d-flex gap-2 justify-content-end">
                        <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                          <i class="ri-arrow-go-back-line me-1"></i> Cancel
                        </button>
                        <button type="reset" id="clearBtn" class="btn btn-warning">
                          <i class="ri-refresh-line me-1"></i> Clear
                        </button>
                        <button type="submit" class="btn btn-primary">
                          <i class="ri-save-3-line me-1"></i> Save Delivery Record
                        </button>
                      </div>
                    </div>

                  </div>
                </form>
              </div>
              <!-- /formContainer -->

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/delivery-records/add-delivery-record.js"></script>
</body>
</html>
