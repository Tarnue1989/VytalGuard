<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Feature Access</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Manage Feature Access">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">

<style>
/* ===============================
   🔥 CARD COMPACT
================================= */
/* ===============================
   🔥 MODULE CARD (COMPACT)
================================= */
.module-card {
  font-size: 13px;
  border-radius: 10px;
}

.module-card .card-header {
  padding: 6px 10px !important;
  min-height: 42px;
}

.module-card .card-body {
  padding: 6px !important;
  max-height: 240px;
  overflow-y: auto;
}

/* ===============================
   🔥 PERMISSION GRID (FIXED)
   ⚠️ DO NOT break bootstrap grid
================================= */
.module-card .row {
  margin: 0;
}

.module-card .row > div {
  padding-left: 4px;
  padding-right: 4px;
}

/* ===============================
   🔥 PERMISSION ITEM (CLEAN)
================================= */
.module-card .form-check {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  margin-bottom: 4px;
}

/* checkbox */
.module-card .form-check-input {
  transform: scale(0.9);
  margin-top: 2px;
  cursor: pointer;
}

/* label */
.module-card .form-check-label {
  font-size: 12px;

  /* 🔥 FIX TEXT CUT ISSUE */
  white-space: normal;
  overflow: visible;
  word-break: break-word;
  line-height: 1.2;
}

/* ===============================
   🔥 PERMISSION GROUP TITLE
================================= */
.module-card .fw-semibold {
  font-size: 11px;
  margin-bottom: 2px;
}

/* ===============================
   🔥 ACTION BUTTONS (SMALL)
================================= */
.btn-xs {
  font-size: 11px;
  padding: 2px 6px;
}

/* ===============================
   🔥 EXPAND BUTTON (ARROW)
================================= */
.expand-btn {
  font-size: 11px;
  padding: 2px 6px;
  line-height: 1;
}

/* ===============================
   🔥 MODULE GRID (RESPONSIVE)
================================= */
.module-cards-grid .col-12 {
  display: flex;
}

.module-cards-grid .card {
  width: 100%;
}

/* ===============================
   🔥 SCROLLBAR (OPTIONAL CLEAN)
================================= */
.module-card .card-body::-webkit-scrollbar {
  width: 6px;
}

.module-card .card-body::-webkit-scrollbar-thumb {
  background: #ccc;
  border-radius: 4px;
}

.module-card .card-body::-webkit-scrollbar-thumb:hover {
  background: #999;
}
</style>
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Feature Access</li>
          <li class="breadcrumb-item text-primary">Add Access</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">

              <div class="card-header">
                <h5 class="card-title">Add Feature Access</h5>
              </div>

              <div class="card-body">
                <form id="featureAccessForm" novalidate>
                  <div class="row gx-4">

                    <!-- Scope -->
                    <div class="col-12">
                      <h6 class="mt-3">Scope</h6>
                      <hr />
                    </div>

                    <!-- Organization -->
                    <div class="col-lg-4 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label">Organization *</label>
                        <select class="form-select" id="organization_id" name="organization_id">
                          <option value="">-- Select Organization --</option>
                        </select>
                      </div>
                    </div>

                    <!-- Role -->
                    <div class="col-lg-4 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label">Role *</label>
                        <select class="form-select" id="role_id" name="role_id">
                          <option value="">-- Select Role --</option>
                        </select>
                      </div>
                    </div>

                    <!-- Modules -->
                    <div class="col-12 mt-3">
                      <h6>Select Modules & Permissions</h6>
                      <hr />
                      <div id="moduleCardsContainer" class="row g-2 module-cards-grid"></div>
                    </div>

                    <!-- Bulk Actions -->
                    <div class="col-12 d-flex flex-wrap gap-2 mb-3">
                      <button type="button" id="addAllModulesBtn" class="btn btn-sm btn-outline-primary">
                        <i class="ri-folder-add-line me-1"></i>
                        Select all modules
                      </button>

                      <button type="button" id="grantFullAccessBtn" class="btn btn-sm btn-outline-danger">
                        <i class="ri-shield-check-line me-1"></i>
                        Replace access
                      </button>
                    </div>

                    <!-- Facility -->
                    <div class="col-lg-4 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label">Facility</label>
                        <select class="form-select" id="facility_id">
                          <option value="">-- All Facilities --</option>
                        </select>
                      </div>
                    </div>

                    <!-- Status -->
                    <div class="col-lg-4 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label">Status *</label>
                        <div>
                          <label class="me-2">
                            <input type="radio" name="status" value="active" checked> Active
                          </label>
                          <label>
                            <input type="radio" name="status" value="inactive"> Inactive
                          </label>
                        </div>
                      </div>
                    </div>

                  <!-- Actions -->
                  <div class="col-12">
                    <div class="d-flex gap-2 justify-content-end">
                      <button 
                        type="button" 
                        class="btn btn-outline-secondary"
                        onclick="window.location.href='/feature-access-list.html'"
                      >
                        Back
                      </button>
                      <button type="reset" class="btn btn-warning">Reset</button>
                      <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                  </div>
                  </div>
                </form>
              </div>

            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/feature-access/add-feature-access.js"></script>

  <!-- Auth -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
