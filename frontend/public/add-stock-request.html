<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Stock Request</title>

  <meta name="description" content="VytalGuard HMS - Add Stock Request">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="dashboard.html"><i class="ri-home-3-line"></i></a></li>
          <li class="breadcrumb-item">Stock Requests</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Request</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Stock Request</h5>
              </div>
              <div class="card-body">

                <!-- 📦 Form Container -->
                <div id="formContainer">
                  <form id="stockRequestForm">
                    <div class="row gx-4">

                      <!-- Organization -->
                      <div class="col-md-4">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="organizationSelect">Organization</label>
                          <select class="form-control" id="organizationSelect" name="organization_id"></select>
                        </div>
                      </div>

                      <!-- Facility -->
                      <div class="col-md-4">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="facilitySelect">Facility</label>
                          <select class="form-control" id="facilitySelect" name="facility_id"></select>
                        </div>
                      </div>

                      <!-- Department -->
                      <div class="col-md-4">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="departmentSelect">Department <span class="text-danger">*</span></label>
                          <select class="form-control" id="departmentSelect" name="department_id"></select>
                        </div>
                      </div>

                      <!-- Reference Number -->
                      <div class="col-md-4">
                        <div class="mb-3">
                          <label class="form-label" for="referenceNumber">Reference #</label>
                          <input type="text" class="form-control" id="referenceNumber" placeholder="Auto / Optional">
                        </div>
                      </div>

                      <!-- Notes -->
                      <div class="col-md-8">
                        <div class="mb-3">
                          <label class="form-label" for="notes">Notes</label>
                          <textarea class="form-control" id="notes" rows="2" placeholder="Enter notes"></textarea>
                        </div>
                      </div>

                      <!-- Item Search -->
                      <div class="col-md-6">
                        <div class="field-wrapper">
                          <label class="form-label" for="itemSearch">Item <span class="text-danger">*</span></label>
                          <input type="text" id="itemSearch" class="form-control suggestion-input" placeholder="Search item..." autocomplete="off" />
                          <div id="itemSearchSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <!-- Quantity -->
                      <div class="col-md-3">
                        <div class="mb-3">
                          <label class="form-label" for="quantity">Quantity <span class="text-danger">*</span></label>
                          <input type="number" class="form-control" id="quantity" placeholder="0" min="1">
                        </div>
                      </div>

                      <!-- Remarks -->
                      <div class="col-md-3">
                        <div class="mb-3">
                          <label class="form-label" for="remarks">Remarks</label>
                          <input type="text" class="form-control" id="remarks" placeholder="Optional remarks">
                        </div>
                      </div>

                      <!-- ➕ Add Item Button -->
                      <div class="col-sm-12">
                        <div class="d-flex justify-content-start mb-3">
                          <button type="button" id="addItemBtn" class="btn btn-outline-primary">
                            <i class="ri-add-line me-1"></i> Add Item
                          </button>
                        </div>
                      </div>

                      <!-- Pills Container -->
                      <div class="col-sm-12">
                        <div id="itemPillsContainer" class="mb-3">
                          <p class="text-muted">No items added yet.</p>
                        </div>
                      </div>

                      <!-- Buttons -->
                      <div class="col-sm-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                            <i class="ri-arrow-go-back-line me-1"></i> Cancel
                          </button>
                          <button type="reset" id="clearBtn" class="btn btn-warning">
                            <i class="ri-refresh-line me-1"></i> Clear
                          </button>
                          <button type="submit" class="btn btn-primary">
                            <i class="ri-save-3-line me-1"></i> Submit All
                          </button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>
                <!-- /formContainer -->

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/stockrequest/add-stockrequest.js"></script>
 
  

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
