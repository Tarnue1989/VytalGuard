<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Organization Branding</title>

  <!-- 🔥 Dynamic favicon -->
  <link id="appFavicon" rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/css/admin-global.css">

  <style>
    /* 🔥 Clean header look */
    .branding-preview {
      background: #fff;
    }

    .branding-preview img {
      border-radius: 6px;
    }
  </style>
</head>

<body>
<div class="page-wrapper">
<div class="app-container">

<!-- Header -->
<div class="app-header d-flex align-items-center"></div>

<!-- Breadcrumb -->
<div class="app-hero-header d-flex align-items-center">
  <ol class="breadcrumb">
    <li class="breadcrumb-item">
      <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
    </li>
    <li class="breadcrumb-item">Settings</li>
    <li class="breadcrumb-item text-primary">Organization Branding</li>
  </ol>
</div>

<!-- Body -->
<div class="app-body">
<div class="row gx-4">
<div class="col-sm-12">

<div class="card">

<div class="card-header d-flex justify-content-between align-items-center">
  <h5 class="card-title mb-0">Organization Branding</h5>

  <button id="editBtn" class="btn btn-primary btn-sm">
    <i class="ri-edit-line me-1"></i> Edit
  </button>
</div>

<div class="card-body">

<!-- 🔥 BRANDING HEADER (LEFT LOGO STYLE) -->
<div class="branding-preview p-4 border rounded mb-4">

  <div class="d-flex align-items-center gap-3">

    <!-- Logo LEFT -->
    <img
      id="previewLogo"
      src=""
      style="max-height:80px; object-fit:contain;"
      alt="Logo"
    />

    <!-- Text RIGHT -->
    <div>

      <h4 id="previewName" class="mb-1 fw-semibold">
        Organization
      </h4>

      <div id="previewAddress" class="text-muted small">
        —
      </div>

      <div id="previewPhone" class="text-muted small">
        <!-- JS injects 📞 tel -->
      </div>

      <div id="previewEmail" class="text-muted small">
        <!-- JS injects 📧 mailto -->
      </div>

    </div>

  </div>

</div>

<!-- 🔥 DETAILS -->
<div class="row">

  <!-- Contact -->
  <div class="col-md-6">
    <h6>Contact Info</h6>

    <p>
      <strong>Address:</strong>
      <span id="viewAddress">—</span>
    </p>

    <p>
      <strong>Phone:</strong>
      <span id="viewPhone">—</span>
    </p>

    <p>
      <strong>Email:</strong>
      <span id="viewEmail">—</span>
    </p>
  </div>

  <!-- Theme -->
  <div class="col-md-6">
    <h6>Theme</h6>

    <p><strong>Primary:</strong> <span id="viewPrimary">—</span></p>
    <p><strong>Secondary:</strong> <span id="viewSecondary">—</span></p>
    <p><strong>Surface:</strong> <span id="viewSurface">—</span></p>
    <p><strong>Text:</strong> <span id="viewText">—</span></p>
  </div>

</div>

<!-- 🔥 STATUS -->
<div class="mt-3">
  <h6>Status</h6>
  <p><strong>Current:</strong> <span id="viewStatus">—</span></p>
</div>

</div>
</div>

</div>
</div>
</div>

<!-- Footer -->
<div class="app-footer">
  <span>© VytalGuard HMS 2025</span>
</div>

</div>
</div>

<!-- JS -->
<script type="module" src="js/modules/organization-branding/branding-view.js"></script>

 
  

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
