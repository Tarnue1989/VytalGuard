<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Discount Waivers List</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Discount Waivers List">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
  <link rel="stylesheet" href="assets/vendor/datatables/dataTables.bs5.css">
  <link rel="stylesheet" href="assets/vendor/datatables/dataTables.bs5-custom.css">
  <link rel="stylesheet" href="assets/vendor/datatables/buttons/dataTables.bs5-custom.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/filter-page.css" />
  <link rel="stylesheet" href="assets/css/print.css" media="print" />
  <link rel="stylesheet" href="assets/css/summary.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Hero Header -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Discount Waivers</li>
          <li class="breadcrumb-item text-primary" aria-current="page">
            Waivers List
          </li>
        </ol>

        <div class="ms-auto d-lg-flex d-none flex-row">
          <div class="input-group">
            <span class="input-group-text bg-primary-lighten">
              <i class="ri-calendar-2-line text-primary"></i>
            </span>
            <input type="text" id="dateRange" class="form-control custom-daterange">
          </div>
        </div>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">

            <div class="card">
              <div class="card-header d-flex align-items-center justify-content-between">
                <h5 class="card-title">Discount Waivers</h5>
                <a href="add-discount-waiver.html" class="btn btn-primary ms-auto">
                  <i class="ri-add-line me-1"></i> Add
                </a>
              </div>

              <div class="card-body">

                <!-- Filters -->
                <div class="card panel-card mb-3">
                  <div class="card-header d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center gap-2">
                      <button id="toggleFilterBtn" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-filter me-1"></i> Filters
                        <i id="filterChevron" class="fas fa-chevron-down toggle-icon ms-1"></i>
                      </button>
                    </div>

                    <!-- ✅ Export Buttons -->
                    <div class="view-actions d-flex gap-2">
                      <button id="exportCSVBtn" class="btn btn-outline-success btn-sm">
                        <i class="fas fa-file-csv me-1"></i> CSV
                      </button>
                      <button id="exportExcelBtn" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-file-excel me-1"></i> Excel
                      </button>
                      <button id="exportPDFBtn" class="btn btn-outline-danger btn-sm">
                        <i class="fas fa-file-pdf me-1"></i> PDF
                      </button>
                    </div>
                  </div>

                  <div id="filterCollapse" class="card-body filter-body">
                    <div class="section-label mb-2"><strong>Filter Discount Waivers</strong></div>
                    <div class="row g-3 filter-grid compact">

                      <!-- Invoice -->
                      <div class="col-md-3">
                        <label for="filterInvoice" class="form-label">Invoice</label>
                        <input type="text" id="filterInvoice" class="form-control suggestion-input" placeholder="Search invoice..." autocomplete="off" />
                        <input type="hidden" id="filterInvoiceId" />
                        <div id="filterInvoiceSuggestions" class="suggestions"></div>
                      </div>

                      <!-- Patient -->
                      <div class="col-md-3">
                        <label for="filterPatient" class="form-label">Patient</label>
                        <input type="text" id="filterPatient" class="form-control suggestion-input" placeholder="Search patient..." autocomplete="off" />
                        <input type="hidden" id="filterPatientId" />
                        <div id="filterPatientSuggestions" class="suggestions"></div>
                      </div>

                      <!-- Type -->
                      <div class="col-md-3">
                        <label for="filterTypeSelect" class="form-label">Type</label>
                        <select id="filterTypeSelect" class="form-select">
                          <option value="">All</option>
                          <option value="percentage">Percentage</option>
                          <option value="fixed">Fixed</option>
                        </select>
                      </div>

                      <!-- Status -->
                      <div class="col-md-3">
                        <label for="filterStatus" class="form-label">Status</label>
                        <select id="filterStatus" class="form-select">
                          <option value="">All</option>
                          <option value="pending">Pending</option>
                          <option value="approved">Approved</option>
                          <option value="rejected">Rejected</option>
                          <option value="voided">Voided</option>
                          <option value="reversed">Reversed</option>
                        </select>
                      </div>

                      <!-- Reason -->
                      <div class="col-md-3">
                        <label for="filterReason" class="form-label">Reason</label>
                        <input type="text" id="filterReason" class="form-control" placeholder="Search by reason..." />
                      </div>

                      <!-- Org / Facility -->
                      <div class="col-md-3">
                        <label for="filterOrganizationSelect" class="form-label">Organization</label>
                        <select id="filterOrganizationSelect" class="form-select"></select>
                      </div>
                      <div class="col-md-3">
                        <label for="filterFacilitySelect" class="form-label">Facility</label>
                        <select id="filterFacilitySelect" class="form-select"></select>
                      </div>

                      <!-- Created / Approved -->
                      <div class="col-md-2">
                        <label for="filterCreatedFrom" class="form-label">Created From</label>
                        <input type="date" id="filterCreatedFrom" class="form-control" />
                      </div>
                      <div class="col-md-2">
                        <label for="filterCreatedTo" class="form-label">Created To</label>
                        <input type="date" id="filterCreatedTo" class="form-control" />
                      </div>

                      <div class="col-md-2">
                        <label for="filterApprovedFrom" class="form-label">Approved From</label>
                        <input type="date" id="filterApprovedFrom" class="form-control" />
                      </div>
                      <div class="col-md-2">
                        <label for="filterApprovedTo" class="form-label">Approved To</label>
                        <input type="date" id="filterApprovedTo" class="form-control" />
                      </div>

                      <!-- Approved / Rejected / Voided By -->
                      <div class="col-md-3">
                        <label for="filterApprovedBy" class="form-label">Approved By</label>
                        <input type="text" id="filterApprovedBy" class="form-control suggestion-input" placeholder="Approver name..." autocomplete="off" />
                        <input type="hidden" id="filterApprovedById" />
                        <div id="filterApprovedBySuggestions" class="suggestions"></div>
                      </div>

                      <div class="col-md-3">
                        <label for="filterRejectedBy" class="form-label">Rejected By</label>
                        <input type="text" id="filterRejectedBy" class="form-control suggestion-input" placeholder="Rejector name..." autocomplete="off" />
                        <input type="hidden" id="filterRejectedById" />
                        <div id="filterRejectedBySuggestions" class="suggestions"></div>
                      </div>

                      <div class="col-md-3">
                        <label for="filterVoidedBy" class="form-label">Voided By</label>
                        <input type="text" id="filterVoidedBy" class="form-control suggestion-input" placeholder="Voider name..." autocomplete="off" />
                        <input type="hidden" id="filterVoidedById" />
                        <div id="filterVoidedBySuggestions" class="suggestions"></div>
                      </div>

                      <!-- Actions -->
                      <div class="col-12 d-flex gap-2 filter-actions">
                        <button id="filterBtn" class="btn btn-primary btn-sm">
                          <i class="fas fa-search me-1"></i> Search
                        </button>
                        <button id="resetFilterBtn" class="btn btn-outline-secondary btn-sm">
                          <i class="fas fa-times me-1"></i> Clear
                        </button>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- View Toggle + Field Selector -->
                <div class="d-flex mb-2 view-toggle compact">
                  <div class="dropdown relative-wrapper export-ignore">
                    <button class="btn btn-outline-primary btn-sm dropdown-toggle" id="fieldSelectorBtn"
                            data-bs-toggle="dropdown" aria-expanded="false">
                      <i class="fas fa-columns me-1"></i> Select Fields
                    </button>
                    <div class="dropdown-menu p-2 field-selector-dropdown" id="fieldSelectorDropdown"
                         style="min-width:240px;"></div>
                  </div>
                  <div class="btn-group" role="group">
                    <button id="cardViewBtn" class="btn btn-outline-secondary btn-sm btn-toggle">
                      <i class="fas fa-th me-1"></i> Card View
                    </button>
                    <button id="tableViewBtn" class="btn btn-outline-secondary btn-sm btn-toggle active">
                      <i class="fas fa-table me-1"></i> Table View
                    </button>
                  </div>
                </div>

                <!-- Records per page -->
                <div class="btn-group align-items-center ms-2" role="group">

                  <span class="btn btn-outline-secondary btn-sm px-2 pe-none">
                    Show
                  </span>

                  <select id="recordsPerPage"
                          class="btn btn-outline-secondary btn-sm text-center"
                          style="width:64px; appearance:auto;">
                    <option value="10">10</option>
                    <option value="25" selected>25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                  </select>

                  <span class="btn btn-outline-secondary btn-sm px-2 pe-none">
                    Rows
                  </span>

                </div>

                <!-- 📊 Breakdown Summary -->
                <hr class="my-2">

                <div class="text-muted fw-semibold small mb-1">
                  Breakdown Summary
                </div>

                <div class="module-summary">
  <div id="moduleSummary"></div>
</div>
                <hr class="my-2">

                <!-- Table -->
                <div class="table-responsive table-container active">
                  <table class="table m-0 align-middle data-table print-table">
                    <caption class="visually-hidden">Discount Waivers listing with dynamic fields</caption>
                    <thead id="dynamicTableHead"></thead>
                    <tbody id="discountWaiverTableBody"></tbody>
                  </table>
                </div>

                <!-- Card list -->
                <div id="discountWaiverList" class="card-list"></div>

                <!-- Pagination -->
                <div id="paginationButtons" class="pagination-controls text-center mt-3"></div>

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <div id="viewModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="viewModalTitle">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="viewModalTitle">Details</h2>
        <button id="closeViewModal" class="close-btn" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="viewModalBody"></div>
    </div>
  </div>

  <!-- 🚫 Void Modal -->
  <div id="discountWaiverVoidModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="discountWaiverVoidTitle">
    <div class="modal-content shadow-lg rounded-3">
      <div class="modal-header">
        <h2 id="discountWaiverVoidTitle" class="fs-5 text-danger mb-0">
          <i class="fas fa-ban me-1 text-danger"></i> Void Waiver
        </h2>
        <button class="close-btn" data-close="discountWaiverVoidModal" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body p-3">
        <p class="text-muted mb-2">Please provide a brief reason for voiding this waiver.</p>
        <textarea id="voidReasonInput" class="form-control mb-3" rows="3" placeholder="Enter void reason..."></textarea>
        <div class="d-flex justify-content-end gap-2">
          <button class="btn btn-outline-secondary btn-sm" data-close="discountWaiverVoidModal">
            <i class="fas fa-times me-1"></i> Cancel
          </button>
          <button id="confirmVoidBtn" class="btn btn-danger btn-sm">
            <i class="fas fa-check me-1"></i> Confirm Void
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/vendor/datatables/dataTables.min.js"></script>
  <script src="assets/vendor/datatables/dataTables.bootstrap.min.js"></script>
  <script src="assets/vendor/datatables/custom/custom-datatables.js"></script>
  <script src="assets/js/custom.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script type="module" src="/js/logout.js"></script>
  <script type="module" src="/js/authSession.js"></script>

  <!-- Discount Waiver modules -->
  <script type="module" src="/js/modules/discount-waivers/discount-waiver-filter-main.js"></script>
  <script type="module" src="/js/modules/discount-waivers/discount-waiver-render.js"></script>

  <!-- Shared Export Binder -->
  <script type="module" src="/js/modules/shared/list-export.js"></script>
</body>
</html>
