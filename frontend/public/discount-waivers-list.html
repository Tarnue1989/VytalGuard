<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VytalGuard - Discount Waivers List</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Discount Waivers List" />
  <link rel="shortcut icon" href="assets/images/favicon.svg" />

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css" />
  <link rel="stylesheet" href="assets/css/main.min.css" />
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css" />
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css" />
  <link rel="stylesheet" href="assets/vendor/datatables/dataTables.bs5.css" />
  <link rel="stylesheet" href="assets/vendor/datatables/dataTables.bs5-custom.css" />
  <link rel="stylesheet" href="assets/vendor/datatables/buttons/dataTables.bs5-custom.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/filter-page.css" />
  <link rel="stylesheet" href="assets/css/print.css" media="print" />
  <link rel="stylesheet" href="assets/css/summary.css" />
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Discount Waivers</li>
          <li class="breadcrumb-item text-primary" aria-current="page">
            Waivers List
          </li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">

              <!-- Card Header -->
              <div class="card-header d-flex align-items-center justify-content-between">
                <h5 class="card-title mb-0">Discount Waivers</h5>
                <a href="add-discount-waiver.html" class="btn btn-primary ms-auto">
                  <i class="ri-add-line me-1"></i> Add Waiver
                </a>
              </div>

              <div class="card-body">

                <!-- ============================================================ -->
                <!-- 🔍 FILTER SECTION (MASTER PARITY) -->
                <!-- ============================================================ -->
                <div class="card panel-card mb-3">
                  <div class="card-header d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center gap-2">
                      <button id="toggleFilterBtn" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-filter me-1"></i> Filters
                        <i id="filterChevron" class="fas fa-chevron-down toggle-icon ms-1"></i>
                      </button>
                    </div>

                    <!-- Export Buttons -->
                    <div class="view-actions d-flex gap-2">
                      <button id="exportCSVBtn" class="btn btn-outline-success btn-sm">
                        <i class="fas fa-file-csv me-1"></i> CSV
                      </button>
                      <button id="exportExcelBtn" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-file-excel me-1"></i> Excel
                      </button>
                      <button id="exportPDFBtn" class="btn btn-outline-danger btn-sm">
                        <i class="fas fa-file-pdf me-1"></i> PDF
                      </button>
                    </div>
                  </div>

                  <!-- Collapsible Filter Body -->
                  <div id="filterCollapse" class="card-body filter-body hidden">
                    <div class="section-label mb-2">
                      <strong>Filter Discount Waivers</strong>
                    </div>

                    <div class="row gx-3 gy-2 filter-grid compact">

                      <!-- Patient -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="field-wrapper">
                          <label for="filterPatient" class="form-label">Patient</label>
                          <input
                            type="text"
                            id="filterPatient"
                            class="form-control suggestion-input"
                            placeholder="Search patient..."
                            autocomplete="off"
                          />
                          <input type="hidden" id="filterPatientId" />
                          <div id="filterPatientSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                                            <!-- Invoice -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="field-wrapper">
                          <label for="filterInvoice" class="form-label">Invoice</label>
                          <input
                            type="text"
                            id="filterInvoice"
                            class="form-control suggestion-input"
                            placeholder="Search invoice..."
                            autocomplete="off"
                          />
                          <input type="hidden" id="filterInvoiceId" />
                          <div id="filterInvoiceSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <!-- Status -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="field-wrapper">
                          <label class="form-label" for="filterStatus">Status</label>
                          <select id="filterStatus" class="form-select">
                            <option value="">All</option>
                            <option value="pending">Pending</option>
                            <option value="approved">Approved</option>
                            <option value="applied">Applied</option>
                            <option value="rejected">Rejected</option>
                            <option value="voided">Voided</option>
                            <option value="finalized">Finalized</option>
                          </select>
                        </div>
                      </div>

                      <!-- Organization -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="field-wrapper">
                          <label class="form-label" for="filterOrganizationSelect">Organization</label>
                          <select id="filterOrganizationSelect" class="form-select"></select>
                        </div>
                      </div>

                      <!-- Facility -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="field-wrapper">
                          <label class="form-label" for="filterFacilitySelect">Facility</label>
                          <select id="filterFacilitySelect" class="form-select"></select>
                        </div>
                      </div>

                      <!-- Date Range (MASTER – SINGLE FIELD) -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="field-wrapper">
                          <label for="dateRange" class="form-label">Date Range</label>
                          <div class="input-group">
                            <span class="input-group-text bg-primary-lighten">
                              <i class="ri-calendar-2-line text-primary"></i>
                            </span>
                            <input
                              type="text"
                              id="dateRange"
                              class="form-control custom-daterange"
                              placeholder="Select date range"
                            />
                          </div>
                        </div>
                      </div>

                      <!-- Filter Actions -->
                      <div class="col-12 d-flex gap-2 filter-actions mt-2">
                        <button id="resetFilterBtn" class="btn btn-outline-secondary btn-sm">
                          <i class="fas fa-times me-1"></i> Clear
                        </button>
                      </div>

                    </div>
                  </div>
                </div>

                <!-- ============================================================ -->
                <!-- 🧭 VIEW CONTROLS -->
                <!-- ============================================================ -->
                <div class="d-flex mb-2 view-toggle compact align-items-center gap-2 flex-wrap">

                  <!-- Field Selector -->
                  <div class="dropdown relative-wrapper export-ignore">
                    <button
                      class="btn btn-outline-primary btn-sm dropdown-toggle"
                      id="fieldSelectorBtn"
                      data-bs-toggle="dropdown"
                      aria-expanded="false"
                    >
                      <i class="fas fa-columns me-1"></i> Select Fields
                    </button>
                    <div
                      class="dropdown-menu p-2 field-selector-dropdown"
                      id="fieldSelectorDropdown"
                      style="min-width:240px;"
                    ></div>
                  </div>

                  <!-- View Toggle -->
                  <div class="btn-group" role="group">
                    <button id="cardViewBtn" class="btn btn-outline-secondary btn-sm btn-toggle">
                      <i class="fas fa-th me-1"></i> Card View
                    </button>
                    <button id="tableViewBtn" class="btn btn-outline-secondary btn-sm btn-toggle active">
                      <i class="fas fa-table me-1"></i> Table View
                    </button>
                  </div>
                </div>

                <!-- Records Per Page -->
                <div class="btn-group align-items-center ms-2" role="group">
                  <span class="btn btn-outline-secondary btn-sm px-2 pe-none">Show</span>
                  <select
                    id="recordsPerPage"
                    class="btn btn-outline-secondary btn-sm text-center"
                    style="width:64px; appearance:auto;"
                  >
                    <option value="10">10</option>
                    <option value="25" selected>25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                  </select>
                  <span class="btn btn-outline-secondary btn-sm px-2 pe-none">Rows</span>
                </div>

                <!-- 📊 Breakdown Summary -->
                <hr class="my-2" />
                <div class="text-muted fw-semibold small mb-1">Breakdown Summary</div>
                <div class="module-summary">
                  <div id="moduleSummary"></div>
                </div>
                <hr class="my-2" />

                <!-- ============================================================ -->
                <!-- 📋 TABLE VIEW -->
                <!-- ============================================================ -->
                <div class="table-responsive table-container active">
                  <table class="table m-0 align-middle data-table print-table">
                    <thead id="dynamicTableHead"></thead>
                    <tbody id="discountWaiverTableBody"></tbody>
                  </table>
                </div>

                <!-- ============================================================ -->
                <!-- 🗂️ CARD VIEW -->
                <!-- ============================================================ -->
                <div id="discountWaiverList" class="card-list"></div>

                <!-- ============================================================ -->
                <!-- 🔢 PAGINATION -->
                <!-- ============================================================ -->
                <div id="paginationButtons" class="pagination-controls text-center mt-3"></div>

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <!-- View Modal -->
  <div id="viewModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="viewModalTitle">Details</h2>
        <button id="closeViewModal" class="close-btn">&times;</button>
      </div>
      <div class="modal-body" id="viewModalBody"></div>
    </div>
  </div>

  <!-- 🚫 Void Waiver Modal (MASTER) -->
  <div id="discountWaiverVoidModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Void Waiver</h2>
        <button class="close-btn" data-close="discountWaiverVoidModal">&times;</button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label for="voidReasonInput" class="form-label">Reason for voiding</label>
          <textarea
            id="voidReasonInput"
            class="form-control"
            rows="3"
            placeholder="Enter reason..."
          ></textarea>
        </div>
      </div>

      <div class="modal-footer d-flex justify-content-end gap-2">
        <button class="btn btn-secondary" data-close="discountWaiverVoidModal">
          Cancel
        </button>
        <button id="confirmVoidBtn" class="btn btn-danger">
          Void Waiver
        </button>
      </div>
    </div>
  </div>
  <!-- 🚫 Reject Waiver Modal (MASTER) -->
  <div id="discountWaiverRejectModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Reject Waiver</h2>
        <button class="close-btn" data-close="discountWaiverRejectModal">&times;</button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label for="rejectReasonInput" class="form-label">Reason for rejection</label>
          <textarea
            id="rejectReasonInput"
            class="form-control"
            rows="3"
            placeholder="Enter rejection reason..."
          ></textarea>
        </div>
      </div>

      <div class="modal-footer d-flex justify-content-end gap-2">
        <button class="btn btn-secondary" data-close="discountWaiverRejectModal">
          Cancel
        </button>
        <button id="confirmRejectBtn" class="btn btn-danger">
          Reject Waiver
        </button>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/vendor/datatables/dataTables.min.js"></script>
  <script src="assets/vendor/datatables/dataTables.bootstrap.min.js"></script>
  <script src="assets/vendor/datatables/custom/custom-datatables.js"></script>
  <script src="assets/js/custom.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script type="module" src="/js/logout.js"></script>
  <script type="module" src="/js/authSession.js"></script>

  <!-- Discount Waiver modules -->
  <script type="module" src="/js/modules/discount-waivers/discount-waiver-filter-main.js"></script>
  <script type="module" src="/js/modules/discount-waivers/discount-waiver-render.js"></script>

  <!-- Shared Export Binder -->
  <script type="module" src="/js/modules/shared/list-export.js"></script>
<script type="module" src="/js/utils/navigation.js"></script>
</body>

</html>
