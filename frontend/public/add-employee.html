<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Employee</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add an Employee">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Employees</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Employee</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Employee</h5>
              </div>
              <div class="card-body">

              <!-- 📦 Form Container -->
              <div id="formContainer">
                <form id="employeeForm" enctype="multipart/form-data" novalidate>
                  <div class="row gx-3 gy-2">

                    <!-- ================= Identity ================= -->
                    <div class="col-12"><h6 class="mt-3">Identity</h6><hr/></div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="first_name">First Name <span class="text-danger">*</span></label>
                      <input type="text" class="form-control" id="first_name" name="first_name">
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="middle_name">Middle Name</label>
                      <input type="text" class="form-control" id="middle_name" name="middle_name">
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="last_name">Last Name <span class="text-danger">*</span></label>
                      <input type="text" class="form-control" id="last_name" name="last_name">
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="gender">Gender</label>
                      <select class="form-control" id="gender" name="gender">
                        <option value="">-- Select Gender --</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                      </select>
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="dob">Date of Birth</label>
                      <input type="date" class="form-control" id="dob" name="dob">
                    </div>

                    <!-- ================= Contact ================= -->
                    <div class="col-12"><h6 class="mt-3">Contact</h6><hr/></div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="phone">Phone</label>
                      <input type="text" class="form-control" id="phone" name="phone">
                    </div>

                    <div class="col-xxl-3 col-lg-4 col-sm-6">
                      <label class="form-label" for="email">Email</label>
                      <input type="email" class="form-control" id="email" name="email">
                    </div>

                    <div class="col-xxl-4 col-lg-6 col-sm-12">
                      <label class="form-label" for="address">Address</label>
                      <textarea class="form-control" id="address" name="address" rows="2"></textarea>
                    </div>

                    <!-- ================= Employment ================= -->
                    <div class="col-12"><h6 class="mt-3">Employment</h6><hr/></div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="employee_no">Employee No <span class="text-danger">*</span></label>
                      <input type="text" class="form-control" id="employee_no" name="employee_no">
                    </div>

                    <div class="col-xxl-3 col-lg-4 col-sm-6">
                      <label class="form-label" for="position">Position</label>
                      <select class="form-select" id="position" name="position">
                        <option value="">-- Loading positions... --</option>
                      </select>
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label">Status</label>
                      <div class="mt-1">
                        <div class="form-check form-check-inline">
                          <input class="form-check-input" type="radio" name="status" id="status_active" value="active" checked>
                          <label class="form-check-label" for="status_active">Active</label>
                        </div>
                        <div class="form-check form-check-inline">
                          <input class="form-check-input" type="radio" name="status" id="status_inactive" value="inactive">
                          <label class="form-check-label" for="status_inactive">Inactive</label>
                        </div>
                      </div>
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="departmentSelect">Department</label>
                      <select class="form-select" id="departmentSelect" name="department_id">
                        <option value="">-- Select Department --</option>
                      </select>
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="organizationSelect">Organization</label>
                      <select class="form-select" id="organizationSelect" name="organization_id">
                        <option value="">-- Select Organization --</option>
                      </select>
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="facilitySelect">Facility</label>
                      <select class="form-select" id="facilitySelect" name="facility_id">
                        <option value="">-- Select Facility --</option>
                      </select>
                    </div>

                    <!-- ================= Credentials ================= -->
                    <div class="col-12"><h6 class="mt-3">Credentials</h6><hr/></div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="license_no">License No</label>
                      <input type="text" class="form-control" id="license_no" name="license_no">
                    </div>

                    <div class="col-xxl-3 col-lg-4 col-sm-6">
                      <label class="form-label" for="specialty">Specialty</label>
                      <input type="text" class="form-control" id="specialty" name="specialty">
                    </div>

                    <div class="col-xxl-3 col-lg-4 col-sm-6">
                      <label class="form-label" for="certifications">Certifications</label>
                      <input type="text" class="form-control" id="certifications" name="certifications">
                    </div>

                    <!-- ================= Dates ================= -->
                    <div class="col-12"><h6 class="mt-3">Employment Dates</h6><hr/></div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="hire_date">Hire Date</label>
                      <input type="date" class="form-control" id="hire_date" name="hire_date">
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="termination_date">Termination Date</label>
                      <input type="date" class="form-control" id="termination_date" name="termination_date">
                    </div>

                    <!-- ================= Emergency ================= -->
                    <div class="col-12"><h6 class="mt-3">Emergency Contact</h6><hr/></div>

                    <div class="col-xxl-3 col-lg-4 col-sm-6">
                      <label class="form-label" for="emergency_contact_name">Contact Name</label>
                      <input type="text" class="form-control" id="emergency_contact_name" name="emergency_contact_name">
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="emergency_contact_phone">Contact Phone</label>
                      <input type="text" class="form-control" id="emergency_contact_phone" name="emergency_contact_phone">
                    </div>

                    <!-- ================= Uploads ================= -->
                    <div class="col-12"><h6 class="mt-3">Uploads</h6><hr/></div>

                    <div class="col-xxl-3 col-lg-4 col-sm-6">
                      <label class="form-label" for="photoInput">Profile Photo</label>
                      <input type="file" class="form-control" id="photoInput" name="employee_photo" accept="image/*">
                      <div id="photoPreview" class="mt-2"></div>
                      <button type="button" id="removePhotoBtn" class="btn btn-sm btn-danger mt-1 hidden">Remove</button>
                      <input type="hidden" id="remove_photo" name="remove_photo" value="false">
                    </div>

                    <div class="col-xxl-3 col-lg-4 col-sm-6">
                      <label class="form-label" for="resumeInput">Resume</label>
                      <input type="file" class="form-control" id="resumeInput" name="resume_url">
                      <div id="resumePreview" class="mt-2"></div>
                      <button type="button" id="removeResumeBtn" class="btn btn-sm btn-danger mt-1 hidden">Remove</button>
                      <input type="hidden" id="remove_resume" name="remove_resume" value="false">
                    </div>

                    <div class="col-xxl-3 col-lg-4 col-sm-6">
                      <label class="form-label" for="documentInput">Supporting Document</label>
                      <input type="file" class="form-control" id="documentInput" name="document_url">
                      <div id="documentPreview" class="mt-2"></div>
                      <button type="button" id="removeDocumentBtn" class="btn btn-sm btn-danger mt-1 hidden">Remove</button>
                      <input type="hidden" id="remove_document" name="remove_document" value="false">
                    </div>

                    <!-- ================= Actions ================= -->
                    <div class="col-12">
                      <div class="d-flex gap-2 justify-content-end">
                        <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                          <i class="ri-arrow-go-back-line me-1"></i> Cancel
                        </button>
                        <button type="reset" id="clearBtn" class="btn btn-warning">
                          <i class="ri-refresh-line me-1"></i> Clear
                        </button>
                        <button type="submit" class="btn btn-primary">
                          <i class="ri-save-3-line me-1"></i> Save Employee
                        </button>
                      </div>
                    </div>

                  </div>
                </form>
              </div>
              <!-- /formContainer -->

              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- File Preview Modal -->
      <div class="modal fade" id="filePreviewModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">File Preview</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center" id="filePreviewBody">
              <!-- Preview injected by JS -->
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/employee/add-employee.js"></script>
</body>
</html>
