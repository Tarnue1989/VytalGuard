<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard</title>

  <!-- Meta -->
  <meta name="description" content="Marketplace for Bootstrap Admin Dashboards">
  <meta property="og:title" content="Admin Templates - Dashboard Templates">
  <meta property="og:description" content="Marketplace for Bootstrap Admin Dashboards">
  <meta property="og:type" content="Website">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- ************* CSS Files ************* -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="/assets/css/dashboard-theme.css" />


  <!-- ************* Vendor CSS Files ************* -->
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
  <link rel="stylesheet" href="assets/vendor/jquery-ui/jquery-ui.min.css" />
  <link rel="stylesheet" href="assets/vendor/datatables/dataTables.bs5.css">
  <link rel="stylesheet" href="assets/vendor/datatables/dataTables.bs5-custom.css">
  <link rel="stylesheet" href="assets/vendor/datatables/buttons/dataTables.bs5-custom.css">
</head>

<body>

  <!-- Loading starts -->
  <div id="loading-wrapper">
    <!-- Repeat spin wrapper -->
    <div class="spin-wrapper"><div class="circle"></div><div class="circle"></div></div>
    <div class="spin-wrapper"><div class="circle"></div><div class="circle"></div></div>
    <div class="spin-wrapper"><div class="circle"></div><div class="circle"></div></div>
    <div class="spin-wrapper"><div class="circle"></div><div class="circle"></div></div>
    <div class="spin-wrapper"><div class="circle"></div><div class="circle"></div></div>
    <div class="spin-wrapper"><div class="circle"></div><div class="circle"></div></div>
    <div class="spin-wrapper"><div class="circle"></div><div class="circle"></div></div>
    <div class="spin-wrapper"><div class="circle"></div><div class="circle"></div></div>
    <div class="spin-wrapper"><div class="circle"></div><div class="circle"></div></div>
    <div class="spin-wrapper"><div class="circle"></div><div class="circle"></div></div>
    <div class="spin-wrapper"><div class="circle"></div><div class="circle"></div></div>
    <div class="spin-wrapper"><div class="circle"></div><div class="circle"></div></div>
  </div>
  <!-- Loading ends -->

  <!-- Page wrapper starts -->
  <div class="page-wrapper">
    
  <!-- Sidebar overlay -->
  <div id="overlay"></div>

    <!-- Main container starts -->
    <div class="main-container" style="margin-left:0;">


      <!-- App container starts -->
      <div class="app-container">

        <!-- App header starts -->
        <div class="app-header d-flex align-items-center">

          <!-- Brand container sm starts -->
          <div class="brand-container-sm d-xl-none d-flex align-items-center">
            <div class="app-brand">
              <a href="index.html">
                <img src="assets/images/logo.svg" class="logo" alt="Medicare Admin Template">
              </a>
            </div>
          </div>
          <!-- Brand container sm ends -->


          <!-- Search container ends -->

          <!-- Header actions starts -->
          <div class="header-actions">

            <!-- User settings -->
            <div class="dropdown ms-3">
              <a id="userSettings" class="dropdown-toggle d-flex align-items-center" href="#!" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                <div class="avatar-box">
                  <img id="headerAvatar" src="assets/images/doctor5.png" class="img-2xx rounded-5 border border-3 border-white" alt="User Avatar">
                  <span class="status busy"></span>
                </div>
              </a>
              <div class="dropdown-menu dropdown-menu-end shadow-lg">
                <div class="px-3 py-2">
                  <span id="headerRole" class="small">Admin</span>
                  <h6 id="headerName" class="m-0">Dr. Iris Jimenez</h6>
                </div>
                <div class="mx-3 my-2 d-grid">
                  <button id="logoutBtn" class="btn btn-danger mb-2">
                    <i class="ri-logout-box-r-line me-1"></i> Logout
                  </button>
                  <button id="logoutAllBtn" class="btn btn-outline-danger">
                    <i class="ri-shut-down-line me-1"></i> Logout All Devices
                  </button>
                </div>
              </div>
            </div>

          </div>
          <!-- Header actions ends -->

        </div>
        <!-- App header ends -->

        <!-- App hero header -->
        <div class="app-hero-header d-flex align-items-center">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="dashboard.html"><i class="ri-home-3-line"></i></a></li>
            <li id="breadcrumbRole" class="breadcrumb-item text-primary" aria-current="page">Dentist Admin</li>
          </ol>
            <div class="ms-auto d-flex flex-column flex-sm-row align-items-start align-items-sm-center gap-2 mt-2 mt-sm-0">
              <label for="abc" class="form-label fw-semibold text-muted mb-0 small">
                <i class="ri-filter-3-line text-primary me-1"></i>
                Filter Date Range:
              </label>
              <div class="input-group input-group-sm" style="width: 100%; max-width: 230px;">
                <span class="input-group-text bg-primary-lighten">
                  <i class="ri-calendar-2-line text-primary"></i>
                </span>
                <input
                  type="text"
                  id="abc"
                  class="form-control custom-daterange"
                  placeholder="Select date range"
                  aria-label="Filter by date range"
                />
              </div>
            </div>

        </div>
        <!-- ================= DASHBOARD TABS ================= -->
        <div class="dashboard-tabs-wrapper">
          <div class="dashboard-tabs" id="dashboardTabs">
            <button class="dashboard-tab active" data-tab="dashboard">
              <i class="ri-dashboard-line"></i> Dashboard
            </button>
            <button class="dashboard-tab" data-tab="modules">
              <i class="ri-grid-line"></i> Modules
            </button>
          </div>
        </div>

        <div class="app-body dashboard-modern">
          <!-- 🔍 Dashboard KPI Search (GLOBAL) -->
          <div class="dashboard-search-wrapper">
            <input
              id="dashboardSearch"
              type="text"
              class="form-control form-control-sm dashboard-search-input"
              placeholder="Search dashboard KPIs…"
              autocomplete="off"
            />
          </div>
          <!-- ===== DASHBOARD SECTION ===== -->
          <div data-dashboard-section="dashboard">

            <!-- TOP KPI STRIP -->
            <div class="container-fluid px-4 mb-4">
              <div class="dashboard-kpi-strip" id="top-kpis"></div>
            </div>

            <!-- MAIN GRID -->
            <div class="container-fluid px-4">
              <div class="dashboard-grid">

                <!-- ===== MAIN COLUMN ===== -->
                <div class="dashboard-main">

                  <!-- Clinical KPIs -->
                  <div class="dashboard-section">
                    <div class="section-header">
                      <h6><i class="ri-heart-pulse-line"></i> Clinical Overview</h6>
                    </div>
                    <div class="dashboard-kpi-grid" id="clinical-kpis"></div>
                  </div>

                  <!-- Admin KPIs -->
                  <div class="dashboard-section">
                    <div class="section-header">
                      <h6><i class="ri-settings-3-line"></i> System & Administration</h6>
                    </div>
                    <div class="dashboard-kpi-grid" id="admin-kpis"></div>
                  </div>

                  <!-- Activity Analytics -->
                  <div class="dashboard-section">
                    <div class="section-header">
                      <h6><i class="ri-bar-chart-line"></i> Activity Analytics</h6>
                    </div>
                    <div id="dashboard-charts"></div>
                  </div>

                </div>

                <!-- ===== SIDE COLUMN ===== -->
                <div class="dashboard-side">

                  <div class="side-card">
                    <div class="side-card-header">
                      <h6><i class="ri-notification-3-line"></i> Alerts</h6>
                    </div>
                    <div id="dashboard-alerts"></div>
                  </div>

                  <div class="side-card">
                    <div class="side-card-header">
                      <h6><i class="ri-time-line"></i> Queues</h6>
                    </div>
                    <div id="dashboard-queues"></div>
                  </div>
                  <div class="side-card calendar-card">
                    <div class="side-card-header calendar-header">
                      <button id="cal-prev">‹</button>
                      <span id="cal-title"></span>
                      <button id="cal-next">›</button>
                    </div>
                    <div id="dashboard-calendar"></div>
                  </div>

                </div>

              </div>

            </div>

          </div>

          <!-- ===== MODULES SECTION ===== -->
          <div data-dashboard-section="modules" style="display:none;"></div>

        </div>

        <!-- Footer -->
        <div class="app-footer"><span>© VytalGuard HMS 2025</span></div>

      </div>
      <!-- App container ends -->

    </div>
    <!-- Main container ends -->

  </div>
  <!-- Page wrapper ends -->

  <!-- ************* JavaScript Files ************* -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>

  <!-- Vendor JS -->
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/vendor/jquery-ui/jquery-ui.min.js"></script>
  <script src="assets/vendor/jquery-ui/custom.js"></script>
  <script src="assets/vendor/datatables/dataTables.min.js"></script>
  <script src="assets/vendor/datatables/dataTables.bootstrap.min.js"></script>
  <script src="assets/vendor/datatables/custom/custom-datatables.js"></script>

  <!-- Custom JS -->
  <script src="assets/js/custom.js"></script>

  <!-- Dashboard logic -->
<script src="/assets/vendor/apexcharts/apexcharts.min.js"></script>

<script type="module" src="js/dashboard/index.js"></script>
<script type="module" src="js/dashboard/dashboard-tabs.js"></script>

</body>

</html>
