<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Expense</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add an Expense">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Expenses</li>
          <li class="breadcrumb-item text-primary">Add Expense</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Expense</h5>
              </div>

              <div class="card-body">

                <div id="formContainer">
                  <form id="expenseForm" novalidate>
                    <div class="row gx-4">

                      <!-- ================= Identity ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Identity</h6>
                        <hr />
                      </div>

                        <!-- Expense Number (Auto Generated) -->
                        <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                            <label class="form-label">Expense #</label>
                            <input 
                            type="text" 
                            class="form-control" 
                            id="expenseNumber" 
                            placeholder="Auto-generated"
                            disabled
                            />
                        </div>
                        </div>

                      <!-- Date -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Date *</label>
                          <input type="date" class="form-control" id="date" />
                        </div>
                      </div>

                      <!-- Currency -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Currency *</label>
                          <select class="form-control" id="currencySelect">
                            <option value="">— Select Currency —</option>
                            <option value="USD">USD</option>
                            <option value="LRD">LRD</option>
                          </select>
                        </div>
                      </div>

                      <!-- Amount -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Amount *</label>
                          <input type="number" step="0.01" class="form-control" id="amount" />
                        </div>
                      </div>

                      <!-- Account -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Account *</label>
                          <select class="form-control" id="accountSelect"></select>
                        </div>
                      </div>

                      <!-- Category -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Category *</label>
                          <select class="form-control" id="categorySelect">
                            <option value="">— Select Category —</option>
                            <option value="drugs">Drugs</option>
                            <option value="supplies">Supplies</option>
                            <option value="fuel">Fuel</option>
                            <option value="utilities">Utilities</option>
                            <option value="salary">Salary</option>
                            <option value="maintenance">Maintenance</option>
                            <option value="rent">Rent</option>
                            <option value="transport">Transport</option>
                            <option value="other">Other</option>
                          </select>
                        </div>
                      </div>

                      <!-- Payment Method -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Payment Method *</label>
                          <select class="form-control" id="paymentMethodSelect">
                            <option value="">— Select Method —</option>
                            <option value="cash">Cash</option>
                            <option value="card">Card</option>
                            <option value="bank_transfer">Bank Transfer</option>
                            <option value="mobile_money">Mobile Money</option>
                            <option value="cheque">Cheque</option>
                          </select>
                        </div>
                      </div>

                      <!-- Description -->
                      <div class="col-xxl-6 col-lg-8 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Description</label>
                          <textarea class="form-control" id="description" rows="2"></textarea>
                        </div>
                      </div>

                      <!-- ================= Scope ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Scope</h6>
                        <hr />
                      </div>

                      <!-- Organization -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label">Organization *</label>
                          <select class="form-control" id="organizationSelect"></select>
                        </div>
                      </div>

                      <!-- Facility -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label">Facility</label>
                          <select class="form-control" id="facilitySelect"></select>
                        </div>
                      </div>

                      <!-- ================= Actions ================= -->
                      <div class="col-sm-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                            <i class="ri-arrow-go-back-line me-1"></i> Cancel
                          </button>
                          <button type="reset" id="clearBtn" class="btn btn-warning">
                            <i class="ri-refresh-line me-1"></i> Clear
                          </button>
                          <button type="submit" class="btn btn-primary">
                            <i class="ri-save-3-line me-1"></i> Save Expense
                          </button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>

    </div>
  </div>

  <!-- Loading -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module -->
  <script type="module" src="js/modules/expenses/add-expense.js"></script>

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
