<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Users</title>

  <meta name="description" content="VytalGuard HMS - Manage Users">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <div class="app-header d-flex align-items-center"></div>

      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Users</li>
          <li class="breadcrumb-item text-primary">Add User</li>
        </ol>
      </div>

      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add User</h5>
              </div>

              <div class="card-body">

                <div id="formContainer">
                  <form id="userForm" novalidate>
                    <div class="row gx-4">

                      <!-- ================= USER INFORMATION ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">User Information</h6>
                        <hr/>
                      </div>

                      <!-- Username -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="username">
                            Username <span class="text-danger">*</span>
                          </label>
                          <input type="text" class="form-control"
                            id="username" name="username"
                            placeholder="Enter username"
                            required data-required="true">
                        </div>
                      </div>

                      <!-- Email -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="email">
                            Email <span class="text-danger">*</span>
                          </label>
                          <input type="email" class="form-control"
                            id="email" name="email"
                            placeholder="Enter email"
                            required data-required="true">
                        </div>
                      </div>

                      <!-- Password (WITH TOGGLE) -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 position-relative">
                          <label class="form-label" for="password">
                            Password <span class="text-danger">*</span>
                          </label>
                          <input type="password" class="form-control"
                            id="password" name="password"
                            placeholder="Enter password"
                            minlength="6"
                            required data-required="true">

                          <i class="ri-eye-line position-absolute"
                             id="togglePassword"
                             style="top: 38px; right: 12px; cursor:pointer;"></i>
                        </div>
                      </div>

                      <!-- First Name -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="first_name">First Name</label>
                          <input type="text" class="form-control"
                            id="first_name" name="first_name"
                            placeholder="First name">
                        </div>
                      </div>

                      <!-- Last Name -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="last_name">Last Name</label>
                          <input type="text" class="form-control"
                            id="last_name" name="last_name"
                            placeholder="Last name">
                        </div>
                      </div>

                      <!-- ================= ACCOUNT SETTINGS ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Account Settings</h6>
                        <hr/>
                      </div>

                      <!-- Status -->
                      <div class="col-xxl-4 col-lg-6 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label">
                            Status <span class="text-danger">*</span>
                          </label>
                          <div>
                            <div class="form-check form-check-inline">
                              <input class="form-check-input" type="radio"
                                name="status" id="status_active"
                                value="active" checked>
                              <label class="form-check-label">Active</label>
                            </div>

                            <div class="form-check form-check-inline">
                              <input class="form-check-input" type="radio"
                                name="status" id="status_inactive"
                                value="inactive">
                              <label class="form-check-label">Inactive</label>
                            </div>

                            <div class="form-check form-check-inline">
                              <input class="form-check-input" type="radio"
                                name="status" id="status_suspended"
                                value="suspended">
                              <label class="form-check-label">Suspended</label>
                            </div>
                          </div>
                        </div>
                      </div>

                      <!-- ================= ASSIGNMENT ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Assignment Scope</h6>
                        <hr/>
                      </div>

                      <!-- Organization -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="organization_id">Organization</label>
                          <select class="form-select"
                            id="organization_id" name="organization_id">
                            <option value="">-- Select Organization --</option>
                          </select>
                        </div>
                      </div>

                      <!-- Facility -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="facility_id">Facility</label>
                          <select class="form-select"
                            id="facility_id" name="facility_id">
                            <option value="">-- Select Facility --</option>
                          </select>
                        </div>
                      </div>

                      <!-- Role -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="role_id">
                            Role <span class="text-danger">*</span>
                          </label>
                          <select class="form-select"
                            id="role_id" name="role_id"
                            required data-required="true">
                            <option value="">-- Select Role --</option>
                          </select>
                        </div>
                      </div>

                      <!-- Buttons -->
                      <div class="col-sm-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                            <i class="ri-arrow-go-back-line me-1"></i> Cancel
                          </button>
                          <button type="reset" id="clearBtn" class="btn btn-warning">
                            <i class="ri-refresh-line me-1"></i> Clear
                          </button>
                          <button type="submit" class="btn btn-primary">
                            <i class="ri-save-3-line me-1"></i> Save User
                          </button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- PASSWORD TOGGLE -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const toggle = document.getElementById("togglePassword");
      const input = document.getElementById("password");

      toggle.addEventListener("click", () => {
        const type = input.getAttribute("type") === "password" ? "text" : "password";
        input.setAttribute("type", type);
        toggle.classList.toggle("ri-eye-off-line");
      });
    });
  </script>

  <!-- Module -->
  <script type="module" src="js/modules/user/add-user.js"></script>

</body>
</html>
