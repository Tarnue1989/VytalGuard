<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VytalGuard - Add Order</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add Order" />
  <link rel="shortcut icon" href="assets/images/favicon.svg" />

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css" />
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css" />
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css" />
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css" />
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Orders</li>
          <li class="breadcrumb-item text-primary" aria-current="page">
            Add Order
          </li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Order</h5>
              </div>
              <div class="card-body">

                <!-- 📦 Form Container -->
                <div id="formContainer">
                  <form id="orderForm" novalidate>
                    <div class="row gx-4">

                      <!-- ================= Identity ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Identity</h6>
                        <hr />
                      </div>

                      <!-- Patient -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="field-wrapper">
                          <label class="form-label" for="patientSearch">
                            Patient <span class="text-danger">*</span>
                          </label>
                          <input
                            type="text"
                            id="patientSearch"
                            class="form-control suggestion-input"
                            placeholder="Search patient..."
                            autocomplete="off"
                          />
                          <input type="hidden" id="patientId" name="patient_id" />
                          <div id="patientSearchSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <!-- Department -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label" for="departmentSelect">
                            Department
                          </label>
                          <select
                            id="departmentSelect"
                            name="department_id"
                            class="form-control"
                          ></select>
                        </div>
                      </div>

                      <!-- Provider -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="field-wrapper">
                          <label class="form-label" for="providerSearch">
                            Provider
                          </label>
                          <input
                            type="text"
                            id="providerSearch"
                            class="form-control suggestion-input"
                            placeholder="Search provider..."
                            autocomplete="off"
                          />
                          <input type="hidden" id="providerId" name="provider_id" />
                          <div id="providerSearchSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                    <!-- Consultation -->
                    <div class="col-xxl-4 col-lg-6 col-sm-12 d-none">
                    <div class="field-wrapper">
                        <label class="form-label" for="consultationSearch">
                        Consultation
                        </label>
                        <input
                        type="text"
                        id="consultationSearch"
                        class="form-control suggestion-input"
                        placeholder="Search consultation..."
                        autocomplete="off"
                        />
                        <input type="hidden" id="consultationId" name="consultation_id" />
                        <div id="consultationSearchSuggestions" class="suggestions"></div>
                    </div>
                    </div>

                    <!-- Registration Log -->
                    <div class="col-xxl-4 col-lg-6 col-sm-12 d-none">
                    <div class="field-wrapper">
                        <label class="form-label" for="registrationLogSearch">
                        Registration Log
                        </label>
                        <input
                        type="text"
                        id="registrationLogSearch"
                        class="form-control suggestion-input"
                        placeholder="Search registration log..."
                        autocomplete="off"
                        />
                        <input type="hidden" id="registrationLogId" name="registration_log_id" />
                        <div id="registrationLogSearchSuggestions" class="suggestions"></div>
                    </div>
                    </div>

                      <!-- Order Date -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label" for="order_date">
                            Order Date
                          </label>
                          <input
                            type="date"
                            id="order_date"
                            name="order_date"
                            class="form-control"
                          />
                        </div>
                      </div>

                      <!-- ================= Order Items ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Order Items</h6>
                        <hr />
                      </div>

                      <!-- Order Item -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="field-wrapper">
                          <label class="form-label" for="orderItemSearch">
                            Order Item <span class="text-danger">*</span>
                          </label>
                          <input
                            type="text"
                            id="orderItemSearch"
                            class="form-control suggestion-input"
                            placeholder="Search billable item..."
                            autocomplete="off"
                          />
                          <input type="hidden" id="orderItemId" />
                          <div id="orderItemSearchSuggestions" class="suggestions"></div>
                        </div>
                      </div>
                        <div class="col-xxl-2 col-lg-4 col-sm-6">
                        <div class="mb-3">
                            <label class="form-label" for="itemQuantity">
                            Quantity
                            </label>
                            <input
                            type="number"
                            id="itemQuantity"
                            class="form-control"
                            min="1"
                            value="1"
                            />
                        </div>
                        </div>
                      <!-- Item Notes -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label" for="itemNotes">
                            Item Notes
                          </label>
                          <input
                            type="text"
                            id="itemNotes"
                            class="form-control"
                            placeholder="Optional note for this item"
                          />
                        </div>
                      </div>

                      <!-- Priority -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12 d-flex align-items-center">
                        <div class="form-check mt-4">
                          <input
                            type="checkbox"
                            id="is_priority"
                            class="form-check-input"
                          />
                          <label class="form-check-label" for="is_priority">
                            High Priority?
                          </label>
                        </div>
                      </div>

                      <!-- ================= Batch / Pills ================= -->
                      <div class="col-sm-12">
                        <div class="d-flex justify-content-start mb-3">
                          <button
                            type="button"
                            id="addItemBtn"
                            class="btn btn-outline-primary"
                          >
                            <i class="ri-add-line me-1"></i>
                            Add Item
                          </button>
                        </div>
                      </div>

                      <div class="col-sm-12">
                        <div id="orderPillsContainer" class="mb-3">
                          <p class="text-muted">No order items added yet.</p>
                        </div>
                      </div>

                      <!-- ================= Notes ================= -->
                      <div class="col-12">
                        <div class="mb-3">
                          <label class="form-label" for="notes">
                            Notes
                          </label>
                          <textarea
                            id="notes"
                            class="form-control"
                            rows="2"
                            placeholder="Additional notes (optional)"
                          ></textarea>
                        </div>
                      </div>

                      <!-- ================= Actions ================= -->
                      <div class="col-sm-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button
                            type="button"
                            id="cancelBtn"
                            class="btn btn-outline-secondary"
                          >
                            <i class="ri-arrow-go-back-line me-1"></i>
                            Cancel
                          </button>
                          <button
                            type="reset"
                            id="clearBtn"
                            class="btn btn-warning"
                          >
                            <i class="ri-refresh-line me-1"></i>
                            Clear
                          </button>
                          <button type="submit" class="btn btn-primary">
                            <i class="ri-save-3-line me-1"></i>
                            Submit All
                          </button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>

    </div>
  </div>

  <!-- overlays -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/order/add-order.js"></script>
</body>
</html>
