<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Billable Items</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Billable Items">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
  <link rel="stylesheet" href="assets/vendor/datatables/dataTables.bs5.css">
  <link rel="stylesheet" href="assets/vendor/datatables/dataTables.bs5-custom.css">
  <link rel="stylesheet" href="assets/vendor/datatables/buttons/dataTables.bs5-custom.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/filter-page.css" />
  <link rel="stylesheet" href="assets/css/print.css" media="print" />
  <link rel="stylesheet" href="assets/css/summary.css">
  <link rel="stylesheet" href="assets/css/timeline.css" />
  <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Hero Header -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Billable Items</li>
          <li class="breadcrumb-item text-primary" aria-current="page">
            Items
          </li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">

            <div class="card">
              <div class="card-header d-flex align-items-center justify-content-between">
                <h5 class="card-title">Billable Items</h5>
                <a href="add-billableitem.html" class="btn btn-primary btn-sm ms-auto">
                  <i class="ri-add-line me-1"></i> Add
                </a>
              </div>

              <div class="card-body">

                <!-- Filters -->
                <div class="card panel-card mb-3">
                  <div class="card-header d-flex align-items-center justify-content-between">
                    <button id="toggleFilterBtn" class="btn btn-outline-secondary btn-sm">
                      <i class="fas fa-filter me-1"></i> Filters
                      <i id="filterChevron" class="fas fa-chevron-down toggle-icon ms-1"></i>
                    </button>

                    <div class="view-actions d-flex gap-2">
                      <button id="exportCSVBtn" class="btn btn-outline-success btn-sm">
                        <i class="fas fa-file-csv me-1"></i> CSV
                      </button>
                      <button id="exportExcelBtn" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-file-excel me-1"></i> Excel
                      </button>
                      <button id="exportPDFBtn" class="btn btn-outline-danger btn-sm">
                        <i class="fas fa-file-pdf me-1"></i> PDF
                      </button>
                    </div>
                  </div>

                  <div id="filterCollapse" class="card-body filter-body">
                    <div class="section-label mb-2">
                      <strong>Filter Billable Items</strong>
                    </div>

                    <div class="row g-3 filter-grid compact">

                      <!-- 🔍 GLOBAL SEARCH -->
                      <div class="col-md-4">
                        <div class="field-wrapper">
                          <label for="globalSearch" class="form-label">Search</label>
                          <div class="input-group">
                            <span class="input-group-text bg-primary-lighten">
                              <i class="ri-search-line text-primary"></i>
                            </span>
                            <input
                              type="text"
                              id="globalSearch"
                              class="form-control"
                              placeholder="Name or code…"
                              autocomplete="off"
                            />
                          </div>
                        </div>
                      </div>

                      <!-- ORGANIZATION -->
                      <div class="col-md-3">
                        <div class="field-wrapper">
                          <label for="filterOrganizationSelect" class="form-label">Organization</label>
                          <select id="filterOrganizationSelect" class="form-select"></select>
                        </div>
                      </div>

                      <!-- FACILITY -->
                      <div class="col-md-3">
                        <div class="field-wrapper">
                          <label for="filterFacilitySelect" class="form-label">Facility</label>
                          <select id="filterFacilitySelect" class="form-select"></select>
                        </div>
                      </div>

                      <!-- STATUS -->
                      <div class="col-md-2">
                        <div class="field-wrapper">
                          <label for="filterStatusSelect" class="form-label">Status</label>
                          <select id="filterStatusSelect" class="form-select">
                            <option value="">All</option>
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                          </select>
                        </div>
                      </div>
                      <div class="col-md-2">
                        <div class="field-wrapper">
                          <label for="filterCurrencySelect" class="form-label">Currency</label>
                          <select id="filterCurrencySelect" class="form-select">
                            <option value="">All</option>
                            <option value="LRD">Liberian Dollars</option>
                            <option value="USD">US Dollars</option>
                          </select>
                        </div>
                      </div>
                      <!-- 🔥 PAYER TYPE (REQUIRED FOR CONTROLLER) -->
                      <div class="col-md-2">
                        <div class="field-wrapper">
                          <label for="filterPayerTypeSelect" class="form-label">Payer Type</label>
                          <select id="filterPayerTypeSelect" class="form-select">
                            <option value="">All</option>
                            <option value="cash">Cash</option>
                            <option value="insurance">Insurance</option>
                            <option value="corporate">Corporate</option>
                            <option value="government">Government</option>
                            <option value="charity">Charity</option>
                            <option value="other">Other</option>
                          </select>
                        </div>
                      </div>
                      <!-- DATE RANGE (MASTER – SINGLE FIELD) -->
                      <div class="col-md-3">
                        <div class="field-wrapper">
                          <label for="dateRange" class="form-label">Date Range</label>
                          <div class="input-group">
                            <span class="input-group-text bg-primary-lighten">
                              <i class="ri-calendar-2-line text-primary"></i>
                            </span>
                            <input
                              type="text"
                              id="dateRange"
                              class="form-control custom-daterange"
                              placeholder="Select date range"
                            />
                          </div>
                        </div>
                      </div>

                      <!-- ACTIONS -->
                      <div class="col-12 d-flex gap-2 filter-actions">
                        <button id="resetFilterBtn" class="btn btn-outline-secondary btn-sm">
                          <i class="fas fa-times me-1"></i> Clear
                        </button>
                      </div>

                    </div>
                  </div>
                </div>

                <!-- View Toggle -->
                <div class="d-flex mb-2 view-toggle compact align-items-center">
                  <div class="dropdown relative-wrapper export-ignore">
                    <button
                      class="btn btn-outline-primary btn-sm dropdown-toggle"
                      id="fieldSelectorBtn"
                      data-bs-toggle="dropdown"
                    >
                      <i class="fas fa-columns me-1"></i> Select Fields
                    </button>
                    <div
                      class="dropdown-menu p-2 field-selector-dropdown"
                      id="fieldSelectorDropdown"
                      style="min-width:240px;"
                    ></div>
                  </div>

                  <div class="btn-group ms-2">
                    <button id="cardViewBtn" class="btn btn-outline-secondary btn-sm btn-toggle">
                      <i class="fas fa-th me-1"></i> Card View
                    </button>
                    <button id="tableViewBtn" class="btn btn-outline-secondary btn-sm btn-toggle active">
                      <i class="fas fa-table me-1"></i> Table View
                    </button>
                  </div>
                </div>

                <!-- Records -->
                <div class="btn-group align-items-center ms-2">
                  <span class="btn btn-outline-secondary btn-sm pe-none">Show</span>
                  <select id="recordsPerPage" class="btn btn-outline-secondary btn-sm">
                    <option value="10">10</option>
                    <option value="25" selected>25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                  </select>
                  <span class="btn btn-outline-secondary btn-sm pe-none">Rows</span>
                </div>

                <!-- Summary -->
                <hr class="my-2">
                <div class="text-muted fw-semibold small mb-1">Breakdown Summary</div>
                <div class="module-summary">
                  <div id="moduleSummary"></div>
                </div>
                <hr class="my-2">

                <!-- Table -->
                <div class="table-responsive table-container active">
                  <table class="table m-0 align-middle data-table print-table">
                    <thead id="dynamicTableHead"></thead>
                    <tbody id="billableItemTableBody"></tbody>
                  </table>
                </div>

                <!-- Cards -->
                <div id="billableItemList" class="card-list"></div>

                <!-- Pagination -->
                <div id="paginationButtons" class="pagination-controls text-center mt-3"></div>

              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/vendor/datatables/dataTables.min.js"></script>
  <script src="assets/vendor/datatables/dataTables.bootstrap.min.js"></script>
  <script src="assets/vendor/datatables/custom/custom-datatables.js"></script>
  <script src="assets/js/custom.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script type="module" src="/js/logout.js"></script>
  <script type="module" src="/js/authSession.js"></script>

  <!-- Billable module -->
  <script type="module" src="/js/modules/billable/billableitem-filter-main.js"></script>

<script type="module" src="/js/utils/navigation.js"></script>
 
  

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
