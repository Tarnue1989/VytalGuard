<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Facility</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add Facility">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css">
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
</head>

<body>
<div class="page-wrapper">
  <div class="app-container">

    <!-- Header -->
    <div class="app-header d-flex align-items-center"></div>

    <!-- Breadcrumb -->
    <div class="app-hero-header d-flex align-items-center">
      <ol class="breadcrumb">
        <li class="breadcrumb-item">
          <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
        </li>
        <li class="breadcrumb-item">Facilities</li>
        <li class="breadcrumb-item text-primary" aria-current="page">Add Facility</li>
      </ol>
    </div>

    <!-- Body -->
    <div class="app-body">
      <div class="row gx-4">
        <div class="col-sm-12">
          <div class="card">
            <div class="card-header">
              <h5 class="card-title">Add Facility</h5>
            </div>

            <div class="card-body">
              <div id="formContainer">
                <form id="facilityForm" data-module="facility" novalidate>
                  <div class="row gx-4">

                    <!-- ================= FACILITY INFO ================= -->
                    <div class="col-12">
                      <h6 class="mt-2">Facility Information</h6>
                      <hr>
                    </div>

                    <!-- Facility Name -->
                    <div class="col-xxl-4 col-lg-4 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label">
                          Facility Name <span class="text-danger">*</span>
                        </label>
                        <input
                          type="text"
                          class="form-control"
                          name="name"
                          data-required="true"
                          minlength="2"
                          placeholder="Enter facility name">
                      </div>
                    </div>

                    <!-- Facility Code (SuperAdmin only – JS controlled) -->
                    <div class="col-xxl-3 col-lg-4 col-sm-6" id="facilityCodeWrapper">
                      <div class="mb-3">
                        <label class="form-label">
                          Facility Code <span class="text-danger">*</span>
                        </label>
                        <input
                          type="text"
                          class="form-control"
                          name="code"
                          maxlength="50"
                          placeholder="FAC-001">
                      </div>
                    </div>

                    <!-- Status -->
                    <div class="col-xxl-3 col-lg-4 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label">Status</label>
                        <div>
                          <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="status" value="active" checked>
                            <label class="form-check-label">Active</label>
                          </div>
                          <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="status" value="inactive">
                            <label class="form-check-label">Inactive</label>
                          </div>
                        </div>
                      </div>
                    </div>

                    <!-- ================= CONTACT ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Contact Details</h6>
                      <hr>
                    </div>

                    <div class="col-xxl-4 col-lg-4 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" name="phone">
                      </div>
                    </div>

                    <div class="col-xxl-4 col-lg-4 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email">
                      </div>
                    </div>

                    <div class="col-12">
                      <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" name="address" rows="2"></textarea>
                      </div>
                    </div>

                    <!-- ================= ORGANIZATION (SUPERADMIN ONLY) ================= -->
                    <div class="col-12" id="organizationSection">
                      <h6 class="mt-3">Organization Assignment</h6>
                      <hr>
                    </div>

                    <div class="col-xxl-4 col-lg-4 col-sm-6" id="organizationWrapper">
                      <div class="mb-3">
                        <label class="form-label">
                          Organization <span class="text-danger">*</span>
                        </label>
                        <select
                          class="form-select"
                          name="organization_id"
                          id="organizationSelect">
                          <option value="">-- Select Organization --</option>
                        </select>
                      </div>
                    </div>

                    <!-- ================= ACTIONS ================= -->
                    <div class="col-sm-12">
                      <div class="d-flex gap-2 justify-content-end">
                        <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                          <i class="ri-arrow-go-back-line me-1"></i> Cancel
                        </button>
                        <button type="reset" class="btn btn-warning">
                          <i class="ri-refresh-line me-1"></i> Clear
                        </button>
                        <button type="submit" class="btn btn-primary">
                          <i class="ri-save-3-line me-1"></i> Save Facility
                        </button>
                      </div>
                    </div>

                  </div>
                </form>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="app-footer">
      <span>© VytalGuard HMS 2025</span>
    </div>

  </div>
</div>

<!-- Overlay -->
<div id="loadingOverlay" class="hidden">
  <div class="spinner-box">
    <i class="fas fa-spinner fa-spin"></i> Loading...
  </div>
</div>

<!-- JS -->
<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/bootstrap.bundle.min.js"></script>
<script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
<script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
<script src="assets/js/custom.js"></script>

<!-- Module -->
<script type="module" src="js/modules/facility/add-facility.js"></script>
 
  

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
