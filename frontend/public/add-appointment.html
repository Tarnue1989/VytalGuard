<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Appointment</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add an Appointment">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="dashboard.html"><i class="ri-home-3-line"></i></a></li>
          <li class="breadcrumb-item">Appointments</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Appointment</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Appointment</h5>
              </div>
              <div class="card-body">

<!-- 📦 Form Container -->
<div id="formContainer">
  <form id="appointmentForm">
    <div class="row gx-3 gy-2">

      <!-- Patient -->
      <div class="col-xxl-3 col-lg-4 col-md-6 col-sm-12">
        <div class="field-wrapper">
          <label class="form-label" for="patientInput">Patient</label>
          <input type="text"
                 class="form-control suggestion-input"
                 id="patientInput"
                 placeholder="Search patient..."
                 autocomplete="off" />
          <input type="hidden" id="patientId" name="patient_id" />
          <div id="patientSuggestions" class="suggestions"></div>
        </div>
      </div>

      <!-- Doctor -->
      <div class="col-xxl-3 col-lg-4 col-md-6 col-sm-12">
        <div class="field-wrapper">
          <label class="form-label" for="doctorInput">Doctor</label>
          <input type="text"
                 class="form-control suggestion-input"
                 id="doctorInput"
                 placeholder="Search doctor..."
                 autocomplete="off" />
          <input type="hidden" id="doctorId" name="doctor_id" />
          <div id="doctorSuggestions" class="suggestions"></div>
        </div>
      </div>

      <!-- Department -->
      <div class="col-xxl-2 col-lg-4 col-md-6 col-sm-12">
        <div class="form-group">
          <label class="form-label" for="departmentSelect">Department</label>
          <select class="form-control"
                  id="departmentSelect"
                  name="department_id">
            <!-- populated dynamically -->
          </select>
        </div>
      </div>

      <!-- Date & Time -->
      <div class="col-xxl-2 col-lg-4 col-md-6 col-sm-12">
        <label class="form-label" for="dateTime">Date & Time</label>
        <input type="datetime-local"
               class="form-control"
               id="dateTime"
               name="date_time" />
      </div>

      <!-- Notes (still full width, but compact rows) -->
      <div class="col-12">
        <label class="form-label" for="notes">Notes</label>
        <textarea class="form-control"
                  id="notes"
                  name="notes"
                  rows="2"
                  placeholder="Additional notes"></textarea>
      </div>

      <!-- Organization -->
      <div class="col-xxl-2 col-lg-3 col-md-6 col-sm-12">
        <div class="form-group">
          <label class="form-label" for="organizationSelect">Organization</label>
          <select class="form-control"
                  id="organizationSelect"
                  name="organization_id">
            <!-- dynamically populated -->
          </select>
        </div>
      </div>

      <!-- Facility -->
      <div class="col-xxl-2 col-lg-3 col-md-6 col-sm-12">
        <div class="form-group">
          <label class="form-label" for="facilitySelect">Facility</label>
          <select class="form-control"
                  id="facilitySelect"
                  name="facility_id">
            <!-- dynamically populated -->
          </select>
        </div>
      </div>

      <!-- Buttons -->
      <div class="col-12">
        <div class="d-flex gap-2 justify-content-end">
          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
            <i class="ri-arrow-go-back-line me-1"></i> Cancel
          </button>
          <button type="reset" id="clearBtn" class="btn btn-warning">
            <i class="ri-refresh-line me-1"></i> Clear
          </button>
          <button type="submit" class="btn btn-primary">
            <i class="ri-save-3-line me-1"></i> Save Appointment
          </button>
        </div>
      </div>

    </div>
  </form>
</div>
<!-- /formContainer -->

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/appointments/add-appointments.js"></script>
</body>
</html>
