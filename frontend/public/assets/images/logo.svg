<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Gradient for circle -->
  <defs>
    <linearGradient id="gradVG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#21b573"/>
      <stop offset="100%" stop-color="#1272bc"/>
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="256" cy="200" r="140" fill="url(#gradVG)" />

  <!-- Lock body -->
  <rect x="200" y="170" width="112" height="100" rx="12" ry="12" fill="#fff"/>

  <!-- Lock shackle -->
  <path d="M224 170 v-30 a32 32 0 0 1 64 0 v30" 
        fill="none" stroke="#fff" stroke-width="20" stroke-linecap="round"/>

  <!-- Heartbeat line inside lock -->
  <polyline points="200,220 230,220 250,260 270,180 290,220 312,220"
            fill="none" stroke="#0b7cca" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text -->
  <text x="120" y="400" font-family="Arial, sans-serif" font-weight="bold" font-size="72">
    <tspan fill="#21b573">Vyta</tspan><tspan fill="#1272bc">Guard</tspan>
  </text>
</svg>
