<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Vital</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add Vital Record">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
<div class="page-wrapper">
  <div class="app-container">

    <!-- Header -->
    <div class="app-header d-flex align-items-center"></div>

    <!-- Breadcrumb -->
    <div class="app-hero-header d-flex align-items-center">
      <ol class="breadcrumb">
        <li class="breadcrumb-item">
          <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
        </li>
        <li class="breadcrumb-item">Vitals</li>
        <li class="breadcrumb-item text-primary" aria-current="page">
          Add Vital
        </li>
      </ol>
    </div>

    <!-- Body -->
    <div class="app-body">
      <div class="row gx-4">
        <div class="col-sm-12">
          <div class="card">
            <div class="card-header">
              <h5 class="card-title">Add Vital</h5>
            </div>

            <div class="card-body">

              <!-- 📦 Form Container -->
              <div id="formContainer">
                <form id="vitalForm" novalidate>
                  <div class="row gx-4">

                    <!-- ================= Identity ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Identity</h6>
                      <hr />
                    </div>

                    <!-- Patient -->
                    <div class="col-xxl-3 col-lg-4 col-sm-6">
                      <div class="field-wrapper">
                        <label class="form-label" for="patientInput">
                          Patient <span class="text-danger">*</span>
                        </label>
                        <input
                          type="text"
                          class="form-control suggestion-input"
                          id="patientInput"
                          placeholder="Search patient..."
                          autocomplete="off"
                        />
                        <input type="hidden" id="patientId" name="patient_id" />
                        <div id="patientSuggestions" class="suggestions"></div>
                      </div>
                    </div>

                    <!-- Nurse (hidden but preserved, MASTER parity) -->
                    <div class="col-xxl-3 col-lg-4 col-sm-6 position-relative d-none">
                      <label class="form-label" for="nurseInput">Nurse</label>
                      <input
                        type="text"
                        class="form-control suggestion-input"
                        id="nurseInput"
                        placeholder="Search nurse..."
                        autocomplete="off"
                      />
                      <input type="hidden" id="nurseId" name="nurse_id" />
                      <div id="nurseSuggestions" class="suggestions"></div>
                    </div>

                    <!-- Recorded Date -->
                    <div class="col-xxl-3 col-lg-4 col-sm-6">
                      <label class="form-label" for="recordedAt">
                        Recorded Date <span class="text-danger">*</span>
                      </label>
                        <input
                          type="datetime-local"
                          class="form-control"
                          id="recordedAt"
                          name="recorded_at"
                        />
                    </div>

                    <!-- Consultation (hidden but preserved) -->
                    <div class="col-xxl-3 col-lg-4 col-sm-6 d-none">
                      <label class="form-label" for="consultationSelect">Consultation</label>
                      <select
                        class="form-control"
                        id="consultationSelect"
                        name="consultation_id"
                      ></select>
                    </div>

                    <!-- Registration Log (hidden but preserved) -->
                    <div class="col-xxl-3 col-lg-4 col-sm-6 d-none">
                      <label class="form-label" for="registrationLogSelect">
                        Registration Log
                      </label>
                      <select
                        class="form-control"
                        id="registrationLogSelect"
                        name="registration_log_id"
                      ></select>
                    </div>

                    <!-- ================= Vitals ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Vitals</h6>
                      <hr />
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="bp">Blood Pressure</label>
                      <input type="text" class="form-control" id="bp" name="bp" placeholder="120/80">
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="pulse">Pulse</label>
                      <input type="number" class="form-control" id="pulse" name="pulse">
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="rr">Resp. Rate</label>
                      <input type="number" class="form-control" id="rr" name="rr">
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="temp">Temperature (°C)</label>
                      <input type="number" step="0.1" class="form-control" id="temp" name="temp">
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="oxygen">SpO₂ (%)</label>
                      <input type="number" class="form-control" id="oxygen" name="oxygen">
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="weight">Weight (kg)</label>
                      <input type="number" step="0.1" class="form-control" id="weight" name="weight">
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="height">Height (cm)</label>
                      <input type="number" class="form-control" id="height" name="height">
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="rbg">RBG</label>
                      <input type="number" step="0.1" class="form-control" id="rbg" name="rbg">
                    </div>

                    <div class="col-xxl-2 col-lg-3 col-sm-6">
                      <label class="form-label" for="painScore">Pain (0–10)</label>
                      <input type="number" class="form-control" id="painScore" name="pain_score">
                    </div>

                    <div class="col-xxl-3 col-lg-4 col-sm-6">
                      <label class="form-label" for="position">Position</label>
                      <input type="text" class="form-control" id="position" name="position">
                    </div>

                    <!-- ================= Scope ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Scope</h6>
                      <hr />
                    </div>

                    <div class="col-xxl-3 col-lg-4 col-sm-6 superadmin-only">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="organizationSelect">
                          Organization
                        </label>
                        <select id="organizationSelect" class="form-control" name="organization_id"></select>
                      </div>
                    </div>

                    <div class="col-xxl-3 col-lg-4 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="facilitySelect">
                          Facility
                        </label>
                        <select id="facilitySelect" class="form-control" name="facility_id"></select>
                      </div>
                    </div>

                    <!-- ================= Actions ================= -->
                    <div class="col-sm-12">
                      <div class="d-flex gap-2 justify-content-end">
                        <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                          <i class="ri-arrow-go-back-line me-1"></i> Cancel
                        </button>
                        <button type="reset" id="clearBtn" class="btn btn-warning">
                          <i class="ri-refresh-line me-1"></i> Clear
                        </button>
                        <button type="submit" class="btn btn-primary">
                          <i class="ri-save-3-line me-1"></i> Save Vital
                        </button>
                      </div>
                    </div>

                  </div>
                </form>
              </div>
              <!-- /formContainer -->

            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="app-footer">
      <span>© VytalGuard HMS 2025</span>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="hidden">
  <div class="spinner-box">
    <i class="fas fa-spinner fa-spin"></i> Loading...
  </div>
</div>

<!-- JS -->
<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/moment.min.js"></script>
<script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
<script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
<script src="assets/vendor/daterange/daterange.js"></script>
<script src="assets/vendor/daterange/custom-daterange.js"></script>
<script src="assets/js/custom.js"></script>

<!-- Module JS -->
<script type="module" src="js/modules/vitals/add-vital.js"></script>
</body>
</html>
