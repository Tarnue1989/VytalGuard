<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Newborn Record</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add a Newborn Record">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Newborn Records</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Newborn</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Newborn Record</h5>
              </div>
              <div class="card-body">

                <!-- 📦 Form Container -->
                <div id="formContainer">
                  <form id="newbornRecordForm" novalidate>
                    <div class="row gx-4">

                      <!-- ================= Newborn Info ================= -->
                      <div class="col-12"><h6 class="mt-3">Newborn Info</h6><hr/></div>

                      <div class="col-lg-4 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label" for="gender">Gender <span class="text-danger">*</span></label>
                          <select class="form-select" id="gender" name="gender" required>
                            <option value="">-- Select Gender --</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                          </select>
                        </div>
                      </div>

                      <div class="col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="birth_weight">Birth Weight (kg)</label>
                          <input type="number" step="0.01" class="form-control" id="birth_weight" name="birth_weight">
                        </div>
                      </div>

                      <div class="col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="birth_length">Birth Length (cm)</label>
                          <input type="number" step="0.01" class="form-control" id="birth_length" name="birth_length">
                        </div>
                      </div>

                      <div class="col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="head_circumference">Head Circumference (cm)</label>
                          <input type="number" step="0.01" class="form-control" id="head_circumference" name="head_circumference">
                        </div>
                      </div>

                      <div class="col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="apgar_score_1min">Apgar Score (1 min)</label>
                          <input type="number" min="0" max="10" class="form-control" id="apgar_score_1min" name="apgar_score_1min">
                        </div>
                      </div>

                      <div class="col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="apgar_score_5min">Apgar Score (5 min)</label>
                          <input type="number" min="0" max="10" class="form-control" id="apgar_score_5min" name="apgar_score_5min">
                        </div>
                      </div>

                      <div class="col-lg-12 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label" for="measurement_notes">Measurement Notes</label>
                          <textarea class="form-control" id="measurement_notes" name="measurement_notes" rows="2"></textarea>
                        </div>
                      </div>

                      <div class="col-lg-12 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label" for="complications">Complications</label>
                          <textarea class="form-control" id="complications" name="complications" rows="2"></textarea>
                        </div>
                      </div>

                      <div class="col-lg-12 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label" for="notes">Notes</label>
                          <textarea class="form-control" id="notes" name="notes" rows="2"></textarea>
                        </div>
                      </div>

                      <!-- ================= Assignment ================= -->
                      <div class="col-12"><h6 class="mt-3">Assignment</h6><hr/></div>

                      <div class="col-md-6">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="organizationSelect">Organization</label>
                          <select class="form-select" id="organizationSelect" name="organization_id">
                            <option value="">-- Select Organization --</option>
                          </select>
                        </div>
                      </div>

                      <div class="col-md-6">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="facilitySelect">Facility</label>
                          <select class="form-select" id="facilitySelect" name="facility_id">
                            <option value="">-- Select Facility --</option>
                          </select>
                        </div>
                      </div>

                        <div class="col-md-6 position-relative">
                        <label class="form-label" for="motherInput">Mother (Patient)</label>
                        <input type="text" class="form-control suggestion-input" id="motherInput"
                                placeholder="Search mother (patient)..." autocomplete="off" />
                        <input type="hidden" id="motherId" name="mother_id" />
                        <div id="motherSuggestions" class="suggestions"></div>
                        </div>

                        <div class="col-md-6 position-relative">
                        <label class="form-label" for="deliveryRecordId">Delivery Record</label>
                        <select class="form-select" id="deliveryRecordId" name="delivery_record_id" required>
                            <option value="">-- Select Delivery Record --</option>
                        </select>
                        </div>


                      <!-- ================= Actions ================= -->
                      <div class="col-sm-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                            <i class="ri-arrow-go-back-line me-1"></i> Cancel
                          </button>
                          <button type="reset" id="clearBtn" class="btn btn-warning">
                            <i class="ri-refresh-line me-1"></i> Clear
                          </button>
                          <button type="submit" class="btn btn-primary">
                            <i class="ri-save-3-line me-1"></i> Save Newborn
                          </button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>
                <!-- /formContainer -->

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/newborn-record/add-newborn-record.js"></script>
 
  

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
