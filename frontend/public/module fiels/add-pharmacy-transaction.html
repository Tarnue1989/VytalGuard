<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Pharmacy Transaction</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add Pharmacy Transaction">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Pharmacy</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Transaction</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Pharmacy Transaction</h5>
              </div>
              <div class="card-body">

              <!-- 📦 Form Container -->
              <div id="formContainer">
                <form id="pharmacyTransactionForm">
                  <div class="row gx-4 gy-3">

                    <!-- Department -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="departmentSelect">Department</label>
                        <select class="form-control" id="departmentSelect" name="department_id"></select>
                      </div>
                    </div>

                    <!-- Patient -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="field-wrapper">
                        <label class="form-label" for="patientSearch">Patient</label>
                        <input
                          type="text"
                          class="form-control suggestion-input"
                          id="patientSearch"
                          placeholder="Search patient..."
                          autocomplete="off"
                        />
                        <input type="hidden" id="patientId" name="patient_id" />
                        <div id="patientSearchSuggestions" class="suggestions"></div>
                      </div>
                    </div>

                    <!-- Prescription Request -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="prescriptionRequestSelect">Prescription Request</label>
                        <select id="prescriptionRequestSelect" class="form-control">
                          <option value="">-- Select Request --</option>
                        </select>
                      </div>
                    </div>

                    <!-- Fulfillment Date -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="fulfillment_date">Fulfillment Date</label>
                        <input type="date" id="fulfillment_date" class="form-control" name="fulfillment_date">
                      </div>
                    </div>

                    <!-- Notes -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="notes">Notes</label>
                        <textarea id="notes" class="form-control" placeholder="Notes (optional)" rows="1"></textarea>
                      </div>
                    </div>
                    <!-- Fulfilled By -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="field-wrapper">
                        <label class="form-label" for="fulfilledBySearch">Fulfilled By</label>
                        <input
                          type="text"
                          class="form-control suggestion-input"
                          id="fulfilledBySearch"
                          placeholder="Search pharmacist..."
                          autocomplete="off"
                        />
                        <input type="hidden" id="fulfilledById" name="fulfilled_by_id" />
                        <div id="fulfilledBySearchSuggestions" class="suggestions"></div>
                      </div>
                    </div>
                    <!-- Organization -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="organizationSelect">Organization</label>
                        <select class="form-control" id="organizationSelect" name="organization_id"></select>
                      </div>
                    </div>

                    <!-- Facility -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="facilitySelect">Facility</label>
                        <select class="form-control" id="facilitySelect" name="facility_id"></select>
                      </div>
                    </div>

                    <!-- 🚀 Prescription Items -->
                    <div class="col-12">
                      <div id="transactionItemsWrapper" class="mb-3">
                        <!-- 🔀 View toggle -->
                        <div class="d-flex justify-content-end mb-2">
                          <button type="button" id="toggleViewBtn" class="btn btn-sm btn-outline-primary">
                            <i class="ri-layout-grid-line me-1"></i> Card View
                          </button>
                        </div>
                        <div id="transactionItemsContainer">
                          <p class="text-muted">No prescription selected or no items available.</p>
                        </div>
                      </div>
                    </div>

                    <!-- Buttons -->
                    <div class="col-12">
                      <div class="d-flex gap-2 justify-content-end">
                        <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                          <i class="ri-arrow-go-back-line me-1"></i> Cancel
                        </button>
                        <button type="reset" id="clearBtn" class="btn btn-warning">
                          <i class="ri-refresh-line me-1"></i> Clear
                        </button>
                        <button type="submit" class="btn btn-primary">
                          <i class="ri-save-3-line me-1"></i> Save Transaction
                        </button>
                      </div>
                    </div>

                  </div>
                </form>
              </div>
              <!-- /formContainer -->



              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/pharmacy-transaction/pharmacy-transaction-main.js"></script>
</body>
</html>
