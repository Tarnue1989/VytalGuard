<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Pharmacy Transactions</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Pharmacy Transactions">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
  <link rel="stylesheet" href="assets/vendor/datatables/dataTables.bs5.css">
  <link rel="stylesheet" href="assets/vendor/datatables/dataTables.bs5-custom.css">
  <link rel="stylesheet" href="assets/vendor/datatables/buttons/dataTables.bs5-custom.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/filter-page.css" />
  <link rel="stylesheet" href="assets/css/print.css" media="print" />
  <link rel="stylesheet" href="assets/css/summary.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Hero Header -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Pharmacy</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Transactions</li>
        </ol>

        <div class="ms-auto d-lg-flex d-none flex-row">
          <div class="input-group">
            <span class="input-group-text bg-primary-lighten">
              <i class="ri-calendar-2-line text-primary"></i>
            </span>
            <input type="text" id="dateRange" class="form-control custom-daterange">
          </div>
        </div>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">

            <div class="card">
              <div class="card-header d-flex align-items-center justify-content-between">
                <h5 class="card-title">Pharmacy Transactions</h5>
                <a href="add-pharmacy-transaction.html" class="btn btn-primary ms-auto">
                  <i class="ri-add-line me-1"></i> Add
                </a>
              </div>

              <div class="card-body">

                <!-- Filters -->
                <div class="card panel-card mb-3">
                  <div class="card-header d-flex align-items-center justify-content-between">
                    <button id="toggleFilterBtn" class="btn btn-outline-secondary btn-sm">
                      <i class="fas fa-filter me-1"></i> Filters
                      <i id="filterChevron" class="fas fa-chevron-down toggle-icon ms-1"></i>
                    </button>

                    <!-- ✅ Export Buttons -->
                    <div class="view-actions d-flex gap-2">
                      <button id="exportCSVBtn" class="btn btn-outline-success btn-sm">
                        <i class="fas fa-file-csv me-1"></i> CSV
                      </button>
                      <button id="exportExcelBtn" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-file-excel me-1"></i> Excel
                      </button>
                      <button id="exportPDFBtn" class="btn btn-outline-danger btn-sm">
                        <i class="fas fa-file-pdf me-1"></i> PDF
                      </button>
                    </div>
                  </div>

                  <div id="filterCollapse" class="card-body filter-body">
                    <div class="section-label mb-2"><strong>Filter Transactions</strong></div>
                    <div class="row g-3 filter-grid compact">

                      <!-- Patient -->
                      <div class="col-md-3">
                        <div class="field-wrapper">
                          <label for="filterPatient" class="form-label">Patient</label>
                          <input type="text" id="filterPatient" class="form-control suggestion-input" autocomplete="off" />
                          <div id="filterPatientSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <!-- Prescription -->
                      <div class="col-md-3">
                        <div class="field-wrapper">
                          <label for="filterPrescription" class="form-label">Prescription</label>
                          <input type="text" id="filterPrescription" class="form-control suggestion-input" autocomplete="off" />
                          <div id="filterPrescriptionSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <!-- Medication -->
                      <div class="col-md-3">
                        <div class="field-wrapper">
                          <label for="filterMedication" class="form-label">Medication</label>
                          <input type="text" id="filterMedication" class="form-control suggestion-input" autocomplete="off" />
                          <div id="filterMedicationSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <!-- Fulfilled By -->
                      <div class="col-md-3">
                        <div class="field-wrapper">
                          <label for="filterFulfilledBy" class="form-label">Fulfilled By</label>
                          <input type="text" id="filterFulfilledBy" class="form-control suggestion-input" autocomplete="off" />
                          <div id="filterFulfilledBySuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <!-- Status -->
                      <div class="col-md-2">
                        <div class="field-wrapper">
                          <label for="filterStatus" class="form-label">Status</label>
                          <select id="filterStatus" class="form-select">
                            <option value="">🔄 All Statuses</option>
                            <option value="draft">Draft</option>
                            <option value="pending">Pending</option>
                            <option value="dispensed">Dispensed</option>
                            <option value="partially_dispensed">Partially Dispensed</option>
                            <option value="returned">Returned</option>
                            <option value="cancelled">Cancelled</option>
                            <option value="voided">Voided</option>
                            <option value="verified">Verified</option>
                          </select>
                        </div>
                      </div>

                      <!-- Organization -->
                      <div class="col-md-3">
                        <div class="field-wrapper">
                          <label for="filterOrg" class="form-label">Organization</label>
                          <input type="text" id="filterOrg" class="form-control suggestion-input" autocomplete="off" />
                          <div id="filterOrgSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <!-- Facility -->
                      <div class="col-md-3">
                        <div class="field-wrapper">
                          <label for="filterFacility" class="form-label">Facility</label>
                          <input type="text" id="filterFacility" class="form-control suggestion-input" autocomplete="off" />
                          <div id="filterFacilitySuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <!-- Date range -->
                      <div class="col-md-2">
                        <div class="field-wrapper">
                          <label for="filterDateFrom" class="form-label">From Date</label>
                          <input type="date" id="filterDateFrom" class="form-control" />
                        </div>
                      </div>
                      <div class="col-md-2">
                        <div class="field-wrapper">
                          <label for="filterDateTo" class="form-label">To Date</label>
                          <input type="date" id="filterDateTo" class="form-control" />
                        </div>
                      </div>

                      <!-- Actions -->
                      <div class="col-12 d-flex gap-2 filter-actions">
                        <button id="filterBtn" class="btn btn-primary btn-sm">
                          <i class="fas fa-search me-1"></i> Search
                        </button>
                        <button id="resetFilterBtn" class="btn btn-outline-secondary btn-sm">
                          <i class="fas fa-times me-1"></i> Clear
                        </button>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- View Toggle -->
                <div class="d-flex mb-2 view-toggle compact">
                  <div class="dropdown relative-wrapper export-ignore">
                    <button class="btn btn-outline-primary btn-sm dropdown-toggle"
                            id="fieldSelectorBtn"
                            data-bs-toggle="dropdown"
                            aria-expanded="false">
                      <i class="fas fa-columns me-1"></i> Select Fields
                    </button>
                    <div class="dropdown-menu p-2 field-selector-dropdown"
                         id="fieldSelectorDropdown"
                         style="min-width:240px;">
                      <!-- dynamic checkboxes -->
                    </div>
                  </div>
                  <div class="btn-group" role="group">
                    <button id="cardViewBtn" class="btn btn-outline-secondary btn-sm btn-toggle">
                      <i class="fas fa-th me-1"></i> Card
                    </button>
                    <button id="tableViewBtn" class="btn btn-outline-secondary btn-sm btn-toggle active">
                      <i class="fas fa-table me-1"></i> Table
                    </button>
                    <!-- 💊 Summary View Button -->
                    <button id="summaryViewBtn" class="btn btn-outline-primary btn-sm btn-toggle">
                      <i class="fas fa-pills me-1"></i> Summary
                    </button>
                  </div>


                </div>
                <!-- Records per page -->
                <div class="btn-group align-items-center ms-2" role="group">

                  <span class="btn btn-outline-secondary btn-sm px-2 pe-none">
                    Show
                  </span>

                  <select id="recordsPerPage"
                          class="btn btn-outline-secondary btn-sm text-center"
                          style="width:64px; appearance:auto;">
                    <option value="10">10</option>
                    <option value="25" selected>25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                  </select>

                  <span class="btn btn-outline-secondary btn-sm px-2 pe-none">
                    Rows
                  </span>

                </div>

<!-- 📊 Breakdown Summary -->
<hr class="my-2">

<div class="text-muted fw-semibold small mb-1">
  Breakdown Summary
</div>

<div id="moduleSummary" class="mb-3">
  <div class="card shadow-sm border">
    <div class="card-body p-3">

      <!-- 🔹 KPI ROW -->
      <div class="row text-center mb-3 g-2" id="summaryKpis">
        <!-- injected by JS -->
      </div>

      <!-- 🔹 STATUS BREAKDOWN -->
      <div class="mb-2 d-flex flex-wrap gap-2" id="summaryStatuses">
        <!-- injected by JS -->
      </div>

      <!-- 🔹 METRICS -->
      <div class="small text-muted d-flex flex-wrap gap-3" id="summaryMetrics">
        <!-- injected by JS -->
      </div>

    </div>
  </div>
</div>

<hr class="my-2">


                <!-- Table -->
                <div class="table-responsive table-container active">
                  <table class="table m-0 align-middle data-table print-table">
                    <caption class="visually-hidden">Pharmacy transactions table listing with dynamic fields</caption>
                    <thead id="dynamicTableHead"></thead>
                    <tbody id="pharmacyTransactionTableBody"></tbody>
                  </table>
                </div>

                <!-- Card list -->
                <div id="pharmacyTransactionList" class="card-list"></div>

                <!-- 💊 Summary Table (hidden by default) -->
                <div id="pharmacySummaryContainer" class="mt-3" style="display:none;">
                  <div class="card card-body shadow-sm">
                    <div class="d-flex mb-2 view-toggle compact align-items-center">

                      <!-- ✅ Use the *exact same* dropdown class structure -->
                      <div class="dropdown relative-wrapper export-ignore">
                        <button
                          class="btn btn-outline-primary btn-sm dropdown-toggle"
                          id="summaryFieldSelectorBtn"
                          data-bs-toggle="dropdown"
                          aria-expanded="false"
                          type="button">
                          <i class="fas fa-columns me-1"></i> Select Fields
                        </button>
                        <div
                          class="dropdown-menu p-2 field-selector-dropdown"
                          id="summaryFieldSelectorDropdown"
                          style="min-width:240px;">
                          <!-- dynamic checkboxes -->
                        </div>
                      </div>
                                            <h6 class="fw-bold mb-0 flex-grow-1">
                        <i class="fas fa-pills me-1"></i> Medication Summary
                      </h6>

                    </div>

                    <!-- Dynamic Summary Table -->
                    <div class="table-responsive border rounded">
                      <table
                        id="pharmacySummaryTable"
                        class="table table-bordered table-striped table-sm mb-0 align-middle">
                        <thead id="pharmacySummaryHead" class="table-light"></thead>
                        <tbody id="pharmacySummaryBody"></tbody>
                      </table>
                    </div>
                  </div>
                </div>


                <!-- Pagination -->
                <div id="paginationButtons" class="pagination-controls text-center mt-3"></div>

              </div>
            </div>
            <!-- /card -->

          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <div id="viewModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="viewModalTitle">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="viewModalTitle">Details</h2>
        <button id="closeViewModal" class="close-btn" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="viewModalBody"></div>
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/vendor/datatables/dataTables.min.js"></script>
  <script src="assets/vendor/datatables/dataTables.bootstrap.min.js"></script>
  <script src="assets/vendor/datatables/custom/custom-datatables.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- html2pdf -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script type="module" src="/js/logout.js"></script>
  <script type="module" src="/js/authSession.js"></script>

  <!-- Pharmacy Transaction module -->
  <script type="module" src="/js/modules/pharmacy-transaction/pharmacy-transaction-filter-main.js"></script>

</body>
</html>
