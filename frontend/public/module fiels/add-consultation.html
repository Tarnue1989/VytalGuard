<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Consultation</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add a Consultation">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Consultations</li>
          <li class="breadcrumb-item text-primary" aria-current="page">
            Add Consultation
          </li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Consultation</h5>
              </div>
              <div class="card-body">

                <!-- 📦 Form Container -->
                <div id="formContainer">
                  <form id="consultationForm" novalidate>
                    <div class="row gx-4">

                      <!-- ================= Identity ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Identity</h6>
                        <hr />
                      </div>

                      <!-- Patient -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="field-wrapper">
                          <label class="form-label" for="patientInput">
                            Patient <span class="text-danger">*</span>
                          </label>
                          <input
                            type="text"
                            class="form-control suggestion-input"
                            id="patientInput"
                            placeholder="Search patient..."
                            autocomplete="off"
                          />
                          <input
                            type="hidden"
                            id="patientId"
                            name="patient_id"
                          />
                          <div id="patientSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <!-- Department -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label" for="departmentSelect">
                            Department
                          </label>
                          <select
                            class="form-control"
                            id="departmentSelect"
                            name="department_id"
                          >
                            <!-- populated dynamically -->
                          </select>
                        </div>
                      </div>

                      <!-- Appointment -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label" for="appointmentSelect">
                            Appointment
                          </label>
                          <select
                            class="form-control"
                            id="appointmentSelect"
                            name="appointment_id"
                          >
                            <option value="">— Select Appointment —</option>
                          </select>
                        </div>
                      </div>

                      <!-- Consultation Type -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label" for="consultationTypeSelect">
                            Consultation Type
                          </label>
                          <select
                            class="form-control"
                            id="consultationTypeSelect"
                            name="consultation_type_id"
                          >
                            <!-- populated dynamically -->
                          </select>
                        </div>
                      </div>

                      <!-- Consultation Date -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label" for="consultationDate">
                            Date
                          </label>
                          <input
                            type="date"
                            class="form-control"
                            id="consultationDate"
                            name="consultation_date"
                          />
                        </div>
                      </div>

                      <!-- Doctor (Superadmin only) -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div
                          class="field-wrapper form-group hidden"
                          id="doctorFieldGroup"
                        >
                          <label class="form-label" for="doctorInput">
                            Doctor
                          </label>
                          <input
                            type="text"
                            class="form-control suggestion-input"
                            id="doctorInput"
                            placeholder="Search doctor..."
                            autocomplete="off"
                          />
                          <input
                            type="hidden"
                            id="doctorId"
                            name="doctor_id"
                          />
                          <div id="doctorSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <!-- Diagnosis -->
                      <div class="col-xxl-6 col-lg-8 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label" for="diagnosis">
                            Diagnosis
                          </label>
                          <input
                            type="text"
                            class="form-control"
                            id="diagnosis"
                            name="diagnosis"
                            placeholder="Enter diagnosis"
                          />
                        </div>
                      </div>

                      <!-- Notes -->
                      <div class="col-xxl-6 col-lg-8 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label" for="consultationNotes">
                            Notes
                          </label>
                          <textarea
                            class="form-control"
                            id="consultationNotes"
                            name="consultation_notes"
                            rows="2"
                            placeholder="Additional notes"
                          ></textarea>
                        </div>
                      </div>

                      <!-- Prescribed Medications -->
                      <div class="col-xxl-6 col-lg-8 col-sm-12">
                        <div class="mb-3">
                          <label
                            class="form-label"
                            for="prescribedMedications"
                          >
                            Prescribed Medications
                          </label>
                          <textarea
                            class="form-control"
                            id="prescribedMedications"
                            name="prescribed_medications"
                            rows="2"
                            placeholder="Enter medications"
                          ></textarea>
                        </div>
                      </div>

                      <!-- ================= Scope ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Scope</h6>
                        <hr />
                      </div>

                      <!-- Organization -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="organizationSelect">
                            Organization <span class="text-danger">*</span>
                          </label>
                          <select
                            class="form-control"
                            id="organizationSelect"
                            name="organization_id"
                          >
                            <!-- dynamically populated -->
                          </select>
                        </div>
                      </div>

                      <!-- Facility -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="facilitySelect">
                            Facility
                            <span class="text-muted">(optional)</span>
                          </label>
                          <select
                            class="form-control"
                            id="facilitySelect"
                            name="facility_id"
                          >
                            <!-- dynamically populated -->
                          </select>
                        </div>
                      </div>

                      <!-- ================= Actions ================= -->
                      <div class="col-sm-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button
                            type="button"
                            id="cancelBtn"
                            class="btn btn-outline-secondary"
                          >
                            <i class="ri-arrow-go-back-line me-1"></i>
                            Cancel
                          </button>
                          <button
                            type="reset"
                            id="clearBtn"
                            class="btn btn-warning"
                          >
                            <i class="ri-refresh-line me-1"></i>
                            Clear
                          </button>
                          <button
                            type="submit"
                            class="btn btn-primary"
                          >
                            <i class="ri-save-3-line me-1"></i>
                            Save Consultation
                          </button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>
                <!-- /formContainer -->

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script
    type="module"
    src="js/modules/consultations/add-consultation.js"
  ></script>
</body>
</html>
