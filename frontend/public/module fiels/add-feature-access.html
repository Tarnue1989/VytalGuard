<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Feature Access</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Manage Feature Access">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Feature Access</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Access</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Feature Access</h5>
              </div>

              <div class="card-body">
                <div id="formContainer">
                  <form id="featureAccessForm" novalidate>
                    <div class="row gx-4">

                      <!-- ================= Scope ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Scope</h6>
                        <hr />
                      </div>

                      <!-- Organization -->
                      <div class="col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="organization_id">
                            Organization <span class="text-danger">*</span>
                          </label>
                          <select
                            class="form-select"
                            id="organization_id"
                            name="organization_id"
                            data-required="true"
                          >
                            <option value="">-- Select Organization --</option>
                          </select>
                        </div>
                      </div>

                      <!-- Role -->
                      <div class="col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="role_id">
                            Role <span class="text-danger">*</span>
                          </label>
                          <select
                            class="form-select"
                            id="role_id"
                            name="role_id"
                            data-required="true"
                          >
                            <option value="">-- Select Role --</option>
                          </select>
                        </div>
                      </div>

                      <!-- Module (single mode) -->
                      <div class="col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="module_id">
                            Module <span class="text-danger">*</span>
                          </label>
                          <select
                            class="form-select"
                            id="module_id"
                            name="module_id"
                            data-required="true"
                          >
                            <option value="">-- Select Module --</option>
                          </select>
                        </div>
                      </div>

                      <!-- ================= Bulk Actions ================= -->
                      <div class="col-12 d-flex gap-2 mb-3">
                        <button
                          type="button"
                          id="addAllModulesBtn"
                          class="btn btn-sm btn-outline-primary"
                        >
                          <i class="ri-folder-add-line me-1"></i>
                          Select all modules
                        </button>

                        <button
                          type="button"
                          id="grantFullAccessBtn"
                          class="btn btn-sm btn-outline-danger"
                        >
                          <i class="ri-shield-check-line me-1"></i>
                          Replace access (all modules)
                        </button>
                      </div>

                      <!-- ================= Bulk Preview ================= -->
                      <div class="col-12 d-none" id="modulePreviewContainer">
                        <label class="form-label">
                          Modules to be granted
                          <small class="text-muted">(bulk replace)</small>
                        </label>

                        <div class="d-flex gap-2 mb-2">
                          <button type="button" class="btn btn-xs btn-light" id="selectAllPreview">
                            Select all
                          </button>
                          <button type="button" class="btn btn-xs btn-light" id="deselectAllPreview">
                            Deselect all
                          </button>
                        </div>

                        <div
                          id="modulePreviewList"
                          class="border rounded p-2 module-grid"
                          style="max-height:240px; overflow:auto"
                        >
                          <!-- dynamically rendered -->
                        </div>
                      </div>

                      <!-- ================= Facility ================= -->
                      <div class="col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="facility_id">
                            Facility <small class="text-muted">(optional, org-wide if empty)</small>
                          </label>
                          <select class="form-select" id="facility_id" name="facility_id">
                            <option value="">-- All Facilities (Org-wide) --</option>
                          </select>
                        </div>
                      </div>

                      <!-- ================= Status ================= -->
                      <div class="col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label">
                            Status <span class="text-danger">*</span>
                          </label>
                          <div>
                            <div class="form-check form-check-inline">
                              <input
                                class="form-check-input"
                                type="radio"
                                name="status"
                                value="active"
                                checked
                              >
                              <label class="form-check-label">Active</label>
                            </div>
                            <div class="form-check form-check-inline">
                              <input
                                class="form-check-input"
                                type="radio"
                                name="status"
                                value="inactive"
                              >
                              <label class="form-check-label">Inactive</label>
                            </div>
                          </div>
                        </div>
                      </div>

                      <!-- ================= Actions ================= -->
                      <div class="col-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                            Back
                          </button>
                          <button type="reset" id="clearBtn" class="btn btn-warning">
                            Reset Form
                          </button>
                          <button type="submit" class="btn btn-primary">
                            Save
                          </button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/feature-access/add-feature-access.js"></script>
</body>
</html>
