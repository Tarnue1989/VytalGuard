<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Central Stock</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add Central Stock">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Central Stock</li>
          <li class="breadcrumb-item text-primary" aria-current="page">
            Add Central Stock
          </li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Central Stock</h5>
              </div>

              <div class="card-body">

                <!-- 📦 Form Container -->
                <div id="formContainer">
                  <form id="centralStockForm" novalidate>
                    <div class="row gx-4">

                      <!-- ================= Identity ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Identity</h6>
                        <hr />
                      </div>

                      <!-- Organization (hidden by default) -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6 d-none" id="organizationFieldGroup">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="organizationSelect">
                            Organization <span class="text-danger">*</span>
                          </label>
                          <select class="form-control" id="organizationSelect"></select>
                        </div>
                      </div>

                      <!-- Facility (hidden by default) -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6 d-none" id="facilityFieldGroup">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="facilitySelect">
                            Facility <span class="text-muted">(optional)</span>
                          </label>
                          <select class="form-control" id="facilitySelect"></select>
                        </div>
                      </div>

                      <!-- Supplier -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="supplierSelect">
                            Supplier <span class="text-danger">*</span>
                          </label>
                          <select class="form-control" id="supplierSelect" name="supplier_id"></select>
                        </div>
                      </div>

                      <!-- Master Item -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="field-wrapper">
                          <label class="form-label" for="itemSearch">
                            Item <span class="text-danger">*</span>
                          </label>
                          <input
                            type="text"
                            class="form-control suggestion-input"
                            id="itemSearch"
                            placeholder="Search master item..."
                            autocomplete="off"
                          />
                          <input type="hidden" id="master_item_id" name="master_item_id" />
                          <div id="itemSearchSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <!-- ================= Stock Details ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Stock Details</h6>
                        <hr />
                      </div>

                      <!-- Quantity -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="quantity">
                            Quantity <span class="text-danger">*</span>
                          </label>
                          <input type="number" class="form-control" id="quantity" name="quantity" min="1" />
                        </div>
                      </div>

                      <!-- Received Date -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="receivedDate">
                            Received Date <span class="text-danger">*</span>
                          </label>
                          <input type="date" class="form-control" id="receivedDate" name="received_date" />
                        </div>
                      </div>

                      <!-- Expiry Date -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="expiryDate">
                            Expiry Date
                          </label>
                          <input type="date" class="form-control" id="expiryDate" name="expiry_date" />
                        </div>
                      </div>

                      <!-- Batch Number -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="batchNumber">
                            Batch Number
                          </label>
                          <input type="text" class="form-control" id="batchNumber" name="batch_number" />
                        </div>
                      </div>

                      <!-- Notes -->
                      <div class="col-xxl-6 col-lg-8 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label" for="notes">
                            Notes
                          </label>
                          <textarea class="form-control" id="notes" name="notes" rows="2"></textarea>
                        </div>
                      </div>

                      <!-- ================= Batch / Pills ================= -->
                      <div class="col-sm-12">
                        <div class="d-flex justify-content-start mb-3">
                          <button type="button" id="addItemBtn" class="btn btn-outline-primary">
                            <i class="ri-add-line me-1"></i>
                            Add Item
                          </button>
                        </div>
                      </div>

                      <div class="col-sm-12">
                        <div id="itemPillsContainer" class="mb-3">
                          <p class="text-muted">No items added yet.</p>
                        </div>
                      </div>

                      <!-- ================= Actions ================= -->
                      <div class="col-sm-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                            <i class="ri-arrow-go-back-line me-1"></i>
                            Cancel
                          </button>
                          <button type="reset" id="clearBtn" class="btn btn-warning">
                            <i class="ri-refresh-line me-1"></i>
                            Clear
                          </button>
                          <button type="submit" class="btn btn-primary">
                            <i class="ri-save-3-line me-1"></i>
                            Submit All
                          </button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>
                <!-- /formContainer -->

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/centralstock/add-central-stock.js"></script>
</body>
</html>
