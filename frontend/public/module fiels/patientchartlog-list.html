<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VytalGuard - Chart Access Logs</title>
  <meta name="description" content="VytalGuard HMS - Patient Chart Access Logs" />
  <link rel="shortcut icon" href="assets/images/favicon.svg" />

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css" />
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css" />
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css" />
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">
      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="dashboard.html"><i class="ri-home-3-line"></i></a></li>
          <li class="breadcrumb-item">Patient Charts</li>
          <li class="breadcrumb-item text-primary">Access Logs</li>
        </ol>
      </div>

      <!-- Main Body -->
      <div class="app-body">
        <div class="card">

          <!-- ================= HEADER ================= -->
          <div class="card-header d-flex align-items-center justify-content-between">
            <h5 class="card-title mb-0">Patient Chart Access Logs</h5>
          </div>

          <div class="card-body">

            <!-- ============================================================ -->
            <!-- 🔍 FILTER SECTION -->
            <!-- ============================================================ -->
            <div class="card panel-card mb-3">
              <div class="card-header d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-2">
                  <button id="toggleFilterBtn" class="btn btn-outline-secondary btn-sm">
                    <i class="ri-filter-3-line me-1"></i> Filters
                    <i id="filterChevron" class="ri-arrow-down-s-line toggle-icon ms-1"></i>
                  </button>
                </div>

                <!-- Export Buttons -->
                <div class="view-actions d-flex gap-2">
                  <button id="exportCSVBtn" class="btn btn-outline-success btn-sm">
                    <i class="ri-file-excel-2-line me-1"></i> CSV
                  </button>
                  <button id="exportPDFBtn" class="btn btn-outline-danger btn-sm">
                    <i class="ri-file-pdf-2-line me-1"></i> PDF
                  </button>
                </div>
              </div>

              <div id="filterCollapse" class="card-body filter-body hidden">
                <div class="section-label mb-2"><strong>Filter Access Logs</strong></div>

                <div class="row g-3 filter-grid compact">

                  <div class="col-md-3">
                    <label class="form-label" for="filterOrganizationSelect">Organization</label>
                    <select id="filterOrganizationSelect" class="form-select"></select>
                  </div>

                  <div class="col-md-3">
                    <label class="form-label" for="filterFacilitySelect">Facility</label>
                    <select id="filterFacilitySelect" class="form-select"></select>
                  </div>

                  <div class="col-md-3">
                    <div class="field-wrapper">
                      <label class="form-label" for="filterPatient">Patient</label>
                      <input
                        type="text"
                        id="filterPatient"
                        class="form-control suggestion-input"
                        placeholder="Search patient..."
                        autocomplete="off"
                      />
                      <input type="hidden" id="filterPatientId" />
                      <div id="filterPatientSuggestions" class="suggestions"></div>
                    </div>
                  </div>

                  <div class="col-md-3">
                    <div class="field-wrapper">
                      <label class="form-label" for="filterUser">User</label>
                      <input
                        type="text"
                        id="filterUser"
                        class="form-control suggestion-input"
                        placeholder="Search user..."
                        autocomplete="off"
                      />
                      <input type="hidden" id="filterUserId" />
                      <div id="filterUserSuggestions" class="suggestions"></div>
                    </div>
                  </div>

                  <div class="col-md-2">
                    <label class="form-label" for="filterAction">Action</label>
                    <select id="filterAction" class="form-select">
                      <option value="">— All —</option>
                      <option value="view">View</option>
                      <option value="export">Export</option>
                      <option value="print">Print</option>
                    </select>
                  </div>

                  <div class="col-md-2">
                    <label class="form-label" for="filterFromDate">From</label>
                    <input type="date" id="filterFromDate" class="form-control" />
                  </div>

                  <div class="col-md-2">
                    <label class="form-label" for="filterToDate">To</label>
                    <input type="date" id="filterToDate" class="form-control" />
                  </div>

                  <div class="col-12 d-flex gap-2 filter-actions">
                    <button id="filterBtn" class="btn btn-primary btn-sm">
                      <i class="ri-search-line me-1"></i> Search
                    </button>
                    <button id="resetFilterBtn" class="btn btn-outline-secondary btn-sm">
                      <i class="ri-refresh-line me-1"></i> Clear
                    </button>
                  </div>

                </div>
              </div>
            </div>

            <!-- ============================================================ -->
            <!-- 🧭 VIEW CONTROLS -->
            <!-- ============================================================ -->
            <div class="d-flex mb-2 view-toggle compact align-items-center gap-2 flex-wrap">
              <div class="btn-group" role="group">
                <button id="cardViewBtn" class="btn btn-outline-secondary btn-sm btn-toggle">
                  <i class="ri-layout-grid-line me-1"></i> Card View
                </button>
                <button id="tableViewBtn" class="btn btn-outline-secondary btn-sm btn-toggle active">
                  <i class="ri-table-2-line me-1"></i> Table View
                </button>
              </div>

              <div class="d-flex align-items-center gap-1 ms-2">
                <label for="recordsPerPage" class="fw-semibold text-muted small mb-0">Show</label>
                <select
                  id="recordsPerPage"
                  class="form-select form-select-sm py-0 px-1"
                  style="width:65px;"
                >
                  <option value="10">10</option>
                  <option value="25" selected>25</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
                <span class="text-muted small">records</span>
              </div>
            </div>

            <!-- ============================================================ -->
            <!-- 📋 TABLE -->
            <!-- ============================================================ -->
            <div class="table-responsive table-container active">
              <table class="table table-striped align-middle data-table">
                <thead id="dynamicTableHead"></thead>
                <tbody id="patientChartLogTableBody">
                  <tr>
                    <td colspan="10" class="text-center text-muted py-3">Loading logs...</td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- ============================================================ -->
            <!-- 🗂️ CARD VIEW -->
            <!-- ============================================================ -->
            <div id="patientChartLogList" class="card-view hidden"></div>

            <!-- ============================================================ -->
            <!-- 🔢 PAGINATION -->
            <!-- ============================================================ -->
            <div id="paginationButtons" class="pagination-controls text-center mt-3"></div>

          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts (shared global components) -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <div
    id="viewModal"
    class="modal hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="viewModalTitle"
  >
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="viewModalTitle">Details</h2>
        <button class="close-btn" data-close="viewModal" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="viewModalBody"></div>
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>

  <!-- ✅ Load shared utils BEFORE the module -->
  <script type="module" src="js/utils/pagination-control.js"></script>
  <script type="module" src="js/utils/index.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/patientchart/patientchartlog-filter-main.js"></script>
</body>
</html>
