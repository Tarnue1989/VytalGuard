<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VytalGuard - Add Deposit Refund</title>

  <meta name="description" content="VytalGuard HMS - Add a Deposit Refund" />
  <link rel="shortcut icon" href="assets/images/favicon.svg" />

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css" />
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css" />
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css" />
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css" />
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Deposit Refunds</li>
          <li class="breadcrumb-item text-primary">Add Deposit Refund</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Deposit Refund</h5>
              </div>

              <div class="card-body">

              <!-- 📦 Form Container -->
              <div id="formContainer">
                <form id="refundDepositForm">
                  <div class="row gx-3 gy-3">

                    <!-- Patient (required) -->
                    <div class="col-lg-3 col-sm-6 position-relative">
                      <label class="form-label" for="patientInput">
                        Patient <span class="text-danger">*</span>
                      </label>
                      <input
                        type="text"
                        class="form-control suggestion-input"
                        id="patientInput"
                        placeholder="Search patient..."
                        autocomplete="off"
                      />
                      <input type="hidden" id="patientId" name="patient_id" />
                      <div id="patientSuggestions" class="suggestions"></div>
                    </div>

                    <!-- Deposit Select -->
                    <div class="col-lg-3 col-sm-6">
                      <label class="form-label" for="depositInput">
                        Deposit <span class="text-danger">*</span>
                      </label>
                      <input type="hidden" id="depositId" name="deposit_id" />
                      <select id="depositInput" class="form-control">
                        <option value="">-- Select Deposit --</option>
                      </select>
                    </div>

                    <!-- Refund Amount -->
                    <div class="col-lg-3 col-sm-6">
                      <label class="form-label" for="refund_amount">
                        Refund Amount <span class="text-danger">*</span>
                      </label>
                      <input
                        type="number"
                        step="0.01"
                        id="refund_amount"
                        name="refund_amount"
                        class="form-control"
                      />
                    </div>

                    <!-- Method -->
                    <div class="col-lg-3 col-sm-6">
                      <label class="form-label" for="methodSelect">
                        Method <span class="text-danger">*</span>
                      </label>
                      <select id="methodSelect" class="form-control" name="method">
                        <option value="">-- Select Method --</option>
                        <option value="cash">Cash</option>
                        <option value="card">Card</option>
                        <option value="bank_transfer">Bank Transfer</option>
                        <option value="mobile_money">Mobile Money</option>
                        <option value="cheque">Cheque</option>
                      </select>
                    </div>

                    <!-- Reason -->
                    <div class="col-lg-3 col-sm-6">
                      <label class="form-label" for="reason">
                        Reason <span class="text-danger">*</span>
                      </label>
                      <textarea
                        id="reason"
                        name="reason"
                        rows="2"
                        class="form-control"
                        placeholder="Enter reason for refund"
                      ></textarea>
                    </div>

                    <!-- Organization -->
                    <div class="col-lg-3 col-sm-6 form-group">
                      <label class="form-label" for="organizationSelect">Organization</label>
                      <select
                        id="organizationSelect"
                        name="organization_id"
                        class="form-control"
                      ></select>
                    </div>

                    <!-- Facility -->
                    <div class="col-lg-3 col-sm-6 form-group">
                      <label class="form-label" for="facilitySelect">Facility</label>
                      <select
                        id="facilitySelect"
                        name="facility_id"
                        class="form-control"
                      ></select>
                    </div>

                    <!-- Buttons -->
                    <div class="col-sm-12">
                      <div class="d-flex gap-2 justify-content-end">
                        <button
                          type="button"
                          id="cancelRefundDepositBtn"
                          class="btn btn-outline-secondary"
                        >
                          <i class="ri-arrow-go-back-line me-1"></i> Cancel
                        </button>

                        <button
                          type="reset"
                          id="clearRefundDepositBtn"
                          class="btn btn-warning"
                        >
                          <i class="ri-refresh-line me-1"></i> Clear
                        </button>

                        <button type="submit" class="btn btn-primary">
                          <i class="ri-save-3-line me-1"></i> Save Refund
                        </button>
                      </div>
                    </div>

                  </div>
                </form>
              </div>
              <!-- /formContainer -->


              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <script type="module"
          src="/js/modules/refund-deposits/add-refund-deposit.js"></script>

</body>
</html>
