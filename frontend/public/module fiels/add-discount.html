<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Discount</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add a Discount">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="dashboard.html"><i class="ri-home-3-line"></i></a></li>
          <li class="breadcrumb-item">Discounts</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Discount</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Discount</h5>
              </div>
              <div class="card-body">

              <!-- 📦 Form Container -->
              <div id="formContainer">
                <form id="discountForm">
                  <div class="row gx-3 gy-3">

                    <!-- Invoice (required) -->
                    <div class="col-xxl-6 col-lg-6 col-md-6 col-sm-12 position-relative">
                      <label class="form-label" for="invoiceInput">
                        Invoice <span class="text-danger">*</span>
                      </label>
                      <input type="text" class="form-control suggestion-input" id="invoiceInput"
                             placeholder="Search by invoice number, patient, or code..." autocomplete="off" />
                      <input type="hidden" id="invoiceId" name="invoice_id" />
                      <div id="invoiceSuggestions" class="suggestions"></div>
                    </div>

                    <!-- Invoice Item (optional, dynamic) -->
                    <div class="col-xxl-6 col-lg-6 col-md-6 col-sm-12">
                      <label class="form-label" for="invoiceItemId">Invoice Item</label>
                      <select id="invoiceItemId" name="invoice_item_id" class="form-control">
                        <option value="">-- Apply to whole invoice --</option>
                      </select>
                    </div>

                    <!-- Type (required) -->
                    <div class="col-xxl-4 col-lg-6 col-md-6 col-sm-12">
                      <label class="form-label" for="typeSelect">
                        Discount Type <span class="text-danger">*</span>
                      </label>
                      <select class="form-control" id="typeSelect" name="type">
                        <option value="">-- Select Type --</option>
                        <option value="percentage">Percentage</option>
                        <option value="fixed">Fixed Amount</option>
                      </select>
                    </div>

                    <!-- Value (required) -->
                    <div class="col-xxl-4 col-lg-6 col-md-6 col-sm-12">
                      <label class="form-label" for="value">
                        Value <span class="text-danger">*</span>
                      </label>
                      <input type="number" step="0.01" class="form-control" id="value" name="value"
                             placeholder="Enter discount value" />
                    </div>

                    <!-- Reason (required) -->
                    <div class="col-xxl-8 col-lg-12 col-md-12 col-sm-12" id="reasonGroup">
                      <label class="form-label" for="reason">Reason <span class="text-danger">*</span></label>
                      <textarea class="form-control" id="reason" name="reason" rows="2"
                                placeholder="Provide reason for discount (e.g. hardship, loyalty, approval)"></textarea>
                    </div>


                      <!-- Organization (Super Admins only) -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="organizationSelect">Organization</label>
                          <select class="form-control" id="organizationSelect" name="organization_id">
                            <!-- dynamically populated by JS -->
                          </select>
                        </div>
                      </div>

                      <!-- Facility (Admins only) -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="facilitySelect">Facility</label>
                          <select class="form-control" id="facilitySelect" name="facility_id">
                            <!-- dynamically populated by JS -->
                          </select>
                        </div>
                      </div>

                    <!-- Buttons -->
                    <div class="col-sm-12">
                      <div class="d-flex gap-2 justify-content-end">
                        <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                          <i class="ri-arrow-go-back-line me-1"></i> Cancel
                        </button>
                        <button type="reset" id="clearBtn" class="btn btn-warning">
                          <i class="ri-refresh-line me-1"></i> Clear
                        </button>
                        <button type="submit" class="btn btn-primary">
                          <i class="ri-save-3-line me-1"></i> Save Discount
                        </button>
                      </div>
                    </div>

                  </div>
                </form>
              </div>
              <!-- /formContainer -->

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/discounts/add-discount.js"></script>
</body>
</html>
