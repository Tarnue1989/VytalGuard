<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VytalGuard - Add Ultrasound Record</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add an Ultrasound Record" />
  <link rel="shortcut icon" href="assets/images/favicon.svg" />

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css" />
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css" />
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css" />
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css" />
</head>

<body>
<div class="page-wrapper">
  <div class="app-container">

    <!-- Header -->
    <div class="app-header d-flex align-items-center"></div>

    <!-- Breadcrumb -->
    <div class="app-hero-header d-flex align-items-center">
      <ol class="breadcrumb">
        <li class="breadcrumb-item">
          <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
        </li>
        <li class="breadcrumb-item">Ultrasound Records</li>
        <li class="breadcrumb-item text-primary" aria-current="page">
          Add Ultrasound Record
        </li>
      </ol>
    </div>

    <!-- Body -->
    <div class="app-body">
      <div class="row gx-4">
        <div class="col-sm-12">
          <div class="card">
            <div class="card-header">
              <h5 class="card-title">Add Ultrasound Record</h5>
            </div>

            <div class="card-body">
              <div id="formContainer">
                <form id="ultrasoundRecordForm" novalidate enctype="multipart/form-data">
                  <div class="row gx-3 gy-3">

                    <!-- ================= Identity ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Identity</h6>
                      <hr />
                    </div>

                    <!-- Patient -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6 position-relative">
                      <label class="form-label" for="patientInput">
                        Patient <span class="text-danger">*</span>
                      </label>
                      <input type="text" class="form-control suggestion-input"
                             id="patientInput" placeholder="Search patient..." autocomplete="off" />
                      <input type="hidden" id="patientId" name="patient_id" />
                      <div id="patientSuggestions" class="suggestions"></div>
                    </div>

                    <!-- Technician -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6 position-relative">
                      <label class="form-label" for="technicianInput">Technician</label>
                      <input type="text" class="form-control suggestion-input"
                             id="technicianInput" placeholder="Search technician..." autocomplete="off" />
                      <input type="hidden" id="technicianId" name="technician_id" />
                      <div id="technicianSuggestions" class="suggestions"></div>
                    </div>

                    <!-- Scan Date -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="scanDate">
                        Scan Date <span class="text-danger">*</span>
                      </label>
                      <input type="date" class="form-control"
                             id="scanDate" name="scan_date" />
                    </div>

                    <!-- Billable Item -->
                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="billableItemSelect">
                        Scan Type <span class="text-danger">*</span>
                      </label>
                      <select class="form-control"
                              id="billableItemSelect"
                              name="billable_item_id"></select>
                      <input type="hidden" id="scanType" name="scan_type" />
                    </div>

                    <!-- ================= Clinical Links ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Clinical Links</h6>
                      <hr />
                    </div>

                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="consultationSelect">Consultation</label>
                      <select class="form-control"
                              id="consultationSelect"
                              name="consultation_id"></select>
                    </div>

                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="maternityVisitSelect">Maternity Visit</label>
                      <select class="form-control"
                              id="maternityVisitSelect"
                              name="maternity_visit_id"></select>
                    </div>

                    <!-- ================= Scan Details ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Scan Details</h6>
                      <hr />
                    </div>

                    <div class="col-md-4">
                      <label class="form-label" for="scanLocation">Scan Location</label>
                      <input type="text" class="form-control"
                             id="scanLocation" name="scan_location" />
                    </div>

                    <div class="col-md-8">
                      <label class="form-label" for="ultraFindings">Findings</label>
                      <textarea class="form-control"
                                id="ultraFindings"
                                name="ultra_findings"
                                rows="2"></textarea>
                    </div>

                    <div class="col-md-6">
                      <label class="form-label" for="note">Notes</label>
                      <textarea class="form-control"
                                id="note"
                                name="note"
                                rows="2"></textarea>
                    </div>

                    <!-- ================= Measurements ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Measurements</h6>
                      <hr />
                    </div>

                    <div class="col-md-2">
                      <label class="form-label" for="numberOfFetus">No. of Fetuses</label>
                      <input type="number" class="form-control"
                             id="numberOfFetus" name="number_of_fetus" />
                    </div>

                    <div class="col-md-2">
                      <label class="form-label" for="biparietalDiameter">BPD</label>
                      <input type="number" step="0.01" class="form-control"
                             id="biparietalDiameter" name="biparietal_diameter" />
                    </div>

                    <div class="col-md-2">
                      <label class="form-label" for="presentation">Presentation</label>
                      <input type="text" class="form-control"
                             id="presentation" name="presentation" />
                    </div>

                    <div class="col-md-2">
                      <label class="form-label" for="lie">Lie</label>
                      <input type="text" class="form-control"
                             id="lie" name="lie" />
                    </div>

                    <div class="col-md-2">
                      <label class="form-label" for="position">Position</label>
                      <input type="text" class="form-control"
                             id="position" name="position" />
                    </div>

                    <div class="col-md-2">
                      <label class="form-label" for="amnioticVolume">Amniotic Volume</label>
                      <input type="number" step="0.01" class="form-control"
                             id="amnioticVolume" name="amniotic_volume" />
                    </div>

                    <div class="col-md-2">
                      <label class="form-label" for="fetalHeartRate">Fetal Heart Rate</label>
                      <input type="number" class="form-control"
                             id="fetalHeartRate" name="fetal_heart_rate" />
                    </div>

                    <div class="col-md-2">
                      <label class="form-label" for="gender">Gender</label>
                      <select class="form-control" id="gender" name="gender">
                        <option value="">-- Select Gender --</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                      </select>
                    </div>

                    <!-- ================= History ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">History</h6>
                      <hr />
                    </div>

                    <div class="col-md-6">
                      <label class="form-label" for="indication">Indication</label>
                      <textarea class="form-control"
                                id="indication"
                                name="indication"
                                rows="2"></textarea>
                    </div>

                    <div class="col-md-3 form-check mt-4">
                      <input class="form-check-input"
                             type="checkbox"
                             id="previousCesarean"
                             name="previous_cesarean" />
                      <label class="form-check-label" for="previousCesarean">
                        Previous Cesarean
                      </label>
                    </div>

                    <div class="col-md-3">
                      <label class="form-label" for="prevCesDate">Prev Ces Date</label>
                      <input type="date" class="form-control"
                             id="prevCesDate" name="prev_ces_date" />
                    </div>

                    <div class="col-md-3">
                      <label class="form-label" for="prevCesLocation">Prev Ces Location</label>
                      <input type="text" class="form-control"
                             id="prevCesLocation" name="prev_ces_location" />
                    </div>

                    <div class="col-md-3">
                      <label class="form-label" for="cesareanDate">Cesarean Date</label>
                      <input type="date" class="form-control"
                             id="cesareanDate" name="cesarean_date" />
                    </div>

                    <div class="col-md-6">
                      <label class="form-label" for="nextOfKin">Next of Kin</label>
                      <input type="text" class="form-control"
                             id="nextOfKin" name="next_of_kin" />
                    </div>

                    <!-- ================= File Upload ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Ultrasound File</h6>
                      <hr />
                    </div>

                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="ultrasoundFile">
                        Upload File (Image / PDF)
                      </label>
                      <input type="file"
                             class="form-control"
                             id="ultrasoundFile"
                             name="ultrasound_file"
                             accept="image/*,application/pdf" />
                    </div>

                    <!-- ================= Scope ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Scope</h6>
                      <hr />
                    </div>

                    <div class="col-md-3 form-check mt-4">
                      <input class="form-check-input"
                             type="checkbox"
                             id="isEmergency"
                             name="is_emergency" />
                      <label class="form-check-label" for="isEmergency">
                        Emergency
                      </label>
                    </div>

                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6 superadmin-only">
                      <label class="form-label" for="organizationSelect">Organization</label>
                      <select id="organizationSelect" class="form-control"></select>
                    </div>

                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="facilitySelect">Facility</label>
                      <select id="facilitySelect" class="form-control"></select>
                    </div>

                    <div class="col-xxl-3 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label" for="departmentSelect">Department</label>
                      <select id="departmentSelect" class="form-control" name="department_id"></select>
                    </div>

                    <!-- ================= Actions ================= -->
                    <div class="col-sm-12">
                      <div class="d-flex gap-2 justify-content-end">
                        <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                          <i class="ri-arrow-go-back-line me-1"></i> Cancel
                        </button>
                        <button type="reset" id="clearBtn" class="btn btn-warning">
                          <i class="ri-refresh-line me-1"></i> Clear
                        </button>
                        <button type="submit" class="btn btn-primary">
                          <i class="ri-save-3-line me-1"></i> Save Ultrasound Record
                        </button>
                      </div>
                    </div>

                  </div>
                </form>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="app-footer">
      <span>© VytalGuard HMS 2025</span>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="hidden">
  <div class="spinner-box">
    <i class="fas fa-spinner fa-spin"></i> Loading...
  </div>
</div>

<!-- JS -->
<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/moment.min.js"></script>
<script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
<script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
<script src="assets/vendor/daterange/daterange.js"></script>
<script src="assets/vendor/daterange/custom-daterange.js"></script>
<script src="assets/js/custom.js"></script>

<script type="module" src="js/modules/ultrasound-records/add-ultrasound-record.js"></script>
 
  

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
