<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Organization</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add an Organization">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Organizations</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Organization</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Organization</h5>
              </div>
              <div class="card-body">

                <!-- 📦 Form Container -->
                <div id="formContainer">
                  <form id="organizationForm" novalidate>
                    <div class="row gx-4">

                      <!-- ================= Organization Information ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Organization Information</h6>
                        <hr />
                      </div>

                      <!-- Organization Name -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="name">
                            Organization Name <span class="text-danger">*</span>
                          </label>
                          <input
                            type="text"
                            class="form-control"
                            id="name"
                            name="name"
                            minlength="3"
                            data-required="true"
                            placeholder="Enter organization name"
                          >
                        </div>
                      </div>

                      <!-- Organization Code -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="code">
                            Code <span class="text-danger">*</span>
                          </label>
                          <input
                            type="text"
                            class="form-control"
                            id="code"
                            name="code"
                            placeholder="Enter code"
                            pattern="[A-Za-z0-9_\-]+"
                            maxlength="50"
                            data-required="true"
                          >
                        </div>
                      </div>

                      <!-- ================= Organization Settings ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Organization Settings</h6>
                        <hr />
                      </div>

                      <!-- Status -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label">Status</label>
                          <div>
                            <div class="form-check form-check-inline">
                              <input
                                class="form-check-input"
                                type="radio"
                                name="status"
                                id="status_active"
                                value="active"
                                checked
                              >
                              <label class="form-check-label" for="status_active">
                                Active
                              </label>
                            </div>
                            <div class="form-check form-check-inline">
                              <input
                                class="form-check-input"
                                type="radio"
                                name="status"
                                id="status_inactive"
                                value="inactive"
                              >
                              <label class="form-check-label" for="status_inactive">
                                Inactive
                              </label>
                            </div>
                          </div>
                        </div>
                      </div>

                      <!-- ================= Actions ================= -->
                      <div class="col-sm-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button
                            type="button"
                            id="cancelBtn"
                            class="btn btn-outline-secondary"
                          >
                            <i class="ri-arrow-go-back-line me-1"></i> Cancel
                          </button>
                          <button
                            type="reset"
                            id="clearBtn"
                            class="btn btn-warning"
                          >
                            <i class="ri-refresh-line me-1"></i> Clear
                          </button>
                          <button
                            type="submit"
                            class="btn btn-primary"
                          >
                            <i class="ri-save-3-line me-1"></i> Save Organization
                          </button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>
                <!-- /formContainer -->

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/organization/add-organization.js"></script>
 
  

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
