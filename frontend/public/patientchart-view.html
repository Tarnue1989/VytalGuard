<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VytalGuard - Patient Chart View</title>
    <meta name="description" content="VytalGuard HMS - Full Patient Chart View" />
    <link rel="shortcut icon" href="assets/images/favicon.svg" />

    <!-- CSS -->
    <link rel="stylesheet" href="assets/fonts/remix/remixicon.css" />
    <link rel="stylesheet" href="assets/css/admin-global.css" />
    <link rel="stylesheet" href="assets/css/main.min.css" />
    <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <div class="app-container">
        <!-- Header -->
        <div class="app-header d-flex align-items-center"></div>

        <!-- Breadcrumb -->
        <div class="app-hero-header d-flex align-items-center">
          <ol class="breadcrumb">
            <li class="breadcrumb-item">
              <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
            </li>
            <li class="breadcrumb-item">Patient Charts</li>
            <li class="breadcrumb-item text-primary" aria-current="page">Full Chart View</li>
          </ol>
        </div>

        <!-- =============================== -->
        <!-- 📄 Main Body -->
        <!-- =============================== -->
        <div class="app-body">

          <!-- 📅 Date Range Filter Toolbar -->
          <div class="card border-0 shadow-sm mb-3 p-3">
            <div class="row g-2 align-items-end">
              <div class="col-md-3">
                <label class="form-label mb-0">From Date</label>
                <input type="date" id="filterFromDate" class="form-control form-control-sm" />
              </div>
              <div class="col-md-3">
                <label class="form-label mb-0">To Date</label>
                <input type="date" id="filterToDate" class="form-control form-control-sm" />
              </div>
              <div class="col-md-3">
                <button id="applyDateFilter" class="btn btn-sm btn-primary mt-3 w-100">
                  <i class="ri-filter-2-line me-1"></i> Apply Filter
                </button>
              </div>
            </div>
          </div>

          <!-- 🧾 Patient Header Summary -->
          <div id="patientChartHeader" class="mb-2"></div>

          <!-- 🩺 Full Chart Container -->
          <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
              <h5 class="card-title mb-0">
                <i class="ri-contacts-line me-1"></i> Full Patient Chart
              </h5>
              <div class="d-flex gap-2 flex-wrap">
                <button id="backBtn" class="btn btn-outline-secondary btn-sm">
                  <i class="ri-arrow-left-line me-1"></i> Back
                </button>
                <button id="printBtn" class="btn btn-outline-primary btn-sm">
                  <i class="ri-printer-line me-1"></i> Print
                </button>
                <button id="refreshBtn" class="btn btn-outline-success btn-sm">
                  <i class="ri-refresh-line me-1"></i> Refresh Cache
                </button>
              </div>
            </div>

            <div class="card-body">
              <div id="patientChartContainer" class="p-2">
                <p class="text-muted text-center">Loading patient chart...</p>
              </div>
            </div>
          </div>
        </div>

        <!-- =============================== -->
        <!-- Footer -->
        <!-- =============================== -->
        <div class="app-footer text-center py-3">
          <span>© ${new Date().getFullYear()} VytalGuard HMS</span>
        </div>
      </div>
    </div>

    <!-- Global Loading Overlay -->
    <div id="loadingOverlay" class="hidden">
      <div class="spinner-box">
        <i class="fas fa-spinner fa-spin"></i> Loading...
      </div>
    </div>

    <!-- JS Dependencies -->
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
    <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>

    <!-- Utilities -->
    <script type="module" src="js/utils/index.js"></script>

    <!-- Patient Chart Script -->
    <script type="module" src="js/modules/patientchart/patientchart.js"></script>
   
  

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
