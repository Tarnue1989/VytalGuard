<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login – VytalGuard</title>

  <link rel="stylesheet" href="/assets/fonts/remix/remixicon.css" />
  <link rel="stylesheet" href="/assets/css/main.min.css" />
  <link rel="stylesheet" href="/assets/css/login.css" />

</head>

<body class="login-bg">
  <div class="container-fluid p-0">
    <div class="auth-wrapper">

      <!-- ================= LOGIN ================= -->
      <form id="loginForm" novalidate>
        <div class="auth-box">

          <a href="/" class="auth-logo mb-4">
            <img src="/assets/images/logo.svg" alt="Logo" />
          </a>

          <h4 class="mb-4 text-center">Sign In</h4>

          <div class="floating-group">
            <input type="email" id="email" placeholder=" " required />
            <label>Email</label>
          </div>

          <div class="floating-group">
            <input type="password" id="password" placeholder=" " required />
            <label>Password</label>
          </div>

          <button id="togglePasswordBtn" type="button" class="btn btn-light w-100 mb-3">
            <i class="ri-eye-line"></i> Show Password
          </button>

          <div class="mb-3 text-end">
            <a href="javascript:void(0)" id="useResetTokenLink">Use Reset Token</a>
          </div>

          <button type="submit" class="btn btn-primary w-100">Login</button>

          <p id="errorMsg" class="text-danger mt-2" style="display:none;"></p>

        </div>
      </form>

      <!-- ================= FORCE RESET ================= -->
      <form id="resetPasswordForm" style="display:none;">
        <div class="auth-box">

          <h5 class="text-center mb-3">Reset Password</h5>

          <p id="resetErrorMsg" class="text-danger" style="display:none;"></p>

          <div class="floating-group">
            <input type="password" id="newPassword" placeholder=" " required />
            <label>New Password</label>

            <div class="strength-bar">
              <div id="strengthFill" class="strength-fill"></div>
            </div>
          </div>

          <div class="floating-group">
            <input type="password" id="confirmPassword" placeholder=" " required />
            <label>Confirm Password</label>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Update Password
          </button>

        </div>
      </form>

      <!-- ================= TOKEN RESET ================= -->
      <div id="tokenResetSection" style="display:none;">
        <form id="tokenResetForm">
          <div class="auth-box">

            <h5 class="text-center mb-3">Reset via Token</h5>

            <p id="tokenErrorMsg" class="text-danger" style="display:none;"></p>

            <div class="floating-group">
              <input type="email" id="tokenEmail" placeholder=" " required />
              <label>Email</label>
            </div>

            <div class="floating-group">
              <input type="text" id="resetToken" placeholder=" " required />
              <label>Reset Token</label>
            </div>

            <div class="floating-group">
              <input type="password" id="tokenNewPassword" placeholder=" " required />
              <label>New Password</label>
            </div>

            <div class="floating-group">
              <input type="password" id="tokenConfirmPassword" placeholder=" " required />
              <label>Confirm Password</label>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Reset Password
            </button>

            <button type="button" id="backToLoginBtn" class="btn btn-secondary w-100 mt-2">
              ← Back
            </button>

          </div>
        </form>
      </div>

    </div>
  </div>

  <script src="/js/login/index.js" type="module"></script>

</body>
</html>
