<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Patient</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add a Patient">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css">
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
<div class="page-wrapper">
  <div class="app-container">

    <!-- Header -->
    <div class="app-header d-flex align-items-center"></div>

    <!-- Breadcrumb -->
    <div class="app-hero-header d-flex align-items-center">
      <ol class="breadcrumb">
        <li class="breadcrumb-item">
          <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
        </li>
        <li class="breadcrumb-item">Patients</li>
        <li class="breadcrumb-item text-primary" aria-current="page">
          Add Patient
        </li>
      </ol>
    </div>

    <!-- Body -->
    <div class="app-body">
      <div class="row gx-4">
        <div class="col-sm-12">
          <div class="card">
            <div class="card-header">
              <h5 class="card-title">Add Patient</h5>
            </div>
            <div class="card-body">

              <!-- 📦 Form Container -->
              <div id="formContainer">
                <form id="patientForm" enctype="multipart/form-data" novalidate>
                  <div class="row gx-4">

                    <!-- ================= Identity ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Identity</h6>
                      <hr/>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="pat_no">Patient No</label>
                        <input type="text" class="form-control" id="pat_no" name="pat_no"
                               placeholder="Leave blank to auto-generate">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="first_name">
                          First Name <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control" id="first_name"
                               name="first_name" data-required="true">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="middle_name">Middle Name</label>
                        <input type="text" class="form-control" id="middle_name" name="middle_name">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="last_name">
                          Last Name <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control" id="last_name"
                               name="last_name" data-required="true">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="gender">Gender</label>
                        <select class="form-control" id="gender" name="gender">
                          <option value="">-- Select Gender --</option>
                          <option value="male">Male</option>
                          <option value="female">Female</option>
                        </select>
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="date_of_birth">Date of Birth</label>
                        <input type="date" class="form-control" id="date_of_birth" name="date_of_birth">
                      </div>
                    </div>

                    <!-- ================= Contact ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Contact</h6>
                      <hr/>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="phone_number">Phone</label>
                        <input type="text" class="form-control" id="phone_number" name="phone_number">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="email_address">Email</label>
                        <input type="email" class="form-control" id="email_address" name="email_address">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="home_address">Address</label>
                        <textarea class="form-control" id="home_address"
                                  name="home_address" rows="2"></textarea>
                      </div>
                    </div>

                    <!-- ================= Social & Identifiers ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Social & Identifiers</h6>
                      <hr/>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="marital_status">Marital Status</label>
                        <select class="form-control" id="marital_status" name="marital_status">
                          <option value="">-- Select --</option>
                          <option value="single">Single</option>
                          <option value="married">Married</option>
                          <option value="divorced">Divorced</option>
                        </select>
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="religion">Religion</label>
                        <select class="form-select" id="religion" name="religion">
                          <option value="">-- Select Religion --</option>
                          <option value="christianity">Christianity</option>
                          <option value="islam">Islam</option>
                          <option value="hinduism">Hinduism</option>
                          <option value="buddhism">Buddhism</option>
                          <option value="traditional">Traditional</option>
                          <option value="none">None</option>
                          <option value="other">Other</option>
                        </select>
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="profession">Profession</label>
                        <select class="form-select" id="profession" name="profession">
                          <option value="">-- Select Profession --</option>
                          <option value="student">Student</option>
                          <option value="teacher">Teacher</option>
                          <option value="healthcare_worker">Healthcare Worker</option>
                          <option value="farmer">Farmer</option>
                          <option value="trader">Trader / Business</option>
                          <option value="engineer">Engineer</option>
                          <option value="driver">Driver</option>
                          <option value="artisan">Artisan</option>
                          <option value="civil_servant">Civil Servant</option>
                          <option value="unemployed">Unemployed</option>
                          <option value="retired">Retired</option>
                          <option value="other">Other</option>
                        </select>
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="national_id">National ID</label>
                        <input type="text" class="form-control" id="national_id" name="national_id">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="insurance_number">Insurance No</label>
                        <input type="text" class="form-control" id="insurance_number" name="insurance_number">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="passport_number">Passport No</label>
                        <input type="text" class="form-control" id="passport_number" name="passport_number">
                      </div>
                    </div>

                    <!-- ================= Emergency ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Emergency Contact</h6>
                      <hr/>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="emergency_contact_name">Contact Name</label>
                        <input type="text" class="form-control"
                               id="emergency_contact_name" name="emergency_contact_name">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="emergency_contact_phone">Contact Phone</label>
                        <input type="text" class="form-control"
                               id="emergency_contact_phone" name="emergency_contact_phone">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="notes">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="2"></textarea>
                      </div>
                    </div>

                    <!-- ================= Scope ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Scope</h6>
                      <hr/>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="organizationSelect">Organization</label>
                        <select class="form-select" id="organizationSelect" name="organization_id">
                          <option value="">-- Select Organization --</option>
                        </select>
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="facilitySelect">Facility</label>
                        <select class="form-select" id="facilitySelect" name="facility_id">
                          <option value="">-- Select Facility --</option>
                        </select>
                      </div>
                    </div>

                    <!-- ================= Uploads ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Uploads</h6>
                      <hr/>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="photoInput">Profile Photo</label>
                        <input type="file" class="form-control"
                               id="photoInput" name="photo_path" accept="image/*">
                        <div id="photoPreview" class="mt-2"></div>
                        <button type="button" id="removePhotoBtn"
                                class="btn btn-sm btn-danger mt-1 hidden">Remove</button>
                        <input type="hidden" id="remove_photo" name="remove_photo" value="false">
                      </div>
                    </div>

                    <!-- ================= Actions ================= -->
                    <div class="col-sm-12">
                      <div class="d-flex gap-2 justify-content-end">
                        <button type="button" id="cancelBtn"
                                class="btn btn-outline-secondary">
                          <i class="ri-arrow-go-back-line me-1"></i> Cancel
                        </button>
                        <button type="reset" id="clearBtn"
                                class="btn btn-warning">
                          <i class="ri-refresh-line me-1"></i> Clear
                        </button>
                        <button type="submit" class="btn btn-primary">
                          <i class="ri-save-3-line me-1"></i> Save Patient
                        </button>
                      </div>
                    </div>

                  </div>
                </form>
              </div>
              <!-- /formContainer -->

            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="app-footer">
      <span>© VytalGuard HMS 2025</span>
    </div>
  </div>
</div>

<!-- overlays / modals / toasts -->
<div id="loadingOverlay" class="hidden">
  <div class="spinner-box">
    <i class="fas fa-spinner fa-spin"></i> Loading...
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal fade" id="confirmPatNoModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Confirm Patient Number</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>
          No Patient Number was entered.<br/>
          The system will <strong>auto-generate</strong> one.<br/><br/>
          Do you want to continue?
        </p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary"
                data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary"
                id="confirmPatNoBtn">Yes, Continue</button>
      </div>
    </div>
  </div>
</div>

<!-- JS -->
<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/moment.min.js"></script>
<script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
<script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
<script src="assets/vendor/daterange/daterange.js"></script>
<script src="assets/vendor/daterange/custom-daterange.js"></script>
<script src="assets/js/custom.js"></script>

<!-- Module JS -->
<script type="module" src="js/modules/patient/add-patient.js"></script>
</body>
</html>
