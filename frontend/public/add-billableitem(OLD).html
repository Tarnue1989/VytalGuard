<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Billable Item</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add Billable Item">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Billable Items</li>
          <li class="breadcrumb-item text-primary" aria-current="page">
            Add Billable Item
          </li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Billable Item</h5>
              </div>
              <div class="card-body">

                <div id="formContainer">
                  <form id="billableItemForm" novalidate>
                    <div class="row gx-4">

                      <!-- ================= Identity ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Identity</h6>
                        <hr />
                      </div>

                      <div class="col-xxl-3 col-lg-4 col-sm-6 d-none" id="organizationFieldGroup">
                        <div class="mb-3 form-group">
                          <label class="form-label">Organization *</label>
                          <select class="form-control" id="organizationSelect" name="organization_id"></select>
                        </div>
                      </div>

                      <div class="col-xxl-3 col-lg-4 col-sm-6 d-none" id="facilityFieldGroup">
                        <div class="mb-3 form-group">
                          <label class="form-label">Facility</label>
                          <select class="form-control" id="facilitySelect" name="facility_id"></select>
                        </div>
                      </div>

                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label">Department</label>
                          <select class="form-control" id="departmentSelect" name="department_id"></select>
                        </div>
                      </div>

                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="field-wrapper">
                          <label class="form-label">Master Item *</label>

                          <input
                            type="text"
                            class="form-control suggestion-input"
                            id="masterItemSearch"
                            placeholder="Search master item..."
                            autocomplete="off"
                          />

                          <input type="hidden" id="master_item_id" name="master_item_id" />

                          <!-- 🔥 THIS WAS MISSING -->
                          <div id="masterItemSearchSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <label class="form-label">Name *</label>
                        <input type="text" class="form-control" id="name" readonly />
                      </div>

                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <label class="form-label">Code</label>
                        <input type="text" class="form-control" id="code" readonly />
                      </div>

                      <div class="col-xxl-6 col-lg-8 col-sm-12">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="description"></textarea>
                      </div>

                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <label class="form-label">Category</label>
                        <input type="text" class="form-control" id="categoryName" readonly />
                        <input type="hidden" id="category_id" />
                      </div>

                      <!-- ================= Pricing ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Pricing</h6>
                        <hr />
                      </div>

                      <div class="col-sm-12 mb-3">
                        <button type="button" id="addPriceRowBtn" class="btn btn-outline-success">
                          <i class="ri-add-line me-1"></i> Add Price
                        </button>
                      </div>

                      <div class="col-sm-12">
                        <div id="priceRowsContainer">

                          <div class="price-row border rounded p-3 mb-3">
                            <div class="row gx-3">

                              <div class="col-md-3">
                                <label class="form-label">Payer Type</label>
                                <select class="form-control payer_type">
                                  <option value="cash">Cash</option>
                                  <option value="insurance">Insurance</option>
                                  <option value="corporate">Corporate</option>
                                  <option value="government">Government</option>
                                  <option value="charity">Charity</option>
                                </select>
                              </div>

                              <div class="col-md-3">
                                <label class="form-label">Price</label>
                                <input type="number" class="form-control price" />
                              </div>

                              <div class="col-md-3">
                                <label class="form-label">Currency</label>
                                <select class="form-control currency">
                                  <option value="USD">USD</option>
                                  <option value="LRD">LRD</option>
                                </select>
                              </div>

                              <!-- CLEAN CHECKBOX -->
                              <div class="col-md-2">
                                <div class="mb-3 form-check mt-4">
                                  <input class="form-check-input is_default" type="checkbox" checked />
                                  <label class="form-check-label">Default</label>
                                </div>
                              </div>

                              <!-- CLEAN DELETE -->
                              <div class="col-md-1 d-flex align-items-center justify-content-end mt-4">
                                <button type="button" class="btn btn-outline-danger removeRow">
                                  <i class="ri-delete-bin-line"></i>
                                </button>
                              </div>

                            </div>
                          </div>

                        </div>
                      </div>

                      <!-- ================= Flags ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Flags</h6>
                        <hr />
                      </div>

                      <div class="col-md-3">
                        <div class="mb-3 form-check">
                          <input class="form-check-input" type="checkbox" id="taxable">
                          <label class="form-check-label" for="taxable">Taxable</label>
                        </div>
                      </div>

                      <div class="col-md-3">
                        <div class="mb-3 form-check">
                          <input class="form-check-input" type="checkbox" id="discountable" checked>
                          <label class="form-check-label" for="discountable">Discountable</label>
                        </div>
                      </div>

                      <div class="col-md-3">
                        <div class="mb-3 form-check">
                          <input class="form-check-input" type="checkbox" id="overrideAllowed" checked>
                          <label class="form-check-label" for="overrideAllowed">Override Allowed</label>
                        </div>
                      </div>

                      <!-- ================= MULTI CREATE ================= -->
                      <div class="col-12 mt-3">
                        <button type="button" id="addItemBtn" class="btn btn-outline-primary">
                          <i class="ri-add-line me-1"></i> Add Item
                        </button>
                      </div>

                      <div class="col-12 mt-2">
                        <div id="itemPillsContainer" class="mb-3">
                          <p class="text-muted">No billables added yet.</p>
                        </div>
                      </div>
                      <!-- ================= STATUS ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Status</h6>
                        <hr />
                      </div>

                      <div class="col-md-3">
                        <div class="mb-3">
                          <label class="form-label">Status</label>
                          <div>
                            <div class="form-check form-check-inline">
                              <input class="form-check-input" type="radio" name="status" value="active" checked>
                              <label class="form-check-label">Active</label>
                            </div>

                            <div class="form-check form-check-inline">
                              <input class="form-check-input" type="radio" name="status" value="inactive">
                              <label class="form-check-label">Inactive</label>
                            </div>
                          </div>
                        </div>
                      </div>
                      <!-- ================= ACTION ================= -->
                      <div class="col-12 mt-3">
                        <div class="d-flex justify-content-end gap-2">

                          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                            <i class="ri-arrow-go-back-line me-1"></i> Cancel
                          </button>

                          <button type="button" id="clearBtn" class="btn btn-warning">
                            <i class="ri-refresh-line me-1"></i> Clear
                          </button>

                          <button type="submit" class="btn btn-success">
                            <i class="ri-save-3-line me-1"></i> Submit All
                          </button>

                        </div>
                      </div>

                    </div>
                  </form>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/billable/add-billableitem.js"></script>
 
  

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
