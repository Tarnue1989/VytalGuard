<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Master Item</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add Master Item">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Master Items</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Item</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Master Item</h5>
              </div>
              <div class="card-body">

              <!-- 📦 Form Container -->
              <div id="formContainer">
                <form id="masterItemForm">
                  <div class="row gx-4">

                    <!-- Item Name -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="name">Item Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Enter item name" required minlength="2">
                      </div>
                    </div>

                    <!-- Code -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="code">Code</label>
                        <input type="text" class="form-control" id="code" name="code" placeholder="Auto-generated code" maxlength="50" readonly>
                      </div>
                    </div>

                    <!-- Category -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="categorySelect">Category <span class="text-danger">*</span></label>
                        <select class="form-control" id="categorySelect" name="category_id" required></select>
                      </div>
                    </div>

                    <!-- Item Type -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="itemType">Item Type</label>
                        <select class="form-control" id="itemType" name="item_type">
                          <option value="">-- Select Type --</option>
                          <option value="drug">Drug</option>
                          <option value="consumable">Consumable</option>
                          <option value="service">Service</option>
                        </select>
                      </div>
                    </div>

                    <!-- Feature Module -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="field-wrapper">
                        <label class="form-label" for="featureModuleInput">
                          Feature Module <span class="text-danger">*</span>
                        </label>
                        <input
                          type="text"
                          id="featureModuleInput"
                          class="form-control suggestion-input"
                          placeholder="Search feature module..."
                          autocomplete="off"
                        />
                        <input type="hidden" id="featureModuleId" name="feature_module_id" />
                        <div id="featureModuleSuggestions" class="suggestions"></div>
                      </div>
                    </div>


                    <!-- Department -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="departmentSelect">Department</label>
                        <select class="form-control" id="departmentSelect" name="department_id"></select>
                      </div>
                    </div>

                    <!-- Organization -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="organizationSelect">Organization</label>
                        <select class="form-control" id="organizationSelect" name="organization_id"></select>
                      </div>
                    </div>

                    <!-- Facility -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="facilitySelect">Facility</label>
                        <select class="form-control" id="facilitySelect" name="facility_id"></select>
                      </div>
                    </div>

                    <!-- ========== Medical fields (hidden) ========== -->

                    <div class="col-lg-3 col-sm-6 d-none">
                      <div class="mb-3">
                        <label class="form-label" for="generic_group">Generic Group</label>
                        <input type="text" class="form-control" id="generic_group" name="generic_group">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6 d-none">
                      <div class="mb-3">
                        <label class="form-label" for="strength">Strength</label>
                        <input type="text" class="form-control" id="strength" name="strength">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6 d-none">
                      <div class="mb-3">
                        <label class="form-label" for="dosage_form">Dosage Form</label>
                        <input type="text" class="form-control" id="dosage_form" name="dosage_form">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6 d-none">
                      <div class="mb-3">
                        <label class="form-label" for="unit">Unit</label>
                        <input type="text" class="form-control" id="unit" name="unit" value="pcs">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6 d-none">
                      <div class="mb-3">
                        <label class="form-label" for="reorder_level">Reorder Level</label>
                        <input type="number" class="form-control" id="reorder_level" name="reorder_level" value="0">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6 d-none">
                      <div class="mb-3">
                        <label class="form-label" for="reference_price">Reference Price</label>
                        <input type="number" class="form-control" id="reference_price" name="reference_price">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6 d-none">
                      <div class="mb-3">
                        <label class="form-label" for="currency">Currency</label>
                        <input type="text" class="form-control" id="currency" name="currency" value="USD">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6 d-none">
                      <div class="mb-3">
                        <label class="form-label" for="test_method">Test Method</label>
                        <input type="text" class="form-control" id="test_method" name="test_method">
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6 d-none">
                      <div class="mb-3">
                        <div class="form-check">
                          <input class="form-check-input" type="checkbox" id="is_controlled" name="is_controlled">
                          <label class="form-check-label" for="is_controlled">Controlled Substance</label>
                        </div>
                        <div class="form-check">
                          <input class="form-check-input" type="checkbox" id="sample_required" name="sample_required">
                          <label class="form-check-label" for="sample_required">Sample Required</label>
                        </div>
                      </div>
                    </div>

                    <!-- Status -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label">Status</label>
                        <div class="m-0">
                          <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="status" id="status_active" value="active" checked>
                            <label class="form-check-label" for="status_active">Active</label>
                          </div>
                          <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="status" id="status_inactive" value="inactive">
                            <label class="form-check-label" for="status_inactive">Inactive</label>
                          </div>
                        </div>
                      </div>
                    </div>

                    <!-- Buttons -->
                    <div class="col-sm-12">
                      <div class="d-flex gap-2 justify-content-end">
                        <button type="button" id="cancelBtn" class="btn btn-outline-secondary">Cancel</button>
                        <button type="reset" id="clearBtn" class="btn btn-warning">Clear</button>
                        <button type="submit" class="btn btn-primary">Save Item</button>
                      </div>
                    </div>

                  </div>
                </form>
              </div>
              <!-- /formContainer -->


              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/master-item/add-master-item.js"></script>
</body>
</html>
