<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Invoices List</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Invoices List">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
  <link rel="stylesheet" href="assets/vendor/datatables/dataTables.bs5.css">
  <link rel="stylesheet" href="assets/vendor/datatables/dataTables.bs5-custom.css">
  <link rel="stylesheet" href="assets/vendor/datatables/buttons/dataTables.bs5-custom.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/filter-page.css" />
  <link rel="stylesheet" href="assets/css/print.css" media="print" />
  <link rel="stylesheet" href="assets/css/summary.css">
  <link rel="stylesheet" href="assets/css/timeline.css" />
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Hero Header -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Financial</li>
          <li class="breadcrumb-item text-primary" aria-current="page">
            Invoices List
          </li>
        </ol>
      </div>

      <!-- 🔥 CLEAN FIXED BODY (REPLACE YOUR CURRENT BODY SECTION ONLY) -->

      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">

            <div class="card">
              <div class="card-header d-flex align-items-center justify-content-between">
                <h5 class="card-title">Invoices</h5>
              </div>

              <div class="card-body">

              <!-- ============================================================ -->
              <!-- FILTERS (MASTER FIXED) -->
              <!-- ============================================================ -->
              <div class="card panel-card mb-3">
                <div class="card-header d-flex align-items-center justify-content-between">

                  <button id="toggleFilterBtn" class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-filter me-1"></i>Filter
                    <i id="filterChevron" class="fas fa-chevron-down ms-1"></i>
                  </button>

                  <!-- Export -->
                  <div class="d-flex gap-2">
                    <button id="exportCSVBtn" class="btn btn-outline-success btn-sm">CSV</button>
                    <button id="exportExcelBtn" class="btn btn-outline-secondary btn-sm">Excel</button>
                    <button id="exportPDFBtn" class="btn btn-outline-danger btn-sm">PDF</button>
                  </div>

                </div>

                <div id="filterCollapse" class="card-body filter-body hidden">

                  <div class="row gx-3 gy-2 filter-grid compact">

                    <!-- 🔍 GLOBAL SEARCH -->
                    <div class="col-xxl-2 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label">Search</label>
                      <input id="globalSearch" class="form-control" placeholder="Search invoices..." />
                    </div>

                    <!-- Patient -->
                    <div class="col-xxl-2 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label">Patient</label>
                      <input id="filterPatient" class="form-control suggestion-input" />
                      <input type="hidden" id="filterPatientId" />
                      <div id="filterPatientSuggestions" class="suggestions"></div>
                    </div>

                    <!-- Status -->
                    <div class="col-xxl-2 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label">Status</label>
                      <select id="filterStatus" class="form-select">
                        <option value="">All</option>
                        <option value="draft">Draft</option>
                        <option value="issued">Issued</option>
                        <option value="unpaid">Unpaid</option>
                        <option value="partial">Partial</option>
                        <option value="paid">Paid</option>
                        <option value="cancelled">Cancelled</option>
                        <option value="voided">Voided</option>
                      </select>
                    </div>

                    <!-- Currency -->
                    <div class="col-xxl-2 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label">Currency</label>
                      <select id="filterCurrency" class="form-select">
                        <option value="">All</option>
                        <option value="USD">USD</option>
                        <option value="LRD">LRD</option>
                      </select>
                    </div>

                    <!-- Payer Type -->
                    <div class="col-xxl-2 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label">Payer Type</label>
                      <select id="filterPayerType" class="form-select">
                        <option value="">All</option>
                        <option value="cash">Cash</option>
                        <option value="insurance">Insurance</option>
                      </select>
                    </div>

                    <!-- Org -->
                    <div class="col-xxl-2 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label">Organization</label>
                      <select id="filterOrganizationSelect" class="form-select"></select>
                    </div>

                    <!-- Facility -->
                    <div class="col-xxl-2 col-lg-3 col-md-4 col-sm-6">
                      <label class="form-label">Facility</label>
                      <select id="filterFacilitySelect" class="form-select"></select>
                    </div>

                    <!-- DATE RANGE -->
                    <div class="col-xxl-2 col-lg-3 col-md-4 col-sm-6">
                      <div class="field-wrapper">
                        <label for="dateRange" class="form-label">Date Range</label>
                        <div class="input-group">
                          <span class="input-group-text bg-primary-lighten">
                            <i class="ri-calendar-2-line text-primary"></i>
                          </span>
                          <input
                            type="text"
                            id="dateRange"
                            class="form-control custom-daterange"
                            placeholder="Select date range"
                          />
                        </div>
                      </div>
                    </div>

                    <!-- CLEAR -->
                    <div class="col-12">
                      <button id="resetFilterBtn" class="btn btn-outline-secondary btn-sm">
                        Clear
                      </button>
                    </div>

                  </div>
                </div>
              </div>

                <!-- ============================================================ -->
                <!-- VIEW CONTROLS -->
                <!-- ============================================================ -->
                <div class="d-flex mb-2 gap-2 flex-wrap">

                  <div class="dropdown">
                    <button class="btn btn-outline-primary btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                      Select Fields
                    </button>
                    <div id="fieldSelectorDropdown" class="dropdown-menu p-2"></div>
                  </div>

                  <div class="btn-group">
                    <button id="cardViewBtn" class="btn btn-outline-secondary btn-sm">Card</button>
                    <button id="tableViewBtn" class="btn btn-outline-secondary btn-sm active">Table</button>
                  </div>

                  <select id="recordsPerPage" class="form-select form-select-sm" style="width:80px;">
                    <option>10</option>
                    <option selected>25</option>
                    <option>50</option>
                    <option>100</option>
                  </select>

                </div>

                <!-- SUMMARY -->
                <hr />
                <div class="module-summary">
                  <div id="moduleSummary"></div>
                </div>
                <hr />

                <!-- TABLE -->
                <div class="table-responsive table-container active">
                  <table class="table">
                    <thead id="dynamicTableHead"></thead>
                    <tbody id="invoiceTableBody"></tbody>
                  </table>
                </div>

                <!-- CARDS -->
                <div id="invoiceList" class="card-list"></div>

                <!-- PAGINATION -->
                <div id="paginationButtons" class="text-center mt-3"></div>

              </div>
            </div>

          </div>
        </div>
      </div>
      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <!-- View Modal -->
  <div id="viewModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="viewModalTitle">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="viewModalTitle">Details</h2>
        <button class="close-btn" data-close="viewModal" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="viewModalBody"></div>
    </div>
  </div>

  <!-- Financial Action Modals -->

  <!-- Payment -->
  <div id="paymentModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Apply Payment</h2>
        <button class="close-btn" data-close="paymentModal">&times;</button>
      </div>

      <div class="modal-body">
        <form id="paymentForm">

          <!-- ✅ Full / Partial toggle -->
          <div class="form-check mb-2">
            <input
              class="form-check-input"
              type="checkbox"
              id="payFullBalance"
              checked
            />
            <label class="form-check-label fw-semibold" for="payFullBalance">
              Pay full balance
            </label>
          </div>

          <!-- Amount -->
          <div class="mb-3">
            <label for="paymentAmount" class="form-label">Amount</label>
            <input
              type="number"
              id="paymentAmount"
              class="form-control"
              step="0.01"
              min="0.01"
              required
            />
          </div>

          <!-- Method -->
          <div class="mb-3">
            <label for="paymentMethod" class="form-label">Method</label>
            <select id="paymentMethod" class="form-select" required></select>
          </div>

          <!-- Reference -->
          <div class="mb-3">
            <label for="paymentRef" class="form-label">Reference</label>
            <input type="text" id="paymentRef" class="form-control" />
          </div>

          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-outline-secondary" data-close="paymentModal">
              Cancel
            </button>
            <button type="submit" class="btn btn-primary">
              Apply
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>

  <!-- Refund -->
  <div id="refundModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Apply Refund</h2>
        <button class="close-btn" data-close="refundModal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="refundForm">
          <div class="mb-3">
            <label for="refundPaymentSelect" class="form-label">Select Payment</label>
            <!-- ✅ dynamically populated via API -->
            <select id="refundPaymentSelect" class="form-select" required></select>
          </div>
          <div class="mb-3">
            <label for="refundAmount" class="form-label">Amount</label>
            <input type="number" id="refundAmount" class="form-control" required />
          </div>
          <div class="mb-3">
            <label for="refundReason" class="form-label">Reason</label>
            <textarea id="refundReason" class="form-control" required></textarea>
          </div>
          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-outline-secondary" data-close="refundModal">Cancel</button>
            <button type="submit" class="btn btn-primary">Apply</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Deposit -->
  <div id="depositModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Apply Deposit</h2>
        <button class="close-btn" data-close="depositModal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="depositForm">
          <div class="mb-3">
            <label for="depositAmount" class="form-label">Amount</label>
            <input type="number" id="depositAmount" class="form-control" required />
          </div>
          <div class="mb-3">
            <label for="depositMethod" class="form-label">Method</label>
            <!-- ✅ dynamically populated -->
            <select id="depositMethod" class="form-select" required></select>
          </div>
          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-outline-secondary" data-close="depositModal">Cancel</button>
            <button type="submit" class="btn btn-primary">Apply</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Waiver -->
  <div id="waiverModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Apply Waiver</h2>
        <button class="close-btn" data-close="waiverModal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="waiverForm">
          <div class="mb-3">
            <label for="waiverType" class="form-label">Type</label>
            <!-- ✅ dynamically populated -->
            <select id="waiverType" class="form-select" required></select>
          </div>
          <div class="mb-3">
            <label for="waiverValue" class="form-label">Value</label>
            <input type="number" id="waiverValue" class="form-control" required />
          </div>
          <div class="mb-3">
            <label for="waiverReason" class="form-label">Reason</label>
            <textarea id="waiverReason" class="form-control" required></textarea>
          </div>
          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-outline-secondary" data-close="waiverModal">Cancel</button>
            <button type="submit" class="btn btn-primary">Apply</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Reverse -->
  <div id="reverseModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Reverse Transaction</h2>
        <button class="close-btn" data-close="reverseModal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="reverseForm">
          <input type="hidden" id="reverseTransId" />
          <div class="mb-3">
            <label for="reverseType" class="form-label">Type</label>
            <!-- ✅ dynamically populated -->
            <select id="reverseType" class="form-select" required></select>
          </div>
          <div class="mb-3">
            <label for="reverseReason" class="form-label">Reason</label>
            <textarea id="reverseReason" class="form-control" required></textarea>
          </div>
          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-outline-secondary" data-close="reverseModal">Cancel</button>
            <button type="submit" class="btn btn-primary">Reverse</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/vendor/datatables/dataTables.min.js"></script>
  <script src="assets/vendor/datatables/dataTables.bootstrap.min.js"></script>
  <script src="assets/vendor/datatables/custom/custom-datatables.js"></script>
  <script src="assets/js/custom.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <script type="module" src="/js/logout.js"></script>
  <script type="module" src="/js/authSession.js"></script>

  <!-- Invoice module -->
  <script type="module" src="/js/modules/financial/invoices/invoice-main.js"></script>

<script type="module" src="/js/utils/navigation.js"></script>
 


</body>
</html>
