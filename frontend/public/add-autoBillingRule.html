<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Auto Billing Rule</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add an Auto Billing Rule">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Auto Billing Rules</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Rule</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Auto Billing Rule</h5>
              </div>
              <div class="card-body">

                <!-- 📦 Form Container -->
                <div id="formContainer">
                  <form id="autoBillingRuleForm" novalidate>
                    <div class="row gx-4">

                      <!-- ================= Identity ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Identity</h6>
                        <hr />
                      </div>

                      <!-- Feature Module -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="featureModuleSelect">
                            Feature Module <span class="text-danger">*</span>
                          </label>
                          <select class="form-control" id="featureModuleSelect" name="trigger_feature_module_id">
                            <!-- dynamically populated -->
                          </select>
                        </div>
                      </div>

                      <!-- Trigger Module -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="triggerModuleInput">
                            Trigger Module <small class="text-muted">(auto-filled)</small>
                          </label>
                          <input
                            type="text"
                            id="triggerModuleInput"
                            name="trigger_module"
                            class="form-control"
                            placeholder="Auto-filled from feature module"
                            readonly
                          />
                        </div>
                      </div>

                      <!-- Billable Item -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="billableItemSelect">
                            Billable Item <span class="text-danger">*</span>
                          </label>
                          <select class="form-control" id="billableItemSelect" name="billable_item_id" required>
                            <!-- dynamically populated -->
                          </select>
                        </div>
                      </div>

                      <!-- ================= Rule Configuration ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Rule Configuration</h6>
                        <hr />
                      </div>

                      <!-- Auto Generate -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="form-check mt-4">
                          <input class="form-check-input" type="checkbox" id="autoGenerate" name="auto_generate">
                          <label class="form-check-label" for="autoGenerate">Auto Generate</label>
                        </div>
                      </div>

                      <!-- Charge Mode -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="chargeMode">
                            Charge Mode <span class="text-danger">*</span>
                          </label>
                          <select class="form-control" id="chargeMode" name="charge_mode" required>
                            <option value="">-- Select Mode --</option>
                            <option value="fixed">Fixed</option>
                            <option value="percentage">Percentage</option>
                            <option value="per_unit">Per Unit</option>
                            <option value="tiered">Tiered</option>
                          </select>
                        </div>
                      </div>

                      <!-- Default Price -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="defaultPrice">Default Price</label>
                          <input type="number" step="0.01" class="form-control" id="defaultPrice" name="default_price" placeholder="Enter default price">
                        </div>
                      </div>

                      <!-- ================= Scope ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Scope</h6>
                        <hr />
                      </div>

                      <!-- Organization -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="organizationSelect">
                            Organization
                          </label>
                          <select class="form-control" id="organizationSelect" name="organization_id">
                            <!-- dynamically populated -->
                          </select>
                        </div>
                      </div>

                      <!-- Facility -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="facilitySelect">
                            Facility <span class="text-muted">(optional)</span>
                          </label>
                          <select class="form-control" id="facilitySelect" name="facility_id">
                            <!-- dynamically populated -->
                          </select>
                        </div>
                      </div>

                      <!-- ================= Actions ================= -->
                      <div class="col-sm-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                            <i class="ri-arrow-go-back-line me-1"></i>
                            Cancel
                          </button>
                          <button type="reset" id="clearBtn" class="btn btn-warning">
                            <i class="ri-refresh-line me-1"></i>
                            Clear
                          </button>
                          <button type="submit" class="btn btn-primary">
                            <i class="ri-save-3-line me-1"></i>
                            Save Rule
                          </button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>
                <!-- /formContainer -->

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/autoBillingRule/add-autoBillingRule.js"></script>
</body>
</html>
