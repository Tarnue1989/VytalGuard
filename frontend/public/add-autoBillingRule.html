<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Auto Billing Rule</title>

  <meta name="description" content="VytalGuard HMS - Add an Auto Billing Rule">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <div class="app-header d-flex align-items-center"></div>

      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Auto Billing Rules</li>
          <li class="breadcrumb-item text-primary">Add Rule</li>
        </ol>
      </div>

      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Auto Billing Rule</h5>
              </div>

              <div class="card-body">
                <div id="formContainer">
                  <form id="autoBillingRuleForm" novalidate>
                    <div class="row gx-4">

                      <!-- ================= Identity ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Identity</h6>
                        <hr />
                      </div>

                      <!-- Feature Module -->
                      <div class="col-lg-3 col-sm-6">
                        <label class="form-label">
                          Feature Module <span class="text-danger">*</span>
                        </label>
                        <select id="featureModuleSelect" name="trigger_feature_module_id" class="form-control"></select>
                      </div>

                      <!-- Trigger Module -->
                      <div class="col-lg-3 col-sm-6">
                        <label class="form-label">Trigger Module</label>
                        <input id="triggerModuleInput" class="form-control" readonly />
                      </div>

                      <!-- Category (FILTER ONLY) -->
                      <div class="col-lg-3 col-sm-6">
                        <label class="form-label">Category</label>
                        <select id="categorySelect" class="form-control"></select>
                      </div>

                      <!-- Billable Search -->
                      <div class="col-lg-3 col-sm-6">
                        <label class="form-label">
                          Billable Item <span class="text-danger">*</span>
                        </label>

                        <input
                          type="text"
                          id="billableSearch"
                          class="form-control suggestion-input"
                          placeholder="Search billable item..."
                          autocomplete="off"
                        />

                        <div id="billableSearchSuggestions" class="suggestions"></div>
                      </div>

                      <!-- 🔥 Add All (CATEGORY ONLY) -->
                      <div class="col-12 d-flex gap-2 mb-2">
                        <button
                          type="button"
                          id="addCategoryItemsBtn"
                          class="btn btn-sm btn-outline-primary"
                        >
                          <i class="ri-folder-add-line me-1"></i>
                          Add all in selected category
                        </button>
                      </div>

                      <!-- 🔥 Pills -->
                      <div class="col-12">
                        <div id="billablePillsContainer" class="d-flex flex-wrap mb-3">
                          <p class="text-muted">No billable items added yet.</p>
                        </div>
                      </div>

                      <!-- ================= Rule Config ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Rule Configuration</h6>
                        <hr />
                      </div>

                      <div class="col-lg-3 col-sm-6">
                        <div class="form-check mt-4">
                          <input type="checkbox" id="autoGenerate" name="auto_generate" class="form-check-input">
                          <label class="form-check-label">Auto Generate</label>
                        </div>
                      </div>

                      <div class="col-lg-3 col-sm-6">
                        <label class="form-label">Charge Mode</label>
                        <select id="chargeMode" name="charge_mode" class="form-control">
                          <option value="">-- Select Mode --</option>
                          <option value="fixed">Fixed</option>
                          <option value="percentage">Percentage</option>
                          <option value="per_unit">Per Unit</option>
                          <option value="tiered">Tiered</option>
                        </select>
                      </div>

                      <div class="col-lg-3 col-sm-6">
                        <label class="form-label">Default Price</label>
                        <input type="number" step="0.01" id="defaultPrice" name="default_price" class="form-control">
                      </div>

                      <!-- ================= Scope ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Scope</h6>
                        <hr />
                      </div>

                        <!-- Organization -->
                        <div class="col-lg-3 col-sm-6">
                          <div class="mb-3 form-group">
                            <label class="form-label" for="organizationSelect">Organization</label>
                            <select class="form-control" id="organizationSelect" name="organization_id"></select>
                          </div>
                        </div>

                        <!-- Facility -->
                        <div class="col-lg-3 col-sm-6">
                          <div class="mb-3 form-group">
                            <label class="form-label" for="facilitySelect">Facility</label>
                            <select class="form-control" id="facilitySelect" name="facility_id"></select>
                          </div>
                        </div>
                      <!-- ================= Actions ================= -->
                      <div class="col-12">
                        <div class="d-flex justify-content-end gap-2">
                          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">Cancel</button>
                          <button type="reset" class="btn btn-warning">Clear</button>
                          <button type="submit" class="btn btn-primary">Save Rule</button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>

      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>

    </div>
  </div>

  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <script type="module" src="js/modules/autoBillingRule/add-autoBillingRule.js"></script>
 
  

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
