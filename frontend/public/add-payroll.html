<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Payroll</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add a Payroll">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <div class="app-header d-flex align-items-center"></div>

      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Payrolls</li>
          <li class="breadcrumb-item text-primary">Add Payroll</li>
        </ol>
      </div>

      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Payroll</h5>
              </div>
              <div class="card-body">

                <div id="formContainer">
                  <form id="payrollForm" novalidate>
                    <div class="row gx-4">

                      <!-- ================= Identity ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Identity</h6>
                        <hr />
                      </div>

                      <!-- Employee -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="field-wrapper">
                          <label class="form-label">Employee <span class="text-danger">*</span></label>
                          <input type="text" class="form-control suggestion-input" id="employeeInput" placeholder="Search employee..." />
                          <input type="hidden" id="employeeId" name="employee_id" />
                          <div id="employeeSuggestions" class="suggestions"></div>
                        </div>
                      </div>

                      <!-- Payroll Number -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Payroll # <span class="text-danger">*</span></label>
                          <input type="text" class="form-control" id="payrollNumber" />
                        </div>
                      </div>

                      <!-- Period -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Period <span class="text-danger">*</span></label>
                          <input type="text" class="form-control" id="period" placeholder="e.g. Jan 2026" />
                        </div>
                      </div>

                      <!-- Currency -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Currency <span class="text-danger">*</span></label>
                          <select class="form-control" id="currencySelect">
                            <option value="">— Select Currency —</option>
                            <option value="USD">USD</option>
                            <option value="LRD">LRD</option>
                          </select>
                        </div>
                      </div>

                      <!-- ================= Financial ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Financial</h6>
                        <hr />
                      </div>

                      <div class="col-xxl-4 col-lg-6">
                        <label class="form-label">Basic Salary *</label>
                        <input type="number" step="0.01" class="form-control" id="basicSalary" />
                      </div>

                      <div class="col-xxl-4 col-lg-6">
                        <label class="form-label">Allowances</label>
                        <input type="number" step="0.01" class="form-control" id="allowances" />
                      </div>

                      <div class="col-xxl-4 col-lg-6">
                        <label class="form-label">Deductions</label>
                        <input type="number" step="0.01" class="form-control" id="deductions" />
                      </div>

                      <!-- Description -->
                      <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="description"></textarea>
                      </div>
                    <!-- ================= PAYMENT CONFIG (ADD THIS BLOCK) ================= -->
                    <div class="col-12">
                    <h6 class="mt-3">Payment Configuration</h6>
                    <hr />
                    </div>

                    <!-- Account -->
                    <div class="col-xxl-4 col-lg-6 col-sm-12">
                    <div class="mb-3">
                        <label class="form-label">Account <span class="text-danger">*</span></label>
                        <select class="form-control" id="accountSelect"></select>
                    </div>
                    </div>

                    <!-- Payment Method -->
                    <div class="col-xxl-4 col-lg-6 col-sm-12">
                    <div class="mb-3">
                        <label class="form-label">Payment Method <span class="text-danger">*</span></label>
                        <select class="form-control" id="paymentMethodSelect">
                        <option value="">— Select Method —</option>
                        <option value="cash">Cash</option>
                        <option value="card">Card</option>
                        <option value="mobile_money">Mobile Money</option>
                        <option value="bank_transfer">Bank Transfer</option>
                        <option value="cheque">Cheque</option>
                        <option value="insurance">Insurance</option>
                        <option value="other">Other</option>
                        </select>
                    </div>
                    </div>

                    <!-- Category -->
                    <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select class="form-control" id="categorySelect">
                            <option value="salary">Salary</option>
                            <option value="drugs">Drugs</option>
                            <option value="supplies">Supplies</option>
                            <option value="fuel">Fuel</option>
                            <option value="utilities">Utilities</option>
                            <option value="maintenance">Maintenance</option>
                            <option value="rent">Rent</option>
                            <option value="transport">Transport</option>
                            <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                      <!-- ================= Scope ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Scope</h6>
                        <hr />
                      </div>

                      <div class="col-xxl-3 col-lg-4">
                        <label class="form-label">Organization</label>
                        <select class="form-control" id="organizationSelect"></select>
                      </div>

                      <div class="col-xxl-3 col-lg-4">
                        <label class="form-label">Facility</label>
                        <select class="form-control" id="facilitySelect"></select>
                      </div>

                      <!-- ================= Actions ================= -->
                      <div class="col-sm-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">Cancel</button>
                          <button type="reset" id="clearBtn" class="btn btn-warning">Clear</button>
                          <button type="submit" class="btn btn-primary">Save Payroll</button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <script type="module" src="js/modules/payrolls/add-payroll.js"></script>
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
