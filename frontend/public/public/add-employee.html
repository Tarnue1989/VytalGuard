<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Gallery - Dental Admin Template</title>

  <!-- Meta -->
  <meta name="description" content="Marketplace for Bootstrap Admin Dashboards">
  <meta property="og:title" content="Admin Templates - Dashboard Templates">
  <meta property="og:description" content="Marketplace for Bootstrap Admin Dashboards">
  <meta property="og:type" content="Website">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center">
        <div class="search-container d-xl-block d-none">
          <input type="text" class="form-control" id="searchId" placeholder="Search">
          <i class="ri-search-line"></i>
        </div>
        <div class="header-actions">
          <div class="mx-3 my-2 d-grid">
            <a href="login.html" class="btn btn-danger">Logout</a>
          </div>
        </div>
      </div>

      <!-- Hero -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="index.html"><i class="ri-home-3-line"></i></a></li>
          <li class="breadcrumb-item">Employee</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Employee</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Employee</h5>
              </div>
              <div class="card-body">
                <div class="row gx-4">

                  <!-- Section -->
                  <div class="col-sm-12">
                    <div class="bg-light rounded-2 px-3 py-2 mb-3">
                      <h6 class="m-0">Personal Details</h6>
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="employee_no">Employee No <span class="text-danger">*</span></label>
                      <input type="text" class="form-control" id="employee_no" placeholder="Enter Employee Number">
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="first_name">First Name <span class="text-danger">*</span></label>
                      <input type="text" class="form-control" id="first_name" placeholder="Enter First Name">
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="middle_name">Middle Name</label>
                      <input type="text" class="form-control" id="middle_name" placeholder="Enter Middle Name">
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="last_name">Last Name <span class="text-danger">*</span></label>
                      <input type="text" class="form-control" id="last_name" placeholder="Enter Last Name">
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label">Gender <span class="text-danger">*</span></label>
                      <div>
                        <div class="form-check form-check-inline">
                          <input class="form-check-input" type="radio" name="gender" value="male" id="gender_male">
                          <label class="form-check-label" for="gender_male">Male</label>
                        </div>
                        <div class="form-check form-check-inline">
                          <input class="form-check-input" type="radio" name="gender" value="female" id="gender_female">
                          <label class="form-check-label" for="gender_female">Female</label>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="dob">Date of Birth</label>
                      <input type="date" class="form-control" id="dob">
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="phone">Phone</label>
                      <input type="text" class="form-control" id="phone" placeholder="Enter Phone Number">
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="email">Email</label>
                      <input type="email" class="form-control" id="email" placeholder="Enter Email">
                    </div>
                  </div>

                  <div class="col-sm-12">
                    <div class="mb-3">
                      <label class="form-label" for="address">Address</label>
                      <textarea class="form-control" id="address" placeholder="Enter Address" rows="2"></textarea>
                    </div>
                  </div>

                  <!-- Employment -->
                  <div class="col-sm-12">
                    <div class="bg-light rounded-2 px-3 py-2 mb-3">
                      <h6 class="m-0">Employment Details</h6>
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="facility_id">Facility <span class="text-danger">*</span></label>
                      <select class="form-select" id="facility_id"></select>
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="department_id">Department</label>
                      <select class="form-select" id="department_id"></select>
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="position">Position</label>
                      <input type="text" class="form-control" id="position" placeholder="Enter Position">
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="status">Status</label>
                      <select class="form-select" id="status"></select>
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="hire_date">Hire Date</label>
                      <input type="date" class="form-control" id="hire_date">
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="termination_date">Termination Date</label>
                      <input type="date" class="form-control" id="termination_date">
                    </div>
                  </div>

                  <!-- Professional -->
                  <div class="col-sm-12">
                    <div class="bg-light rounded-2 px-3 py-2 mb-3">
                      <h6 class="m-0">Professional Info</h6>
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="license_no">License No</label>
                      <input type="text" class="form-control" id="license_no" placeholder="Enter License No">
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="specialty">Specialty</label>
                      <input type="text" class="form-control" id="specialty" placeholder="Enter Specialty">
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="certifications">Certifications</label>
                      <input type="text" class="form-control" id="certifications" placeholder="Enter Certifications">
                    </div>
                  </div>

                  <!-- Emergency -->
                  <div class="col-sm-12">
                    <div class="bg-light rounded-2 px-3 py-2 mb-3">
                      <h6 class="m-0">Emergency Contact</h6>
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="emergency_contact_name">Contact Name</label>
                      <input type="text" class="form-control" id="emergency_contact_name"
                        placeholder="Enter Contact Name">
                    </div>
                  </div>

                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="emergency_contact_phone">Contact Phone</label>
                      <input type="text" class="form-control" id="emergency_contact_phone"
                        placeholder="Enter Contact Phone">
                    </div>
                  </div>

                  <!-- Link to User -->
                  <div class="col-xxl-3 col-lg-4 col-sm-6">
                    <div class="mb-3">
                      <label class="form-label" for="user_id">Linked User</label>
                      <select class="form-select" id="user_id"></select>
                    </div>
                  </div>

                  <!-- Actions -->
                  <div class="col-sm-12">
                    <div class="d-flex gap-2 justify-content-end">
                      <a href="employee.html" class="btn btn-outline-secondary">Cancel</a>
                      <button type="submit" class="btn btn-primary">Add Employee</button>
                    </div>
                  </div>
                </div><!-- row -->
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© Dental Care Admin 2025</span>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>
</body>
</html>
