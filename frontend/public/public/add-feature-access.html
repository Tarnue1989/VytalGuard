<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Feature Access</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Manage Feature Access">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="index.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Feature Access</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Access</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Feature Access</h5>
              </div>
              <div class="card-body">

                <!-- 📦 Form Container -->
                <div id="formContainer">
                  <form id="featureAccessForm">
                    <div class="row gx-4">

                      <!-- Module -->
                      <div class="col-xxl-4 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="module_id">Module <span class="text-danger">*</span></label>
                          <select class="form-select" id="module_id" name="module_id">
                            <option value="">-- Select Module --</option>
                          </select>
                        </div>
                      </div>

                      <!-- Role -->
                      <div class="col-xxl-4 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="role_id">Role <span class="text-danger">*</span></label>
                          <select class="form-select" id="role_id" name="role_id">
                            <option value="">-- Select Role --</option>
                          </select>
                        </div>
                      </div>

                      <!-- Facility -->
                      <div class="col-xxl-4 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label" for="facility_id">Facility <span class="text-danger">*</span></label>
                          <select class="form-select" id="facility_id" name="facility_id">
                            <option value="">-- Select Facility --</option>
                          </select>
                        </div>
                      </div>

                      <!-- Status -->
                      <div class="col-xxl-4 col-lg-4 col-sm-6">
                        <div class="mb-3">
                          <label class="form-label">Status <span class="text-danger">*</span></label>
                          <div class="m-0">
                            <div class="form-check form-check-inline">
                              <input class="form-check-input" type="radio" name="status" id="status_active" value="active" checked>
                              <label class="form-check-label" for="status_active">Active</label>
                            </div>
                            <div class="form-check form-check-inline">
                              <input class="form-check-input" type="radio" name="status" id="status_inactive" value="inactive">
                              <label class="form-check-label" for="status_inactive">Inactive</label>
                            </div>
                          </div>
                        </div>
                      </div>

                      <!-- Buttons -->
                      <div class="col-sm-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                            <i class="ri-arrow-go-back-line me-1"></i> Cancel
                          </button>
                          <button type="reset" id="clearBtn" class="btn btn-warning">
                            <i class="ri-refresh-line me-1"></i> Clear
                          </button>
                          <button type="submit" class="btn btn-primary">
                            <i class="ri-save-3-line me-1"></i> Save Access
                          </button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>
                <!-- /formContainer -->

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>
  <!-- ⚠️ removed static <div id="toast">, handled dynamically by toast-utils.js -->

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/feature-access/add-feature-access.js"></script>
</body>
</html>
