<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Refund</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add a Refund">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="dashboard.html"><i class="ri-home-3-line"></i></a></li>
          <li class="breadcrumb-item">Refunds</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Refund</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Refund</h5>
              </div>
              <div class="card-body">

              <!-- 📦 Form Container -->
              <div id="formContainer">
                <form id="refundForm">
                  <div class="row gx-3 gy-3">

                    <!-- Patient (required) -->
                    <div class="col-lg-3 col-sm-6 position-relative">
                      <label class="form-label" for="patientInput">
                        Patient <span class="text-danger">*</span>
                      </label>
                      <input
                        type="text"
                        class="form-control suggestion-input"
                        id="patientInput"
                        placeholder="Search patient..."
                        autocomplete="off"
                      />
                      <input type="hidden" id="patientId" name="patient_id" />
                      <div id="patientSuggestions" class="suggestions"></div>
                    </div>

                    <!-- Payment -->
                    <div class="col-lg-3 col-sm-6">
                      <label class="form-label" for="paymentSelect">
                        Payment <span class="text-danger">*</span>
                      </label>
                      <select class="form-control" id="paymentSelect" name="payment_id">
                        <option value="">-- Select Payment --</option>
                      </select>
                      <input type="hidden" id="invoiceId" name="invoice_id" />
                    </div>

                    <!-- Amount -->
                    <div class="col-lg-3 col-sm-6">
                      <label class="form-label" for="amount">
                        Amount <span class="text-danger">*</span>
                      </label>
                      <input
                        type="number"
                        step="0.01"
                        class="form-control"
                        id="amount"
                        name="amount"
                      />
                    </div>

                    <!-- Method -->
                    <div class="col-lg-3 col-sm-6">
                      <label class="form-label" for="methodSelect">
                        Method <span class="text-danger">*</span>
                      </label>
                      <select class="form-control" id="methodSelect" name="method">
                        <option value="">-- Select Method --</option>
                        <option value="cash">Cash</option>
                        <option value="card">Card</option>
                        <option value="bank_transfer">Bank Transfer</option>
                        <option value="mobile_money">Mobile Money</option>
                        <option value="cheque">Cheque</option>
                      </select>
                    </div>

                    <!-- Reason -->
                    <div class="col-lg-3 col-sm-6">
                      <label class="form-label" for="reason">
                        Reason <span class="text-danger">*</span>
                      </label>
                      <textarea
                        class="form-control"
                        id="reason"
                        name="reason"
                        rows="2"
                        placeholder="Enter reason for refund"
                      ></textarea>
                    </div>

                    <!-- Organization -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="organizationSelect">Organization</label>
                        <select class="form-control" id="organizationSelect" name="organization_id"></select>
                      </div>
                    </div>

                    <!-- Facility -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label class="form-label" for="facilitySelect">Facility</label>
                        <select class="form-control" id="facilitySelect" name="facility_id"></select>
                      </div>
                    </div>

                    <!-- Buttons -->
                    <div class="col-sm-12">
                      <div class="d-flex gap-2 justify-content-end">
                        <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                          <i class="ri-arrow-go-back-line me-1"></i> Cancel
                        </button>
                        <button type="reset" id="clearBtn" class="btn btn-warning">
                          <i class="ri-refresh-line me-1"></i> Clear
                        </button>
                        <button type="submit" class="btn btn-primary">
                          <i class="ri-save-3-line me-1"></i> Save Refund
                        </button>
                      </div>
                    </div>

                  </div>
                </form>
              </div>
              <!-- /formContainer -->


              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/refunds/add-refund.js"></script>
</body>
</html>
