<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Insurance Claim</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add Insurance Claim">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">

  <!-- 🔥 LOCK STYLE -->
  <style>
    .lockable:disabled {
      background-color: #e9ecef !important;
      cursor: not-allowed;
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Insurance Claims</li>
          <li class="breadcrumb-item text-primary">Add Insurance Claim</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Insurance Claim</h5>
              </div>

              <div class="card-body">
                <div id="formContainer">
                  <form id="insuranceClaimForm" novalidate>
                    <div class="row gx-4">

                      <!-- ================= Identity ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Identity</h6>
                        <hr />
                      </div>

                      <!-- Patient -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="field-wrapper">
                          <label class="form-label">Patient <span class="text-danger">*</span></label>
                          <input type="text" class="form-control suggestion-input" id="patientInput"
                            placeholder="Search patient..." autocomplete="off" />
                          <input type="hidden" id="patientId" name="patient_id" />
                          <div id="patientSuggestions" class="suggestions"></div>
                        </div>
                      </div>
                      <!-- Invoice -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">
                            Invoice <span class="text-danger">*</span>
                          </label>
                          <select class="form-control" id="invoiceSelect" name="invoice_id">
                            <option value="">— Select Invoice —</option>
                          </select>
                        </div>
                      </div>
                      <!-- Provider -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">
                            Insurance Provider <span class="text-danger">*</span>
                            <small class="text-muted">(auto from invoice)</small>
                          </label>
                          <select class="form-control lockable" id="providerSelect" name="provider_id">
                            <option value="">-- Select Provider --</option>
                          </select>
                        </div>
                      </div>



                      <!-- Claim Number -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">
                            Claim Number <span class="text-danger">*</span>
                          </label>
                          <input type="text" class="form-control" id="claimNumber" name="claim_number" />
                        </div>
                      </div>

                    <!-- Currency -->
                    <div class="col-xxl-4 col-lg-6 col-sm-12">
                      <div class="mb-3">
                        <label class="form-label">
                          Currency <span class="text-danger">*</span>
                          <small class="text-muted">(auto from invoice)</small>
                        </label>
                        <select
                          class="form-control lockable"
                          id="currencySelect"
                          name="currency"
                        >
                          <option value="">— Auto from Invoice —</option>
                        </select>
                      </div>
                    </div>

                      <!-- Amount Claimed -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Amount Claimed *</label>
                          <input type="number" step="0.01" class="form-control" id="amountClaimed" />
                        </div>
                      </div>

                      <!-- Amount Approved -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Amount Approved</label>
                          <input type="number" step="0.01" class="form-control" id="amountApproved" />
                        </div>
                      </div>

                      <!-- Amount Paid -->
                      <div class="col-xxl-4 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Amount Paid</label>
                          <input type="number" step="0.01" class="form-control" id="amountPaid" />
                        </div>
                      </div>

                      <!-- Payment Reference -->
                      <div class="col-xxl-6 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Payment Reference</label>
                          <input type="text" class="form-control" id="paymentReference" />
                        </div>
                      </div>

                      <!-- Rejection Reason -->
                      <div class="col-xxl-6 col-lg-6 col-sm-12">
                        <div class="mb-3">
                          <label class="form-label">Rejection Reason</label>
                          <input type="text" class="form-control" id="rejectionReason" />
                        </div>
                      </div>

                      <!-- Notes -->
                      <div class="col-12">
                        <div class="mb-3">
                          <label class="form-label">Notes</label>
                          <textarea class="form-control" id="notes"></textarea>
                        </div>
                      </div>

                      <!-- ================= Scope ================= -->
                      <div class="col-12">
                        <h6 class="mt-3">Scope</h6>
                        <hr />
                      </div>

                      <!-- Organization -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label">Organization *</label>
                          <select class="form-control" id="organizationSelect"></select>
                        </div>
                      </div>

                      <!-- Facility -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label">Facility</label>
                          <select class="form-control" id="facilitySelect"></select>
                        </div>
                      </div>

                      <!-- ================= Actions ================= -->
                      <div class="col-sm-12">
                        <div class="d-flex gap-2 justify-content-end">
                          <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                            Cancel
                          </button>
                          <button type="reset" id="clearBtn" class="btn btn-warning">
                            Clear
                          </button>
                          <button type="submit" class="btn btn-primary">
                            Save Claim
                          </button>
                        </div>
                      </div>

                    </div>
                  </form>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>

      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script type="module" src="js/modules/insurance-claims/add-insurance-claims.js"></script>
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
