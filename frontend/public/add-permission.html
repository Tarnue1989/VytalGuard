<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VytalGuard - Add Permission</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add Permission" />
  <link rel="shortcut icon" href="assets/images/favicon.svg" />

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css" />
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css" />
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css" />
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css" />
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">
      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Permissions</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Permission</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Permission</h5>
              </div>

              <div class="card-body">
              <!-- 📦 Form Container -->
              <div id="formContainer">
                <form id="permissionForm" autocomplete="off">
                  <div class="row gx-4 gy-3">

                    <!-- Permission Key -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label for="key" class="form-label">Permission Key</label>
                        <input
                          type="text"
                          class="form-control"
                          id="key"
                          name="key"
                          placeholder="e.g., appointments:view"
                          required
                        />
                      </div>
                    </div>

                    <!-- Display Name -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label for="name" class="form-label">Display Name</label>
                        <input
                          type="text"
                          class="form-control"
                          id="name"
                          name="name"
                          placeholder="Readable name for this permission"
                        />
                      </div>
                    </div>

                    <!-- Description (wider on desktop) -->
                    <div class="col-lg-6 col-sm-12">
                      <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea
                          id="description"
                          name="description"
                          class="form-control"
                          rows="2"
                          placeholder="Short description of what this permission allows"
                        ></textarea>
                      </div>
                    </div>

                    <!-- Module -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-group">
                        <label for="module" class="form-label">Module</label>
                        <select class="form-control" id="module" name="module">
                          <option value="">-- Select Module --</option>
                        </select>
                      </div>
                    </div>

                    <!-- Category (readonly) -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <input
                          type="text"
                          class="form-control"
                          id="category"
                          name="category"
                          placeholder="Auto-filled from module"
                          readonly
                        />
                      </div>
                    </div>

                    <!-- Global Permission -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="form-check mt-4">
                        <input
                          type="checkbox"
                          class="form-check-input"
                          id="isGlobal"
                          name="is_global"
                        />
                        <label class="form-check-label" for="isGlobal">
                          Global Permission
                        </label>
                      </div>
                    </div>

                    <!-- Organization (hidden by default) -->
                    <div class="col-lg-3 col-sm-6 d-none" id="organizationFieldGroup">
                      <div class="mb-3 form-group">
                        <label for="organizationSelect" class="form-label">Organization</label>
                        <select class="form-control" id="organizationSelect" name="organization_id"></select>
                      </div>
                    </div>

                    <!-- Facility (hidden by default) -->
                    <div class="col-lg-3 col-sm-6 d-none" id="facilityFieldGroup">
                      <div class="mb-3 form-group">
                        <label for="facilitySelect" class="form-label">Facility</label>
                        <select class="form-control" id="facilitySelect" name="facility_id"></select>
                      </div>
                    </div>

                    <!-- Buttons -->
                    <div class="col-12">
                      <div class="d-flex gap-2 justify-content-end mt-3">
                        <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                          <i class="ri-arrow-go-back-line me-1"></i> Cancel
                        </button>
                        <button type="reset" id="clearBtn" class="btn btn-warning">
                          <i class="ri-refresh-line me-1"></i> Clear
                        </button>
                        <button type="submit" class="btn btn-primary">
                          <i class="ri-save-3-line me-1"></i> Save Permission
                        </button>
                      </div>
                    </div>

                  </div>
                </form>
              </div>
              <!-- /formContainer -->

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Permission Module -->
  <script type="module" src="js/modules/permissions/add-permissions.js"></script>
</body>
</html>
