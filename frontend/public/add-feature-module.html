<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Feature Modules</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Manage Feature Modules">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="dashboard.html"><i class="ri-home-3-line"></i></a>
          </li>
          <li class="breadcrumb-item">Feature Modules</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Module</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Feature Module</h5>
              </div>
              <div class="card-body">

              <!-- 📦 Form Container -->
              <div id="formContainer">
                <form id="featureModuleForm" novalidate>
                  <div class="row gx-4">

                    <!-- ================= Identity ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Identity</h6>
                      <hr/>
                    </div>

                    <!-- Module Name -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="name">
                          Module Name <span class="text-danger">*</span>
                        </label>
                        <input
                          type="text"
                          class="form-control"
                          id="name"
                          name="name"
                          data-required="true"
                        >
                      </div>
                    </div>

                    <!-- Key -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="key">
                          Key <span class="text-danger">*</span>
                        </label>
                        <input
                          type="text"
                          class="form-control"
                          id="key"
                          name="key"
                          data-required="true"
                        >
                      </div>
                    </div>

                    <!-- Icon -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="icon">Icon</label>
                        <input type="text" class="form-control" id="icon" name="icon">
                      </div>
                    </div>

                    <!-- Category -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="category">Category</label>
                        <input type="text" class="form-control" id="category" name="category">
                      </div>
                    </div>

                    <!-- ================= Routing ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Routing</h6>
                      <hr/>
                    </div>

                    <!-- Route -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="route">Route</label>
                        <input type="text" class="form-control" id="route" name="route">
                      </div>
                    </div>

                    <!-- Parent Module -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="parent_id">Parent Module</label>
                        <select class="form-select" id="parent_id" name="parent_id">
                          <option value="">-- None (Top-level) --</option>
                        </select>
                      </div>
                    </div>

                    <!-- Order Index -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="order_index">Order Index</label>
                        <input
                          type="number"
                          class="form-control"
                          id="order_index"
                          name="order_index"
                          min="0"
                          value="0"
                        >
                      </div>
                    </div>

                    <!-- ================= Description ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Description</h6>
                      <hr/>
                    </div>

                    <!-- Description -->
                    <div class="col-lg-6 col-sm-12">
                      <div class="mb-3">
                        <label class="form-label" for="description">Description</label>
                        <input type="text" class="form-control" id="description" name="description">
                      </div>
                    </div>

                    <!-- Tags -->
                    <div class="col-lg-6 col-sm-12">
                      <div class="mb-3">
                        <label class="form-label" for="tags">Tags</label>
                        <input
                          type="text"
                          class="form-control"
                          id="tags"
                          name="tags"
                          placeholder="comma,separated"
                        >
                      </div>
                    </div>

                    <!-- ================= Access & Scope ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Access & Scope</h6>
                      <hr/>
                    </div>

                    <!-- Tenant Scope -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="tenant_scope">
                          Tenant Scope <span class="text-danger">*</span>
                        </label>
                        <select class="form-select" id="tenant_scope" name="tenant_scope">
                          <option value="org">Organization</option>
                          <option value="facility">Facility</option>
                          <option value="global">Global (Super Admin)</option>
                        </select>
                      </div>
                    </div>

                    <!-- Visibility -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label">Visibility</label>
                        <div>
                          <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="visibility" value="public" checked>
                            <label class="form-check-label">Public</label>
                          </div>
                          <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="visibility" value="private">
                            <label class="form-check-label">Private</label>
                          </div>
                          <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="visibility" value="hidden">
                            <label class="form-check-label">Hidden</label>
                          </div>
                        </div>
                      </div>
                    </div>

                    <!-- Enabled -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-check mt-4">
                        <input class="form-check-input" type="checkbox" id="enabled" name="enabled" checked>
                        <label class="form-check-label" for="enabled">Enabled</label>
                      </div>
                    </div>

                    <!-- Status -->
                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label">Status</label>
                        <div>
                          <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="status" value="active" checked>
                            <label class="form-check-label">Active</label>
                          </div>
                          <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="status" value="inactive">
                            <label class="form-check-label">Inactive</label>
                          </div>
                        </div>
                      </div>
                    </div>

                    <!-- ================= Dashboard ================= -->
                    <div class="col-12">
                      <h6 class="mt-3">Dashboard</h6>
                      <hr/>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3 form-check mt-4">
                        <input class="form-check-input" type="checkbox" id="show_on_dashboard" name="show_on_dashboard">
                        <label class="form-check-label" for="show_on_dashboard">
                          Show on Dashboard
                        </label>
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="dashboard_type">Dashboard Type</label>
                        <select class="form-select" id="dashboard_type" name="dashboard_type">
                          <option value="none">None</option>
                          <option value="kpi">KPI</option>
                          <option value="chart">Chart</option>
                          <option value="queue">Queue</option>
                          <option value="global_kpi">Global KPI</option>
                          <option value="global_chart">Global Chart</option>
                        </select>
                      </div>
                    </div>

                    <div class="col-lg-3 col-sm-6">
                      <div class="mb-3">
                        <label class="form-label" for="dashboard_order">Dashboard Order</label>
                        <input
                          type="number"
                          class="form-control"
                          id="dashboard_order"
                          name="dashboard_order"
                          min="0"
                          value="0"
                        >
                      </div>
                    </div>

                    <!-- ================= Actions ================= -->
                    <div class="col-sm-12">
                      <div class="d-flex gap-2 justify-content-end">
                        <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                          Back
                        </button>
                        <button type="reset" id="clearBtn" class="btn btn-warning">
                          Reset From
                        </button>
                        <button type="submit" class="btn btn-primary">
                          Save
                        </button>
                      </div>
                    </div>

                  </div>
                </form>
              </div>
              <!-- /formContainer -->


              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>
  <!-- ⚠️ Toasts are dynamically handled by toast-utils.js -->

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/feature-module/add-feature-module.js"></script>
 
  

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
