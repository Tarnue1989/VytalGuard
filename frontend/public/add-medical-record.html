<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VytalGuard - Add Medical Record</title>

  <!-- Meta -->
  <meta name="description" content="VytalGuard HMS - Add a Medical Record">
  <link rel="shortcut icon" href="assets/images/favicon.svg">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/fonts/remix/remixicon.css">
  <link rel="stylesheet" href="assets/css/admin-global.css" />
  <link rel="stylesheet" href="assets/css/main.min.css">
  <link rel="stylesheet" href="assets/vendor/overlay-scroll/OverlayScrollbars.min.css">
  <link rel="stylesheet" href="assets/vendor/daterange/daterange.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header d-flex align-items-center"></div>

      <!-- Breadcrumb -->
      <div class="app-hero-header d-flex align-items-center">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="dashboard.html"><i class="ri-home-3-line"></i></a></li>
          <li class="breadcrumb-item">Medical Records</li>
          <li class="breadcrumb-item text-primary" aria-current="page">Add Medical Record</li>
        </ol>
      </div>

      <!-- Body -->
      <div class="app-body">
        <div class="row gx-4">
          <div class="col-sm-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title">Add Medical Record</h5>
              </div>
              <div class="card-body">

              <!-- 📦 Form Container -->
              <div id="formContainer">
                <form id="medicalRecordForm">
                  <div class="row gx-3 gy-3">

                    <!-- ================== Patient & Encounter ================== -->
                    <div class="col-12"><h5 class="fw-bold">Patient & Encounter</h5><hr/></div>

                    <!-- Patient -->
                    <div class="col-xxl-3 col-lg-4 col-md-6 col-sm-12 position-relative">
                      <label class="form-label" for="patientInput">Patient</label>
                      <input type="text" class="form-control suggestion-input" id="patientInput"
                            placeholder="Search patient..." autocomplete="off" />
                      <input type="hidden" id="patientId" name="patient_id" />
                      <div id="patientSuggestions" class="suggestions"></div>
                    </div>
                    
                    <!-- Recorded At -->
                    <div class="col-xxl-3 col-lg-4 col-md-6 col-sm-12">
                      <label class="form-label" for="recordedAt">Recorded Date</label>
                      <input type="date" class="form-control" id="recordedAt" name="recorded_at" />
                    </div>

                    <!-- Doctor (toggle group for role-based hiding) -->
                    <div class="col-xxl-3 col-lg-4 col-md-6 col-sm-12 position-relative" id="doctorFieldGroup">
                      <label class="form-label" for="doctorInput">Doctor</label>
                      <input type="text" class="form-control suggestion-input" id="doctorInput"
                            placeholder="Search doctor..." autocomplete="off" />
                      <input type="hidden" id="doctorId" name="doctor_id" />
                      <div id="doctorSuggestions" class="suggestions"></div>
                    </div>

                    <!-- Consultation -->
                    <div class="col-xxl-3 col-lg-4 col-md-6 col-sm-12 position-relative">
                      <label class="form-label" for="consultationInput">Consultation</label>
                      <input type="text" class="form-control suggestion-input" id="consultationInput"
                            placeholder="Search consultation..." autocomplete="off" />
                      <input type="hidden" id="consultationId" name="consultation_id" />
                      <div id="consultationSuggestions" class="suggestions"></div>
                    </div>

                    <!-- Registration Log -->
                    <div class="col-xxl-3 col-lg-4 col-md-6 col-sm-12 position-relative">
                      <label class="form-label" for="registrationLogInput">Registration Log</label>
                      <input type="text" class="form-control suggestion-input" id="registrationLogInput"
                            placeholder="Search registration log..." autocomplete="off" />
                      <input type="hidden" id="registrationLogId" name="registration_log_id" />
                      <div id="registrationLogSuggestions" class="suggestions"></div>
                    </div>


                     <!-- Organization -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="organizationSelect">Organization</label>
                          <select class="form-control" id="organizationSelect" name="organization_id">
                            <!-- dynamically populated -->
                          </select>
                        </div>
                      </div>

                      <!-- Facility -->
                      <div class="col-xxl-3 col-lg-4 col-sm-6">
                        <div class="mb-3 form-group">
                          <label class="form-label" for="facilitySelect">Facility</label>
                          <select class="form-control" id="facilitySelect" name="facility_id">
                            <!-- dynamically populated -->
                          </select>
                        </div>
                      </div>


                    <!-- Emergency -->
                    <div class="col-xxl-3 col-lg-4 col-md-6 col-sm-12">
                      <div class="form-check mt-4">
                        <input class="form-check-input" type="checkbox" id="isEmergency" name="is_emergency">
                        <label class="form-check-label" for="isEmergency">Emergency?</label>
                      </div>
                    </div>

                    <!-- Report File -->
                    <div class="col-xxl-6 col-lg-6 col-md-12 col-sm-12">
                      <label class="form-label" for="reportFile">Attach Report</label>
                      <input type="file" class="form-control" id="reportFile" name="report_file" />
                    </div>

                    <!-- ================== Clinical History ================== -->
                    <div class="col-12 mt-3"><h5 class="fw-bold">Clinical History</h5><hr/></div>

                    <!-- (textarea groups) -->
                    <div class="col-12 col-md-6"><label class="form-label" for="cc">Chief Complaint</label><textarea class="form-control" id="cc" name="cc" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="hpi">History of Present Illness</label><textarea class="form-control" id="hpi" name="hpi" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="pmh">Past Medical History</label><textarea class="form-control" id="pmh" name="pmh" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="fh_sh">Family/Social History</label><textarea class="form-control" id="fh_sh" name="fh_sh" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="nut_hx">Nutritional History</label><textarea class="form-control" id="nut_hx" name="nut_hx" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="imm_hx">Immunization History</label><textarea class="form-control" id="imm_hx" name="imm_hx" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="obs_hx">Obstetric History</label><textarea class="form-control" id="obs_hx" name="obs_hx" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="gyn_hx">Gynecological History</label><textarea class="form-control" id="gyn_hx" name="gyn_hx" rows="2"></textarea></div>

                    <!-- ================== Physical Examination ================== -->
                    <div class="col-12 mt-3"><h5 class="fw-bold">Physical Examination</h5><hr/></div>

                    <div class="col-12 col-md-6"><label class="form-label" for="pe">General Exam</label><textarea class="form-control" id="pe" name="pe" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="resp_ex">Respiratory</label><textarea class="form-control" id="resp_ex" name="resp_ex" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="cv_ex">Cardiovascular</label><textarea class="form-control" id="cv_ex" name="cv_ex" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="abd_ex">Abdomen</label><textarea class="form-control" id="abd_ex" name="abd_ex" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="pel_ex">Pelvic</label><textarea class="form-control" id="pel_ex" name="pel_ex" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="ext">Extremities</label><textarea class="form-control" id="ext" name="ext" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="neuro_ex">Neurological</label><textarea class="form-control" id="neuro_ex" name="neuro_ex" rows="2"></textarea></div>

                    <!-- ================== Diagnosis & Plan ================== -->
                    <div class="col-12 mt-3"><h5 class="fw-bold">Diagnosis & Plan</h5><hr/></div>

                    <div class="col-12 col-md-6"><label class="form-label" for="ddx">Differential Diagnosis</label><textarea class="form-control" id="ddx" name="ddx" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="dx">Final Diagnosis</label><textarea class="form-control" id="dx" name="dx" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="lab_inv">Lab Investigations</label><textarea class="form-control" id="lab_inv" name="lab_inv" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="img_inv">Imaging</label><textarea class="form-control" id="img_inv" name="img_inv" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="tx_mx">Treatment / Management</label><textarea class="form-control" id="tx_mx" name="tx_mx" rows="2"></textarea></div>
                    <div class="col-12 col-md-6"><label class="form-label" for="summary_pg">Summary / Progress</label><textarea class="form-control" id="summary_pg" name="summary_pg" rows="2"></textarea></div>

                    <!-- ================== Buttons ================== -->
                    <div class="col-sm-12 mt-4">
                      <div class="d-flex gap-2 justify-content-end">
                        <button type="button" id="cancelBtn" class="btn btn-outline-secondary">
                          <i class="ri-arrow-go-back-line me-1"></i> Cancel
                        </button>
                        <button type="reset" id="clearBtn" class="btn btn-warning">
                          <i class="ri-refresh-line me-1"></i> Clear
                        </button>
                        <button type="submit" class="btn btn-primary">
                          <i class="ri-save-3-line me-1"></i> Save Medical Record
                        </button>
                      </div>
                    </div>

                  </div>
                </form>
              </div>
              <!-- /formContainer -->

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>© VytalGuard HMS 2025</span>
      </div>
    </div>
  </div>

  <!-- overlays / modals / toasts -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner-box"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <!-- JS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/moment.min.js"></script>
  <script src="assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js"></script>
  <script src="assets/vendor/overlay-scroll/custom-scrollbar.js"></script>
  <script src="assets/vendor/daterange/daterange.js"></script>
  <script src="assets/vendor/daterange/custom-daterange.js"></script>
  <script src="assets/js/custom.js"></script>

  <!-- Module JS -->
  <script type="module" src="js/modules/medical-records/add-medical-record.js"></script>
 
  

  <!-- AUTH -->
  <script type="module" src="/js/authSession.js"></script>

</body>
</html>
